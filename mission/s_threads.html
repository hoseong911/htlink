<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>S_threads | 신라 하대</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
  <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #000; --card: #121212; --text: #fff; --sub: #777;
      --border: #262626; --accent: #fff; --danger: #f91880;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'Pretendard', sans-serif;
      display: flex; justify-content: center;
      min-height: 100vh; overflow-x: hidden;
    }

    /* ── 공통 input / select ── */
    input, select {
      width: 100%; padding: 15px;
      background: #1e1e1e; border: 1px solid #333; border-radius: 12px;
      color: #fff; margin-bottom: 8px;
      font-size: 16px; font-family: 'Pretendard';
      outline: none; transition: border-color 0.15s;
      -webkit-appearance: none;
    }
    input:focus { border-color: #555; }
    input.valid   { border-color: #2ecc71 !important; }
    input.invalid { border-color: #f91880 !important; }

    /* ── 로그인 ── */
    #loginOverlay {
      position: fixed; inset: 0; background: #000; z-index: 1000;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 24px;
    }
    .login-box { width: 100%; max-width: 400px; }
    .login-logo {
      font-family: 'Jua', sans-serif; font-size: 3rem;
      text-align: center; margin-bottom: 8px;
    }
    .login-sub {
      text-align: center; font-size: 12px; color: #555;
      margin-bottom: 28px; letter-spacing: 0.04em;
    }

    /* 인풋 래퍼 (상태 아이콘) */
    .input-wrap { position: relative; margin-bottom: 8px; }
    .input-wrap input { margin-bottom: 0; }
    .input-status {
      position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
      font-size: 16px; pointer-events: none;
    }

    /* 검증 메시지 */
    .verify-msg {
      font-size: 11px; padding: 0 4px; margin-bottom: 6px; height: 16px;
      transition: 0.15s;
    }
    .verify-msg.ok  { color: #2ecc71; }
    .verify-msg.err { color: #f91880; }

    .btn-main {
      width: 100%; padding: 15px; background: #fff; color: #000;
      border: none; border-radius: 30px; font-weight: 800;
      cursor: pointer; font-size: 15px; margin-top: 6px;
      font-family: 'Pretendard', sans-serif;
      transition: opacity 0.15s;
    }
    .btn-main:disabled {
      opacity: 0.4; cursor: not-allowed;
    }
    .btn-main:not(:disabled):hover { opacity: 0.88; }
    .btn-main.danger { background: #c0392b; color: #fff; }
    .btn-main.gray   { background: #2a2a2a; color: #bbb; }

    /* ── 프로필 모달 ── */
    #profileModal {
      position: fixed; inset: 0; background: rgba(0,0,0,0.95);
      backdrop-filter: blur(8px);
      z-index: 1000; display: none;
      flex-direction: column; align-items: center; justify-content: center;
      padding: 24px;
    }
    #profileModal .modal-box {
      width: 100%; max-width: 360px;
      background: #111; border: 1px solid #2a2a2a;
      border-radius: 20px; padding: 28px 24px;
    }
    .modal-header {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 22px;
    }
    .modal-avatar {
      width: 44px; height: 44px; background: #222;
      border-radius: 50%; display: flex; align-items: center;
      justify-content: center; font-size: 22px; flex-shrink: 0;
    }
    .modal-user-info .modal-name {
      font-size: 15px; font-weight: 800;
    }
    .modal-user-info .modal-id {
      font-size: 11px; color: #555; margin-top: 2px;
    }
    .modal-section-label {
      font-size: 10px; font-weight: 700; color: #555;
      letter-spacing: 0.08em; text-transform: uppercase;
      margin-bottom: 8px; margin-top: 16px;
    }
    .modal-section-label:first-of-type { margin-top: 0; }
    .modal-btn-group { display: flex; flex-direction: column; gap: 8px; margin-top: 18px; }

    /* ── 메인 앱 ── */
    #appContainer {
      display: none; width: 100%; max-width: 600px; min-height: 100vh;
      border-left: 1px solid var(--border); border-right: 1px solid var(--border);
      flex-direction: column;
    }
    header {
      padding: 12px 16px;
      display: flex; flex-direction: column; gap: 0;
      position: sticky; top: 0;
      background: rgba(0,0,0,0.85); backdrop-filter: blur(15px);
      z-index: 100; border-bottom: 1px solid var(--border);
    }
    .header-top {
      display: flex; justify-content: space-between; align-items: center;
      width: 100%; margin-bottom: 8px;
    }
    .header-logo { font-family: 'Jua', sans-serif; font-size: 1.4rem; }

    /* 프로필 버튼 (개선) */
    .profile-btn {
      display: flex; align-items: center; gap: 7px;
      background: #1a1a1a; border: 1px solid #2a2a2a;
      border-radius: 20px; padding: 5px 12px 5px 6px;
      cursor: pointer; transition: 0.15s;
      font-family: 'Pretendard', sans-serif;
    }
    .profile-btn:hover { border-color: #555; background: #222; }
    .profile-btn .pb-avatar {
      width: 26px; height: 26px; background: #2a2a2a;
      border-radius: 50%; display: flex; align-items: center;
      justify-content: center; font-size: 14px;
    }
    .profile-btn .pb-nick {
      font-size: 12px; font-weight: 700; color: #e0e0e0;
      max-width: 80px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }

    /* 신분 탭 */
    .role-tabs {
      display: flex; overflow-x: auto; scrollbar-width: none;
      width: 100%;
    }
    .role-tabs::-webkit-scrollbar { display: none; }
    .role-tab {
      flex-shrink: 0; padding: 8px 14px; border: none; background: none;
      font-size: 12px; font-weight: 500; color: var(--sub);
      cursor: pointer; border-bottom: 2px solid transparent;
      font-family: 'Pretendard', sans-serif; white-space: nowrap; transition: 0.12s;
    }
    .role-tab.active { color: #fff; border-bottom-color: #fff; font-weight: 700; }

    .sort-container {
      display: flex; justify-content: flex-end;
      padding: 10px 16px; border-bottom: 1px solid var(--border); background: #000;
    }
    .sort-box { display: flex; background: #1a1a1a; border-radius: 20px; padding: 3px; }
    .sort-btn {
      padding: 5px 12px; border: none; border-radius: 15px;
      font-size: 11px; font-weight: 700; color: var(--sub);
      background: none; cursor: pointer; transition: 0.2s;
      font-family: 'Pretendard', sans-serif;
    }
    .sort-btn.active { color: #000; background: #fff; }

    .post-area { padding: 16px; border-bottom: 1px solid var(--border); }
    .post-input-wrapper { display: flex; gap: 12px; }
    .avatar-circle {
      width: 42px; height: 42px; background: #222; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; flex-shrink: 0;
    }
    textarea {
      background: transparent; border: none;
      font-size: 17px; height: 50px; outline: none;
      width: 100%; resize: none; color: #fff;
      font-family: 'Pretendard', sans-serif;
    }
    textarea::placeholder { color: #555; font-style: italic; font-size: 15px; }

    #feed { flex: 1; }
    .thread-card { padding: 15px 16px; border-bottom: 1px solid var(--border); display: flex; gap: 12px; }
    .nickname { font-weight: bold; font-size: 14px; }
    .role-tag {
      font-size: 10px; color: var(--sub); background: #1a1a1a;
      padding: 2px 6px; border-radius: 4px; margin-left: 5px;
    }
    .time { color: var(--sub); font-size: 11px; margin-left: auto; }
    .content-text { font-size: 15px; line-height: 1.5; margin: 6px 0; color: #efefef; white-space: pre-wrap; }

    .pick-badge-dark {
      display: inline-block; background: #2a2000; color: #f5a623;
      border: 1px solid #6a5000; border-radius: 4px; padding: 1px 7px;
      font-size: 10px; font-weight: 700; margin-bottom: 4px;
    }

    .empty-state {
      padding: 60px 20px; text-align: center; color: var(--sub);
      font-size: 14px; line-height: 1.7;
    }

    footer { padding: 30px 20px; text-align: center; color: #333; font-size: 11px; }

    /* ── 로딩 스피너 ── */
    .spinner-wrap {
      display: flex; flex-direction: column; align-items: center; gap: 12px;
      padding: 30px 0;
    }
    .spinner {
      width: 28px; height: 28px;
      border: 2px solid #2a2a2a; border-top-color: #fff;
      border-radius: 50%; animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── 토스트 ── */
    #toastContainer {
      position: fixed; top: 70px; left: 50%; transform: translateX(-50%);
      z-index: 9999; display: flex; flex-direction: column; gap: 8px;
      pointer-events: none; width: 90%; max-width: 420px;
    }
    .toast {
      background: linear-gradient(135deg, #1a1200, #2a2000);
      border: 1.5px solid #6a5000; border-radius: 14px;
      padding: 14px 18px; display: flex; align-items: flex-start; gap: 10px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      animation: toastIn 0.35s cubic-bezier(.34,1.56,.64,1) forwards;
      pointer-events: auto;
    }
    .toast.out { animation: toastOut 0.3s ease forwards; }
    @keyframes toastIn {
      from { opacity: 0; transform: translateY(-16px) scale(0.95); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes toastOut {
      from { opacity: 1; transform: translateY(0) scale(1); }
      to   { opacity: 0; transform: translateY(-10px) scale(0.95); }
    }
    .toast-icon { font-size: 22px; flex-shrink: 0; }
    .toast-body { flex: 1; }
    .toast-title { font-size: 13px; font-weight: 800; color: #f5a623; margin-bottom: 2px; }
    .toast-msg   { font-size: 12px; color: #c8a060; line-height: 1.5; }
    .toast-close {
      background: none; border: none; cursor: pointer;
      color: #555; font-size: 18px; padding: 0; line-height: 1; flex-shrink: 0;
    }
  </style>
</head>
<body>

<div id="toastContainer"></div>

<!-- ── 로그인 ── -->
<div id="loginOverlay">
  <div class="login-box">
    <div class="login-logo">S_threads</div>
    <div class="login-sub">신라 하대 · 인천동양중학교</div>

    <!-- 학번 -->
    <div class="input-wrap">
      <input type="text" id="joinId" placeholder="학번 (5자리)" maxlength="5"
        inputmode="numeric" autocomplete="off"
        oninput="onIdInput(this)">
      <span class="input-status" id="idStatus"></span>
    </div>
    <div class="verify-msg" id="idMsg"></div>

    <!-- 이름 -->
    <div class="input-wrap">
      <input type="text" id="joinName" placeholder="이름 (실명)" autocomplete="off"
        oninput="onNameInput(this)" disabled>
      <span class="input-status" id="nameStatus"></span>
    </div>
    <div class="verify-msg" id="nameMsg"></div>

    <input type="text" id="joinNick" placeholder="nickname (영문/숫자/_)"
      oninput="validateNick(this)" autocomplete="off">
    <select id="joinRole">
      <option value="진골">👑 진골 귀족</option>
      <option value="6두품">📜 6두품 지식인</option>
      <option value="호족">🏰 지방 호족</option>
      <option value="농민">🌾 일반 농민</option>
      <option value="선종 승려">🧘 선종 승려</option>
      <option value="풍수지리사">🧭 풍수지리사</option>
    </select>

    <button class="btn-main" id="enterBtn" onclick="enterApp()" disabled>신라 접속하기</button>
    <div id="loginSpinner" style="display:none;" class="spinner-wrap">
      <div class="spinner"></div>
      <div style="font-size:12px;color:#555;">학생 명단 확인 중...</div>
    </div>
  </div>
</div>

<!-- ── 프로필 모달 ── -->
<div id="profileModal">
  <div class="modal-box">
    <div class="modal-header">
      <div class="modal-avatar" id="modalAvatar">?</div>
      <div class="modal-user-info">
        <div class="modal-name" id="modalName">-</div>
        <div class="modal-id" id="modalId">-</div>
      </div>
    </div>

    <div class="modal-section-label">닉네임 변경</div>
    <input type="text" id="editNick" placeholder="new_nickname"
      oninput="validateNick(this)" autocomplete="off">

    <div class="modal-section-label">신분 변경</div>
    <select id="editRole">
      <option value="진골">👑 진골 귀족</option>
      <option value="6두품">📜 6두품 지식인</option>
      <option value="호족">🏰 지방 호족</option>
      <option value="농민">🌾 일반 농민</option>
      <option value="선종 승려">🧘 선종 승려</option>
      <option value="풍수지리사">🧭 풍수지리사</option>
    </select>

    <div class="modal-btn-group">
      <button class="btn-main" onclick="saveProfile()">수정 완료</button>
      <button class="btn-main gray" onclick="closeProfile()">취소</button>
      <button class="btn-main danger" style="margin-top:6px;" onclick="logout()">로그아웃</button>
    </div>
  </div>
</div>

<!-- ── 메인 앱 ── -->
<div id="appContainer">
  <header>
    <div class="header-top">
      <span class="header-logo">S_threads</span>
      <button class="profile-btn" onclick="openProfile()">
        <div class="pb-avatar" id="headerAvatar">?</div>
        <span class="pb-nick" id="headerNick">...</span>
      </button>
    </div>
    <div class="role-tabs">
      <button class="role-tab active" onclick="setRoleFilter('all', this)">전체</button>
      <button class="role-tab" onclick="setRoleFilter('진골', this)">👑 진골</button>
      <button class="role-tab" onclick="setRoleFilter('6두품', this)">📜 6두품</button>
      <button class="role-tab" onclick="setRoleFilter('호족', this)">🏰 호족</button>
      <button class="role-tab" onclick="setRoleFilter('농민', this)">🌾 농민</button>
      <button class="role-tab" onclick="setRoleFilter('선종 승려', this)">🧘 선종 승려</button>
      <button class="role-tab" onclick="setRoleFilter('풍수지리사', this)">🧭 풍수지리사</button>
      <button class="role-tab" onclick="setRoleFilter('pick', this)">⭐ Pick</button>
    </div>
  </header>

  <div class="sort-container">
    <div class="sort-box">
      <button id="sortNewest" class="sort-btn active" onclick="changeSort('newest')">최신순</button>
      <button id="sortPopular" class="sort-btn" onclick="changeSort('popular')">인기순</button>
    </div>
  </div>

  <div class="post-area">
    <div class="post-input-wrapper">
      <div class="avatar-circle" id="myAvatar">?</div>
      <div style="flex:1">
        <textarea id="postInput" placeholder="신라 하대, 당신의 생각은 무엇인가요..." maxlength="300"></textarea>
        <div style="display:flex; justify-content:space-between; align-items:center;">
          <span id="charCount" style="font-size:11px; color:#555;">0 / 300</span>
          <button class="btn-main" style="width:auto; padding:6px 18px; font-size:13px; margin-top:0;"
            onclick="createPost()">게시</button>
        </div>
      </div>
    </div>
  </div>

  <div id="feed"></div>
  <footer>v2.1 · Incheon Dongyang Middle School</footer>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getDatabase, ref, set, push, onValue, update, get }
    from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDAc5S87JK-LtXzk5-iTR9rt7RnHWnUXTQ",
    authDomain: "ho0911seong-56638.firebaseapp.com",
    databaseURL: "https://ho0911seong-56638-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "ho0911seong-56638",
    storageBucket: "ho0911seong-56638.firebasestorage.app",
    messagingSenderId: "994509567071",
    appId: "1:994509567071:web:de99e71c125ec2a3f557ea"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const postsRef = ref(db, 'posts');
  const toastRef = ref(db, 'silla_toast');
  const studentsRef = ref(db, 'students');

  const roleIcons = {
    "진골": "👑", "6두품": "📜", "호족": "🏰",
    "농민": "🌾", "선종 승려": "🧘", "풍수지리사": "🧭"
  };

  let currentUser = null;
  let currentSort = 'newest';
  let currentRoleFilter = 'all';
  let allPostsCache = [];
  let lastToastKey = null;

  // 학생 명단 캐시: { "12345": "홍길동", ... }
  let studentMap = {};
  let studentMapLoaded = false;

  /* ════════════════════════════
     학생 명단 로드
  ════════════════════════════ */
  async function loadStudentMap() {
    if (studentMapLoaded) return;
    try {
      const snap = await get(studentsRef);
      const data = snap.val();
      if (data) {
        // 두 가지 필드명 모두 지원: name / realName
        Object.values(data).forEach(s => {
          const sid = s.studentId || s.id || '';
          const sname = s.name || s.realName || '';
          if (sid && sname) studentMap[sid] = sname;
        });
      }
    } catch (e) {
      console.warn('학생 명단 로드 실패:', e);
    }
    studentMapLoaded = true;
  }

  /* ════════════════════════════
     로그인 검증 UI
  ════════════════════════════ */
  let idVerifyTimer = null;
  let verifiedStudentName = null; // 명단에서 찾은 이름

  window.validateNick = (el) => {
    el.value = el.value.toLowerCase().replace(/[^a-z0-9_.]/g, '');
  };

  // 학번 입력 → 명단 대조
  window.onIdInput = async (el) => {
    const val = el.value.replace(/\D/g, '');
    el.value = val;
    const idMsg = document.getElementById('idMsg');
    const idStatus = document.getElementById('idStatus');
    const nameInput = document.getElementById('joinName');
    const nameMsg = document.getElementById('nameMsg');
    const nameStatus = document.getElementById('nameStatus');

    verifiedStudentName = null;
    nameInput.disabled = true;
    nameInput.value = '';
    nameInput.classList.remove('valid', 'invalid');
    nameMsg.textContent = '';
    nameMsg.className = 'verify-msg';
    nameStatus.textContent = '';
    updateEnterBtn();

    el.classList.remove('valid', 'invalid');
    idStatus.textContent = '';

    if (val.length < 5) {
      idMsg.textContent = val.length > 0 ? `학번은 5자리입니다 (현재 ${val.length}자리)` : '';
      idMsg.className = 'verify-msg err';
      return;
    }

    // 5자리 완성 → 명단 조회
    idMsg.textContent = '';
    idStatus.textContent = '⏳';

    clearTimeout(idVerifyTimer);
    idVerifyTimer = setTimeout(async () => {
      await loadStudentMap();

      if (Object.keys(studentMap).length === 0) {
        // 명단이 없으면 형식만 확인
        el.classList.add('valid');
        idStatus.textContent = '✅';
        idMsg.textContent = '학번 형식 확인 완료';
        idMsg.className = 'verify-msg ok';
        nameInput.disabled = false;
        nameInput.placeholder = '이름 (실명)';
        updateEnterBtn();
        return;
      }

      if (studentMap[val] !== undefined) {
        // 명단에 있음 → 이름 자동 채우기
        verifiedStudentName = studentMap[val];
        el.classList.add('valid');
        idStatus.textContent = '✅';
        idMsg.textContent = `명단 확인 완료`;
        idMsg.className = 'verify-msg ok';

        nameInput.value = verifiedStudentName;
        nameInput.disabled = false;
        nameInput.classList.add('valid');
        nameStatus.textContent = '✅';
        nameMsg.textContent = `${verifiedStudentName} 학생으로 확인되었습니다`;
        nameMsg.className = 'verify-msg ok';
      } else {
        // 명단에 없음
        el.classList.add('invalid');
        idStatus.textContent = '❌';
        idMsg.textContent = '명단에 없는 학번입니다. 선생님께 문의하세요.';
        idMsg.className = 'verify-msg err';
        nameInput.disabled = true;
      }
      updateEnterBtn();
    }, 400);
  };

  // 이름 입력 → 명단 대조 (명단 있을 때만 엄격하게)
  window.onNameInput = (el) => {
    const val = el.value.trim();
    const nameMsg = document.getElementById('nameMsg');
    const nameStatus = document.getElementById('nameStatus');

    el.classList.remove('valid', 'invalid');
    nameStatus.textContent = '';

    if (!val) {
      nameMsg.textContent = '';
      nameMsg.className = 'verify-msg';
      updateEnterBtn();
      return;
    }

    if (verifiedStudentName) {
      // 명단 이름과 비교
      if (val === verifiedStudentName) {
        el.classList.add('valid');
        nameStatus.textContent = '✅';
        nameMsg.textContent = '이름 일치';
        nameMsg.className = 'verify-msg ok';
      } else {
        el.classList.add('invalid');
        nameStatus.textContent = '❌';
        nameMsg.textContent = `이름이 일치하지 않습니다`;
        nameMsg.className = 'verify-msg err';
      }
    } else {
      // 명단 없이 형식만
      el.classList.add('valid');
      nameStatus.textContent = '✅';
      nameMsg.textContent = '';
    }
    updateEnterBtn();
  };

  function isLoginValid() {
    const id = document.getElementById('joinId').value.trim();
    const name = document.getElementById('joinName').value.trim();
    const nick = document.getElementById('joinNick').value.trim();
    if (!/^\d{5}$/.test(id)) return false;
    if (!name) return false;
    if (!nick) return false;
    // 명단 있으면 이름도 일치해야 함
    if (verifiedStudentName && name !== verifiedStudentName) return false;
    // 명단 있는데 학번이 없으면 불가
    if (studentMapLoaded && Object.keys(studentMap).length > 0 && !studentMap[id]) return false;
    return true;
  }

  function updateEnterBtn() {
    document.getElementById('enterBtn').disabled = !isLoginValid();
  }

  // 닉네임/신분 바뀌어도 버튼 상태 업데이트
  document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('joinNick').addEventListener('input', updateEnterBtn);
    document.getElementById('joinRole').addEventListener('change', updateEnterBtn);
    document.getElementById('postInput').addEventListener('input', function() {
      document.getElementById('charCount').textContent = `${this.value.length} / 300`;
    });
  });

  /* ════════════════════════════
     앱 진입
  ════════════════════════════ */
  window.enterApp = () => {
    const id   = document.getElementById('joinId').value.trim();
    const name = document.getElementById('joinName').value.trim();
    const nick = document.getElementById('joinNick').value.trim();
    const role = document.getElementById('joinRole').value;

    if (!isLoginValid()) return;

    currentUser = { id, name, nick, role };
    localStorage.setItem('s_threads_user', JSON.stringify(currentUser));
    showApp();
  };

  window.onload = async () => {
    const saved = localStorage.getItem('s_threads_user');
    if (saved) {
      currentUser = JSON.parse(saved);
      showApp();
    }
  };

  function showApp() {
    document.getElementById('loginOverlay').style.display = 'none';
    const appEl = document.getElementById('appContainer');
    appEl.style.display = 'flex';
    updateUI();
    listenFeed();
    listenToast();
  }

  function updateUI() {
    const icon = roleIcons[currentUser.role] || '?';
    document.getElementById('myAvatar').textContent = icon;
    document.getElementById('headerAvatar').textContent = icon;
    document.getElementById('headerNick').textContent = currentUser.nick;
    // 모달
    document.getElementById('modalAvatar').textContent = icon;
    document.getElementById('modalName').textContent = `${currentUser.name} (${currentUser.nick})`;
    document.getElementById('modalId').textContent = `학번 ${currentUser.id} · ${currentUser.role}`;
    document.getElementById('editNick').value = currentUser.nick;
    document.getElementById('editRole').value = currentUser.role;
  }

  /* ════════════════════════════
     피드
  ════════════════════════════ */
  function listenFeed() {
    onValue(postsRef, snap => {
      const data = snap.val();
      allPostsCache = data ? Object.values(data).filter(p => p && p.id) : [];
      renderFeed();
    });
  }

  function listenToast() {
    onValue(toastRef, snap => {
      const data = snap.val();
      if (!data) return;
      if (data.key === lastToastKey) return;
      lastToastKey = data.key;
      if (Date.now() - data.ts > 5000) return;
      showPickToast(data.content, data.nickname);
    });
  }

  function showPickToast(content, nickname) {
    const container = document.getElementById('toastContainer');
    const toast = document.createElement('div');
    toast.className = 'toast';
    const preview = content.length > 40 ? content.slice(0, 40) + '…' : content;
    toast.innerHTML = `
      <div class="toast-icon">⭐</div>
      <div class="toast-body">
        <div class="toast-title">선생님이 이 글을 Pick 했어요!</div>
        <div class="toast-msg">"${preview}"<br><span style="color:#f5a623;font-weight:700;">— ${nickname}</span></div>
      </div>
      <button class="toast-close" onclick="this.closest('.toast').remove()">×</button>
    `;
    container.appendChild(toast);
    setTimeout(() => {
      toast.classList.add('out');
      setTimeout(() => toast.remove(), 300);
    }, 5000);
  }

  window.setRoleFilter = (role, btn) => {
    currentRoleFilter = role;
    document.querySelectorAll('.role-tab').forEach(el => el.classList.remove('active'));
    btn.classList.add('active');
    renderFeed();
  };

  window.changeSort = (type) => {
    currentSort = type;
    document.getElementById('sortNewest').classList.toggle('active', type === 'newest');
    document.getElementById('sortPopular').classList.toggle('active', type === 'popular');
    renderFeed();
  };

  function renderFeed() {
    const feed = document.getElementById('feed');
    feed.innerHTML = '';
    let posts = allPostsCache.filter(p => p.studentId !== '00000');

    if (currentRoleFilter === 'pick') {
      posts = posts.filter(p => p.adminPick === true);
    } else if (currentRoleFilter !== 'all') {
      posts = posts.filter(p => p.role === currentRoleFilter);
    }

    if (currentSort === 'popular') {
      posts.sort((a, b) => (b.likes || 0) - (a.likes || 0) || b.id.localeCompare(a.id));
    } else {
      posts.sort((a, b) => b.id.localeCompare(a.id));
    }

    if (!posts.length) {
      feed.innerHTML = `<div class="empty-state">📭 아직 게시글이 없습니다.</div>`;
      return;
    }

    posts.forEach(post => {
      const isLiked = post.likedBy && post.likedBy[currentUser.id];
      const card = document.createElement('div');
      card.className = 'thread-card';

      const avatar = document.createElement('div');
      avatar.className = 'avatar-circle';
      avatar.textContent = roleIcons[post.role] || '?';

      const body = document.createElement('div');
      body.style.flex = '1';

      if (post.adminPick) {
        const badge = document.createElement('div');
        badge.className = 'pick-badge-dark';
        badge.textContent = '⭐ Pick';
        body.appendChild(badge);
      }

      const meta = document.createElement('div');
      meta.style.cssText = 'display:flex; align-items:center;';
      const nick = document.createElement('span');
      nick.className = 'nickname';
      nick.textContent = post.nickname;
      const roleTag = document.createElement('span');
      roleTag.className = 'role-tag';
      roleTag.textContent = post.role;
      const time = document.createElement('span');
      time.className = 'time';
      time.textContent = post.time;
      meta.append(nick, roleTag, time);

      const contentEl = document.createElement('div');
      contentEl.className = 'content-text';
      contentEl.textContent = post.content;

      const likeBtn = document.createElement('div');
      likeBtn.style.cssText = `color:${isLiked ? '#f91880' : '#777'}; cursor:pointer; font-size:13px; margin-top:4px; display:inline-block;`;
      likeBtn.textContent = `${isLiked ? '❤️' : '♡'} ${post.likes || 0}`;
      likeBtn.onclick = () => toggleLike(post.id, !!isLiked);

      body.append(meta, contentEl, likeBtn);
      card.append(avatar, body);
      feed.appendChild(card);
    });
  }

  window.toggleLike = async (postId, isLiked) => {
    const snap = await get(ref(db, `posts/${postId}`));
    const post = snap.val();
    if (!post) return;
    const updates = {};
    updates[`posts/${postId}/likes`] = Math.max(0, isLiked ? post.likes - 1 : post.likes + 1);
    updates[`posts/${postId}/likedBy/${currentUser.id}`] = isLiked ? null : true;
    update(ref(db), updates);
  };

  /* ════════════════════════════
     게시글 작성
  ════════════════════════════ */
  window.createPost = () => {
    const content = document.getElementById('postInput').value.trim();
    if (!content) return;
    const now = new Date();
    const time = `${now.getMonth()+1}.${now.getDate()}. ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
    const r = push(postsRef);
    set(r, {
      id: r.key,
      studentId: currentUser.id,
      realName: currentUser.name,
      nickname: currentUser.nick,
      role: currentUser.role,
      content, time, likes: 0,
      likedBy: { init: true }
    });
    document.getElementById('postInput').value = '';
    document.getElementById('charCount').textContent = '0 / 300';
  };

  /* ════════════════════════════
     프로필
  ════════════════════════════ */
  window.openProfile = () => {
    document.getElementById('modalAvatar').textContent = roleIcons[currentUser.role] || '?';
    document.getElementById('modalName').textContent = `${currentUser.name} (${currentUser.nick})`;
    document.getElementById('modalId').textContent = `학번 ${currentUser.id} · ${currentUser.role}`;
    document.getElementById('editNick').value = currentUser.nick;
    document.getElementById('editRole').value = currentUser.role;
    document.getElementById('profileModal').style.display = 'flex';
  };
  window.closeProfile = () => {
    document.getElementById('profileModal').style.display = 'none';
  };
  window.saveProfile = () => {
    const nick = document.getElementById('editNick').value.trim();
    if (!nick) { alert("닉네임을 입력하세요."); return; }
    currentUser.nick = nick;
    currentUser.role = document.getElementById('editRole').value;
    localStorage.setItem('s_threads_user', JSON.stringify(currentUser));
    updateUI();
    closeProfile();
  };
  window.logout = () => {
    if (confirm("로그아웃 하시겠습니까?")) {
      localStorage.removeItem('s_threads_user');
      location.reload();
    }
  };
</script>
</body>
</html>
