<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SILLAVER - 통일 신라 포털</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <style>
        :root { --naver-green: #03c75a; --bg-gray: #f5f6f7; --border-gray: #e3e5e8; --pick-gold: #ffb300; }
        * { box-sizing: border-box; }
        body { font-family: 'Pretendard', sans-serif; background-color: var(--bg-gray); margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        header { background: white; padding: 12px; text-align: center; border-bottom: 1px solid var(--border-gray); position: sticky; top: 0; z-index: 1000; width: 100%; }
        .logo { color: var(--naver-green); font-size: 26px; font-weight: 900; letter-spacing: -1.5px; text-decoration: none; }
        
        .container { width: 100%; max-width: 800px; margin: 0 auto; padding: 15px; }
        .box { background: white; border-radius: 12px; padding: 18px; border: 1px solid var(--border-gray); margin-bottom: 15px; width: 100%; }
        
        .section-title { font-size: 18px; font-weight: 800; color: #333; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
        .section-title::before { content: ''; width: 4px; height: 18px; background: var(--naver-green); display: inline-block; border-radius: 2px; }
        .section-desc { font-size: 13px; color: #777; margin-bottom: 15px; line-height: 1.4; }

        .user-info { display: flex; gap: 8px; margin-bottom: 15px; width: 100%; }
        .user-info input { flex: 1; min-width: 0; width: 100%; padding: 14px; border: 1px solid var(--border-gray); border-radius: 8px; font-size: 16px; outline: none; -webkit-appearance: none; }

        .search-area { border: 2px solid var(--naver-green); border-radius: 30px; display: flex; align-items: center; padding: 5px 18px; background: white; margin-bottom: 15px; width: 100%; }
        .search-area span { color: var(--naver-green); font-weight: 900; font-size: 24px; margin-right: 12px; }
        .search-area input { border: none; outline: none; width: 100%; height: 45px; font-size: 16px; font-weight: 500; min-width: 0; }

        .input-group { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
        .input-group label { width: 85px; font-size: 14px; font-weight: 700; color: #555; flex-shrink: 0; }
        .input-group input { flex: 1; min-width: 0; padding: 12px; border: 1px solid var(--border-gray); border-radius: 8px; font-size: 15px; outline: none; width: 100%; }
        .input-group input:focus { border-color: var(--naver-green); }

        .ad-textarea { width: 100%; min-height: 140px; padding: 15px; border: 1px solid var(--border-gray); border-radius: 8px; font-family: inherit; font-size: 16px; resize: none; outline: none; line-height: 1.5; }
        .ad-textarea:focus { border-color: var(--naver-green); }

        .btn-submit { background: var(--naver-green); color: white; border: none; width: 100%; padding: 18px; border-radius: 10px; font-size: 19px; font-weight: 800; cursor: pointer; transition: 0.2s; margin-top: 10px; box-shadow: 0 4px 10px rgba(3, 199, 90, 0.2); }
        .btn-submit:active { transform: scale(0.97); }
        .btn-submit:disabled { background: #aaa; box-shadow: none; cursor: not-allowed; }

        #result-view { display: none; }
        .rank-item { display: flex; justify-content: space-between; align-items: center; padding: 14px 0; border-bottom: 1px solid #f2f2f2; }
        .rank-left { display: flex; align-items: center; gap: 12px; }
        .rank-num { color: var(--naver-green); font-weight: 800; font-size: 17px; width: 22px; }
        .rank-word { font-weight: 600; font-size: 16px; color: #333; }
        .rank-count { font-size: 13px; color: #a1a1a1; font-weight: 500; }

        .tabs { display: flex; gap: 6px; overflow-x: auto; margin-bottom: 15px; padding-bottom: 8px; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
        .tabs::-webkit-scrollbar { display: none; }
        .tab-btn { padding: 9px 18px; border-radius: 20px; border: 1px solid var(--border-gray); background: white; white-space: nowrap; font-size: 14px; cursor: pointer; }
        .tab-btn.active { background: var(--naver-green); color: white; border-color: var(--naver-green); font-weight: 700; }

        .sort-tabs { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; }
        .sort-btn { padding: 7px 14px; border-radius: 16px; border: 1px solid var(--border-gray); background: white; font-size: 13px; cursor: pointer; font-weight: 600; color: #666; }
        .sort-btn.active { background: #333; color: white; border-color: #333; }
        .sort-btn.pick-active.active { background: var(--pick-gold); border-color: var(--pick-gold); color: white; }

        .news-card { border-bottom: 1px solid #f2f2f2; padding: 15px 0; position: relative; }
        .news-card.picked { background: linear-gradient(90deg, rgba(255,179,0,0.08) 0%, rgba(255,179,0,0) 100%); border-left: 3px solid var(--pick-gold); padding-left: 12px; margin-left: -12px; padding-right: 12px; border-radius: 6px; }
        .news-title { font-size: 16px; font-weight: 700; margin-bottom: 6px; line-height: 1.4; color: #222; }
        .news-meta { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
        .news-reporter { font-size: 13px; color: var(--naver-green); font-weight: 600; }
        .pick-badge { display: inline-flex; align-items: center; gap: 3px; background: var(--pick-gold); color: white; font-size: 11px; font-weight: 800; padding: 2px 8px; border-radius: 10px; margin-left: 6px; }

        .like-btn { display: inline-flex; align-items: center; gap: 5px; background: #f5f6f7; border: 1px solid var(--border-gray); padding: 6px 12px; border-radius: 16px; font-size: 13px; cursor: pointer; color: #666; font-weight: 600; transition: 0.15s; flex-shrink: 0; }
        .like-btn:active { transform: scale(0.94); }
        .like-btn.liked { background: #ffe8ec; border-color: #ff5872; color: #ff5872; }
        .like-btn .heart { font-size: 14px; }

        .ad-feed-item { background: #f9fdfa; border: 1px dashed var(--naver-green); padding: 18px; border-radius: 12px; margin-bottom: 12px; position: relative; }
        .ad-feed-item.picked { background: linear-gradient(135deg, rgba(255,179,0,0.1) 0%, rgba(249,253,250,1) 50%); border: 1px solid var(--pick-gold); }
        .ad-feed-content { font-size: 16px; font-weight: 500; line-height: 1.6; color: #444; white-space: pre-wrap; word-break: break-word; }
        .ad-feed-bottom { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; gap: 8px; }
        .ad-feed-author { font-size: 12px; color: #999; }
        
        .loading-text { text-align: center; padding: 30px; color: var(--naver-green); font-weight: 700; }

        .toast-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5000; display: flex; justify-content: center; align-items: flex-start; padding-top: 30vh; }
        .toast { background: linear-gradient(135deg, #ffb300 0%, #ff8c00 100%); color: white; padding: 24px 32px; border-radius: 18px; font-size: 18px; font-weight: 800; box-shadow: 0 10px 40px rgba(255, 140, 0, 0.4); text-align: center; max-width: 85%; transform: scale(0.5); opacity: 0; animation: toastPop 4s ease forwards; pointer-events: auto; }
        .toast .toast-emoji { font-size: 40px; display: block; margin-bottom: 8px; }
        .toast .toast-sub { font-size: 14px; font-weight: 500; opacity: 0.9; margin-top: 6px; display: block; }
        @keyframes toastPop {
            0% { transform: scale(0.5); opacity: 0; }
            10% { transform: scale(1.1); opacity: 1; }
            20% { transform: scale(1); opacity: 1; }
            85% { transform: scale(1); opacity: 1; }
            100% { transform: scale(0.9); opacity: 0; }
        }

        @media (max-width: 480px) {
            .user-info input { padding: 12px 10px; font-size: 15px; }
            .input-group label { width: 75px; font-size: 13px; }
            .news-meta { flex-wrap: wrap; }
        }
    </style>
</head>
<body>

<header>
    <a href="#" class="logo" onclick="location.reload()">SILLAVER</a>
</header>

<div class="container">
    <div id="input-view">
        <div class="user-info">
            <input type="text" id="user-id" placeholder="학번 (5자리)" maxlength="5" inputmode="numeric" pattern="[0-9]{5}">
            <input type="text" id="user-name" placeholder="이름">
        </div>

        <div class="search-area">
            <span>S</span>
            <input type="text" id="keywords" placeholder="검색어 3~5개 입력 (쉼표로 구분)">
        </div>

        <div class="box">
            <div class="section-title">분야별 뉴스 헤드라인 작성</div>
            <div class="section-desc">통일 신라의 각 분야를 가장 잘 나타내는 기사 제목을 지어보세요.</div>
            <div class="input-group"><label>🏛️ 정치</label><input type="text" class="news-input" data-cat="정치" placeholder="제목 입력"></div>
            <div class="input-group"><label>📜 중앙제도</label><input type="text" class="news-input" data-cat="중앙제도" placeholder="제목 입력"></div>
            <div class="input-group"><label>🗺️ 지방행정</label><input type="text" class="news-input" data-cat="지방행정" placeholder="제목 입력"></div>
            <div class="input-group"><label>⚔️ 군사</label><input type="text" class="news-input" data-cat="군사" placeholder="제목 입력"></div>
            <div class="input-group"><label>🌾 토지/경제</label><input type="text" class="news-input" data-cat="토지" placeholder="제목 입력"></div>
        </div>

        <div class="box">
            <div class="section-title">📢 광고 홍보 배너 작성</div>
            <div class="section-desc">가상의 제품이나, 신라의 정책을 홍보하는 배너 문구를 작성해 주세요.</div>
            <textarea id="ad-banner" class="ad-textarea" placeholder="아이디어가 돋보이는 홍보 문구를 작성해 봅시다."></textarea>
        </div>

        <button class="btn-submit" id="main-btn" onclick="submitSilla()">기사 발행 및 포털 접속</button>
    </div>

    <div id="result-view">
        <div class="box">
            <div class="section-title">실시간 급상승 검색어</div>
            <div id="trend-list"><div class="loading-text">집계 중...</div></div>
        </div>

        <div class="box">
            <div class="section-title">분야별 실시간 뉴스</div>
            <div class="tabs" id="tab-container">
                <button class="tab-btn active" onclick="filterNews('전체', this)">전체</button>
                <button class="tab-btn" onclick="filterNews('정치', this)">정치</button>
                <button class="tab-btn" onclick="filterNews('중앙제도', this)">중앙</button>
                <button class="tab-btn" onclick="filterNews('지방행정', this)">지방</button>
                <button class="tab-btn" onclick="filterNews('군사', this)">군사</button>
                <button class="tab-btn" onclick="filterNews('토지', this)">토지</button>
            </div>
            <div class="sort-tabs" id="news-sort-tabs">
                <button class="sort-btn active" data-sort="latest" onclick="setNewsSort('latest')">⏰ 최신순</button>
                <button class="sort-btn" data-sort="likes" onclick="setNewsSort('likes')">❤️ 좋아요순</button>
                <button class="sort-btn pick-active" data-sort="pick" onclick="setNewsSort('pick')">⭐ 픽 모아보기</button>
            </div>
            <div id="news-feed"></div>
        </div>

        <div class="box">
            <div class="section-title">SILLAVER 추천 광고</div>
            <div class="sort-tabs" id="ad-sort-tabs">
                <button class="sort-btn active" data-sort="latest" onclick="setAdSort('latest')">⏰ 최신순</button>
                <button class="sort-btn" data-sort="likes" onclick="setAdSort('likes')">❤️ 좋아요순</button>
                <button class="sort-btn pick-active" data-sort="pick" onclick="setAdSort('pick')">⭐ 픽 모아보기</button>
            </div>
            <div id="ad-feed"></div>
        </div>
        
        <button class="btn-submit" style="background:#888;" onclick="location.reload()">새로 작성하기</button>
    </div>

    <div style="text-align: center; margin-top: 40px; padding-bottom: 20px; color: #999;">
        <div style="font-size: 14px; font-weight: bold;">SILLAVER v1.3.0</div>
        <!-- 관리자 링크: 같은 폴더(mission/) 내 -->
        <button onclick="location.href='sillaver_admin.html'" style="background: none; border: none; color: #bbb; cursor: pointer; text-decoration: underline; margin-top: 8px; font-size: 13px;">관리자 모드</button>
    </div>
</div>

<div class="toast-overlay" id="toast-overlay" style="display:none;"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import {
        getFirestore, collection, addDoc, setDoc, updateDoc,
        onSnapshot, query, orderBy, getDocs, getDoc, where, serverTimestamp, doc
    } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDAc5S87JK-LtXzk5-iTR9rt7RnHWnUXTQ",
        authDomain: "ho0911seong-56638.firebaseapp.com",
        projectId: "ho0911seong-56638",
        storageBucket: "ho0911seong-56638.firebasestorage.app",
        messagingSenderId: "994509567071",
        appId: "1:994509567071:web:778c95931e95e9cbf557ea"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let allDocs = [];
    let currentUserId = "";
    let currentUserName = "";
    let currentDocId = "";
    let newsSortMode = "latest";
    let adSortMode = "latest";
    let currentNewsCategory = "전체";
    let lastPickedSelfTimes = {};
    let isFirstSnapshot = true;

    function escapeHtml(str) {
        if (typeof str !== 'string') return '';
        return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#x27;');
    }

    window.submitSilla = async function() {
        const userIdInput = document.getElementById('user-id');
        const userId = userIdInput.value.trim();
        const userName = document.getElementById('user-name').value.trim();
        const keywords = document.getElementById('keywords').value;
        const adContent = document.getElementById('ad-banner').value.trim();

        if (!userId || !userName || !keywords || !adContent) { alert("모든 항목을 빠짐없이 작성해주세요!"); return; }
        if (!/^\d{5}$/.test(userId)) { alert("학번은 숫자 5자리로 입력해주세요!"); userIdInput.focus(); return; }

        const rawArr = keywords.split(',').map(v => v.trim()).filter(v => v !== "");
        if (rawArr.length < 3) { alert("검색어를 3개 이상 입력해주세요!"); return; }

        const btn = document.getElementById('main-btn');
        btn.innerText = "확인 중...";
        btn.disabled = true;

        // ── 학생 명단 검증 ──────────────────────────
        try {
            const rosterSnap = await getDoc(doc(db, "silla_students", userId));
            if (!rosterSnap.exists()) {
                alert("명단에 없는 학번입니다.\n학번을 다시 확인해주세요.");
                btn.innerText = "기사 발행 및 포털 접속"; btn.disabled = false; return;
            }
            const rosterName = (rosterSnap.data().studentName || '').trim();
            if (rosterName !== userName) {
                alert(`이름이 일치하지 않습니다.\n입력한 이름: ${userName}\n등록된 이름: ${rosterName}`);
                btn.innerText = "기사 발행 및 포털 접속"; btn.disabled = false; return;
            }
        } catch (e) {
            alert("명단 확인 중 오류: " + e.message);
            btn.innerText = "기사 발행 및 포털 접속"; btn.disabled = false; return;
        }
        // ────────────────────────────────────────────

        btn.innerText = "발행 및 연결 중...";

        let existingDocId = null;
        try {
            const existingSnap = await getDocs(query(collection(db, "silla_v3"), where("studentId", "==", userId)));
            if (!existingSnap.empty) {
                const existingDoc = existingSnap.docs[0];
                const existingData = existingDoc.data();
                const ts = existingData.timestamp;
                let timeStr = '시각 미상';
                if (ts && ts.toDate) {
                    const d = ts.toDate(), pad = n => String(n).padStart(2,'0');
                    timeStr = `${pad(d.getMonth()+1)}월 ${pad(d.getDate())}일 ${pad(d.getHours())}:${pad(d.getMinutes())}`;
                }
                const confirmed = confirm(
                    `이미 제출한 기록이 있습니다.\n\n▪ 학번: ${existingData.studentId}\n▪ 이름: ${existingData.studentName}\n▪ 제출 시각: ${timeStr}\n\n그래도 다시 제출하시겠습니까?\n(기존 내용은 새 내용으로 덮어쓰기 됩니다.)`
                );
                if (!confirmed) { btn.innerText = "기사 발행 및 포털 접속"; btn.disabled = false; return; }
                existingDocId = existingDoc.id;
            }
        } catch (e) { console.error("중복 확인 실패:", e); }

        const newsArr = [];
        document.querySelectorAll('.news-input').forEach(input => {
            if (input.value.trim() !== "") newsArr.push({ category: input.dataset.cat, title: input.value.trim() });
        });

        const normalizedKeywords = rawArr.slice(0, 5).map(v => v.replace(/\s+/g, ' ').trim());

        try {
            const payload = {
                studentId: userId, studentName: userName,
                keywords: normalizedKeywords, news: newsArr, ad: adContent,
                timestamp: serverTimestamp()
            };

            if (existingDocId) {
                const oldDocRef = doc(db, "silla_v3", existingDocId);
                const oldData = (await getDoc(oldDocRef)).data() || {};
                payload.newsLikes = oldData.newsLikes || {};
                payload.newsPicks = oldData.newsPicks || {};
                payload.adLikes = oldData.adLikes || [];
                payload.adPick = oldData.adPick || false;
                payload.adPickedAt = oldData.adPickedAt || null;
                await setDoc(oldDocRef, payload);
                currentDocId = existingDocId;
            } else {
                payload.newsLikes = {}; payload.newsPicks = {};
                payload.adLikes = []; payload.adPick = false; payload.adPickedAt = null;
                const newDocRef = await addDoc(collection(db, "silla_v3"), payload);
                currentDocId = newDocRef.id;
            }

            currentUserId = userId; currentUserName = userName;
            document.getElementById('input-view').style.display = 'none';
            document.getElementById('result-view').style.display = 'block';
            window.scrollTo(0, 0);
            startListening();
        } catch (e) {
            alert("저장 오류: " + e.message);
            btn.innerText = "기사 발행 및 포털 접속"; btn.disabled = false;
        }
    };

    function startListening() {
        const q = query(collection(db, "silla_v3"), orderBy("timestamp", "desc"));
        onSnapshot(q, (snapshot) => {
            allDocs = [];
            let trendMap = {};
            snapshot.forEach(docSnap => {
                const data = docSnap.data();
                allDocs.push({ id: docSnap.id, ...data });
                (data.keywords || []).forEach(word => {
                    const key = word.replace(/\s+/g, '');
                    if (!trendMap[key]) trendMap[key] = { display: word, count: 0 };
                    trendMap[key].count += 1;
                });
            });
            checkPickToast();
            renderTrends(trendMap);
            renderNewsFeed();
            renderAdFeed();
            isFirstSnapshot = false;
        });
    }

    function checkPickToast() {
        if (!currentUserId) return;
        const myDoc = allDocs.find(d => d.studentId === currentUserId);
        if (!myDoc) return;
        const newsPicks = myDoc.newsPicks || {};
        Object.entries(newsPicks).forEach(([cat, info]) => {
            if (info && info.picked && info.pickedAt) {
                const pickedTimeMs = info.pickedAt.toMillis ? info.pickedAt.toMillis() : new Date(info.pickedAt).getTime();
                const trackKey = `news_${cat}`, lastSeen = lastPickedSelfTimes[trackKey] || 0;
                if (pickedTimeMs > lastSeen) {
                    lastPickedSelfTimes[trackKey] = pickedTimeMs;
                    if (!isFirstSnapshot) { const newsItem = (myDoc.news || []).find(n => n.category === cat); showPickToast(`"${newsItem ? newsItem.title : cat}"`, '기사'); }
                }
            }
        });
        if (myDoc.adPick && myDoc.adPickedAt) {
            const pickedTimeMs = myDoc.adPickedAt.toMillis ? myDoc.adPickedAt.toMillis() : new Date(myDoc.adPickedAt).getTime();
            const lastSeen = lastPickedSelfTimes['ad'] || 0;
            if (pickedTimeMs > lastSeen) {
                lastPickedSelfTimes['ad'] = pickedTimeMs;
                if (!isFirstSnapshot) showPickToast('내가 만든 광고', '광고');
            }
        }
        if (isFirstSnapshot) {
            Object.entries(newsPicks).forEach(([cat, info]) => {
                if (info && info.picked && info.pickedAt) lastPickedSelfTimes[`news_${cat}`] = info.pickedAt.toMillis ? info.pickedAt.toMillis() : new Date(info.pickedAt).getTime();
            });
            if (myDoc.adPick && myDoc.adPickedAt) lastPickedSelfTimes['ad'] = myDoc.adPickedAt.toMillis ? myDoc.adPickedAt.toMillis() : new Date(myDoc.adPickedAt).getTime();
        }
    }

    function showPickToast(title, kind) {
        const overlay = document.getElementById('toast-overlay');
        overlay.innerHTML = `<div class="toast"><span class="toast-emoji">⭐</span>선생님 PICK!<span class="toast-sub">${escapeHtml(currentUserName)}님의 ${escapeHtml(kind)}이(가) 선택되었습니다<br>${escapeHtml(title)}</span></div>`;
        overlay.style.display = 'flex';
        setTimeout(() => { overlay.style.display = 'none'; overlay.innerHTML = ''; }, 4000);
    }

    function renderTrends(map) {
        document.getElementById('trend-list').innerHTML = Object.values(map).sort((a,b)=>b.count-a.count).slice(0,10).map((item,i) =>
            `<div class="rank-item"><div class="rank-left"><span class="rank-num">${i+1}</span><span class="rank-word">${escapeHtml(item.display)}</span></div><span class="rank-count">${item.count}회 검색</span></div>`
        ).join('') || "데이터가 없습니다.";
    }

    function getFlattenedNews() {
        const arr = [];
        allDocs.forEach(d => {
            (d.news || []).forEach(n => {
                const cat = n.category, likes = (d.newsLikes && d.newsLikes[cat]) || [], pickInfo = (d.newsPicks && d.newsPicks[cat]) || {};
                arr.push({ docId: d.id, title: n.title, category: cat, studentId: d.studentId, studentName: d.studentName, timestamp: d.timestamp, likes, likeCount: likes.length, picked: !!pickInfo.picked, pickedAt: pickInfo.pickedAt || null });
            });
        });
        return arr;
    }

    window.setNewsSort = function(mode) {
        newsSortMode = mode;
        document.querySelectorAll('#news-sort-tabs .sort-btn').forEach(b => b.classList.toggle('active', b.dataset.sort === mode));
        renderNewsFeed();
    };

    window.setAdSort = function(mode) {
        adSortMode = mode;
        document.querySelectorAll('#ad-sort-tabs .sort-btn').forEach(b => b.classList.toggle('active', b.dataset.sort === mode));
        renderAdFeed();
    };

    window.filterNews = function(category, btnEl) {
        currentNewsCategory = category;
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        if (btnEl) btnEl.classList.add('active');
        renderNewsFeed();
    };

    function renderNewsFeed() {
        const target = document.getElementById('news-feed');
        let items = getFlattenedNews();
        if (currentNewsCategory !== '전체') items = items.filter(n => n.category === currentNewsCategory);
        if (newsSortMode === 'latest') items.sort((a,b) => (b.timestamp?.toMillis?.()||0)-(a.timestamp?.toMillis?.()||0));
        else if (newsSortMode === 'likes') items.sort((a,b) => b.likeCount-a.likeCount);
        else if (newsSortMode === 'pick') { items = items.filter(n=>n.picked); items.sort((a,b)=>(b.pickedAt?.toMillis?.()||0)-(a.pickedAt?.toMillis?.()||0)); }
        if (items.length === 0) { target.innerHTML = `<p style="padding:20px;color:#999;text-align:center;">${newsSortMode==='pick'?'아직 픽된 기사가 없습니다.':'작성된 기사가 없습니다.'}</p>`; return; }
        target.innerHTML = items.map(n => {
            const categoryLabel = currentNewsCategory === '전체' ? ` | ${escapeHtml(n.category)}` : '';
            const liked = currentUserId && n.likes.includes(currentUserId);
            return `<div class="news-card${n.picked?' picked':''}">
                <div class="news-title">${escapeHtml(n.title)}${n.picked?`<span class="pick-badge">⭐ PICK</span>`:''}</div>
                <div class="news-meta">
                    <div class="news-reporter">${escapeHtml(n.studentId)} ${escapeHtml(n.studentName)} 기자${categoryLabel}</div>
                    <button class="like-btn ${liked?'liked':''}" onclick="toggleNewsLike('${n.docId}','${escapeHtml(n.category)}')">
                        <span class="heart">${liked?'❤️':'🤍'}</span> ${n.likeCount}
                    </button>
                </div>
            </div>`;
        }).join('');
    }

    function getFlattenedAds() {
        return allDocs.filter(d=>d.ad).map(d=>({ docId:d.id, content:d.ad, studentId:d.studentId, studentName:d.studentName, timestamp:d.timestamp, likes:d.adLikes||[], likeCount:(d.adLikes||[]).length, picked:!!d.adPick, pickedAt:d.adPickedAt||null }));
    }

    function renderAdFeed() {
        const target = document.getElementById('ad-feed');
        let items = getFlattenedAds();
        if (adSortMode === 'latest') items.sort((a,b)=>(b.timestamp?.toMillis?.()||0)-(a.timestamp?.toMillis?.()||0));
        else if (adSortMode === 'likes') items.sort((a,b)=>b.likeCount-a.likeCount);
        else if (adSortMode === 'pick') { items=items.filter(a=>a.picked); items.sort((a,b)=>(b.pickedAt?.toMillis?.()||0)-(a.pickedAt?.toMillis?.()||0)); }
        if (items.length === 0) { target.innerHTML = `<p style="padding:20px;color:#999;text-align:center;">${adSortMode==='pick'?'아직 픽된 광고가 없습니다.':'등록된 광고가 없습니다.'}</p>`; return; }
        target.innerHTML = items.map(ad => {
            const liked = currentUserId && ad.likes.includes(currentUserId);
            return `<div class="ad-feed-item${ad.picked?' picked':''}">
                <div class="ad-feed-content">${escapeHtml(ad.content)}${ad.picked?`<span class="pick-badge">⭐ PICK</span>`:''}</div>
                <div class="ad-feed-bottom">
                    <span class="ad-feed-author">AD BY. ${escapeHtml(ad.studentId)} ${escapeHtml(ad.studentName)}</span>
                    <button class="like-btn ${liked?'liked':''}" onclick="toggleAdLike('${ad.docId}')">
                        <span class="heart">${liked?'❤️':'🤍'}</span> ${ad.likeCount}
                    </button>
                </div>
            </div>`;
        }).join('');
    }

    window.toggleNewsLike = async function(docId, category) {
        if (!currentUserId) { alert("좋아요는 본인 학번으로 제출 후에 누를 수 있어요!"); return; }
        try {
            const docRef = doc(db, "silla_v3", docId);
            const snap = await getDoc(docRef);
            if (!snap.exists()) return;
            const data = snap.data(), newsLikes = data.newsLikes || {}, arr = newsLikes[category] || [];
            const idx = arr.indexOf(currentUserId);
            if (idx >= 0) arr.splice(idx, 1); else arr.push(currentUserId);
            newsLikes[category] = arr;
            await updateDoc(docRef, { newsLikes });
        } catch (e) { console.error(e); }
    };

    window.toggleAdLike = async function(docId) {
        if (!currentUserId) { alert("좋아요는 본인 학번으로 제출 후에 누를 수 있어요!"); return; }
        try {
            const docRef = doc(db, "silla_v3", docId);
            const snap = await getDoc(docRef);
            if (!snap.exists()) return;
            const arr = snap.data().adLikes || [], idx = arr.indexOf(currentUserId);
            if (idx >= 0) arr.splice(idx, 1); else arr.push(currentUserId);
            await updateDoc(docRef, { adLikes: arr });
        } catch (e) { console.error(e); }
    };
</script>

</body>
</html>
