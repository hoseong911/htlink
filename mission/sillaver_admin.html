<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SILLAVER 관리자 센터</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --admin-red: #d32f2f; --naver-green: #03c75a; --pick-color: #fbbc04; }
        body { font-family: 'Pretendard', sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; }
        .container { max-width: 1100px; margin: 0 auto; }

        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: flex; justify-content: center; align-items: center; z-index: 2000; }
        .login-box { background: white; padding: 40px; border-radius: 12px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .login-box h2 { color: var(--naver-green); margin-top: 0; }
        .login-box input { padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 18px; width: 220px; text-align: center; display: block; margin: 20px auto; outline: none; }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        h1 { margin: 0; font-size: 22px; color: #333; }
        .btn { padding: 8px 16px; border-radius: 6px; border: none; font-weight: bold; cursor: pointer; font-size: 14px; transition: 0.2s; }
        .btn-green { background: var(--naver-green); color: white; }
        .btn-blue { background: #1565c0; color: white; }
        .btn-red { background: var(--admin-red); color: white; }

        /* 메인 탭 */
        .main-tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .main-tab { flex: 1; padding: 15px; text-align: center; background: #e0e0e0; font-size: 18px; font-weight: bold; border-radius: 8px; cursor: pointer; color: #555; }
        .main-tab.active { background: var(--naver-green); color: white; }

        /* 서브 탭 */
        .sub-tabs { margin-bottom: 15px; display: flex; gap: 8px; flex-wrap: wrap; }
        .sub-tab { padding: 8px 15px; background: white; border: 1px solid #ccc; border-radius: 20px; cursor: pointer; font-size: 14px; }
        .sub-tab.active { background: #333; color: white; border-color: #333; }

        /* 통계 카드 */
        .stats-bar { display: flex; gap: 15px; margin-bottom: 20px; }
        .stat-card { background: white; border-radius: 10px; padding: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); flex: 1; text-align: center; }
        .stat-value { font-size: 26px; font-weight: 900; color: var(--naver-green); margin-top: 5px; }

        .content-section { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); display: none; }
        .content-section.active { display: block; }

        table { width: 100%; border-collapse: collapse; }
        th { background: #f8f9fa; padding: 12px; text-align: left; border-bottom: 2px solid #eee; font-size: 14px; }
        td { padding: 12px; border-bottom: 1px solid #eee; font-size: 14px; vertical-align: middle; }

        .pick-btn { background: none; border: 1px solid #ccc; padding: 5px 10px; border-radius: 20px; cursor: pointer; font-size: 13px; font-weight: bold; color: #666; transition: 0.2s; }
        .pick-btn.picked { border-color: var(--pick-color); background: #fffde7; color: #f57f17; }
        
        .tag-cat { background: #e3f2fd; color: #1565c0; padding: 3px 6px; border-radius: 4px; font-size: 12px; font-weight: bold; margin-right: 5px; }
        .likes-badge { color: #ff4757; font-weight: bold; font-size: 13px; margin-left: 5px; }
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="login-box">
        <h2>SILLAVER 관리자 접속</h2>
        <input type="password" id="admin-pw" placeholder="비밀번호 입력" onkeypress="if(event.keyCode==13) checkLogin()">
        <button class="btn btn-green" onclick="checkLogin()">접속</button>
    </div>
</div>

<div class="container" id="admin-main" style="display:none;">
    <div class="header">
        <h1>⚙️ SILLAVER 관리 대시보드</h1>
        <div style="display:flex; gap:10px;">
            <button class="btn btn-blue" onclick="exportToExcel()">📥 엑셀 저장</button>
            <button class="btn btn-red" onclick="resetAll()">전체 초기화</button>
        </div>
    </div>

    <!-- 메인 탭 -->
    <div class="main-tabs">
        <div class="main-tab active" onclick="switchMainTab('posts', this)">📝 게시글 관리</div>
        <div class="main-tab" onclick="switchMainTab('stats', this)">📊 통계 (학생별 열람)</div>
    </div>

    <!-- 게시글 관리 섹션 -->
    <div id="sec-posts" class="content-section active">
        <div class="sub-tabs" id="post-type-tabs">
            <div class="sub-tab active" onclick="renderPosts('all')">전체보기</div>
            <div class="sub-tab" onclick="renderPosts('keywords')">검색어 순위</div>
            <div class="sub-tab" onclick="renderPosts('news')">기사 헤드라인</div>
            <div class="sub-tab" onclick="renderPosts('ad')">광고 내용</div>
        </div>
        
        <!-- 기사 카테고리 필터 (기사 탭일 때만 보임) -->
        <div class="sub-tabs" id="news-cat-tabs" style="display:none; background:#f9f9f9; padding:10px; border-radius:8px;">
            <span style="font-size:13px; font-weight:bold; color:#666; margin-top:5px;">기사 분야:</span>
            <div class="sub-tab active" onclick="renderNewsCat('전체')">전체</div>
            <div class="sub-tab" onclick="renderNewsCat('정치')">정치</div>
            <div class="sub-tab" onclick="renderNewsCat('중앙제도')">중앙제도</div>
            <div class="sub-tab" onclick="renderNewsCat('지방행정')">지방행정</div>
            <div class="sub-tab" onclick="renderNewsCat('군사')">군사</div>
            <div class="sub-tab" onclick="renderNewsCat('토지')">토지</div>
        </div>

        <table id="post-table">
            <thead id="post-thead"></thead>
            <tbody id="post-tbody"></tbody>
        </table>
    </div>

    <!-- 통계 섹션 -->
    <div id="sec-stats" class="content-section">
        <div class="stats-bar">
            <div class="stat-card">총 제출 학생 <div class="stat-value" id="s-total">0</div></div>
            <div class="stat-card">작성된 기사 <div class="stat-value" id="s-news">0</div></div>
            <div class="stat-card">작성된 광고 <div class="stat-value" id="s-ad">0</div></div>
            <div class="stat-card">총 검색어 수 <div class="stat-value" id="s-key">0</div></div>
        </div>
        <table>
            <thead><tr><th>학번</th><th>이름</th><th>검색어</th><th>기사 수</th><th>광고 작성</th><th>관리</th></tr></thead>
            <tbody id="stat-tbody"></tbody>
        </table>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getFirestore, collection, onSnapshot, query, doc, getDoc, updateDoc, deleteDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    const app = initializeApp({
        apiKey: "AIzaSyDAc5S87JK-LtXzk5-iTR9rt7RnHWnUXTQ",
        authDomain: "ho0911seong-56638.firebaseapp.com",
        projectId: "ho0911seong-56638"
    });
    const db = getFirestore(app);

    let rawData = [];
    let currentPostView = 'all';
    let currentNewsFilter = '전체';
    const esc = str => typeof str === 'string' ? str.replace(/</g,'&lt;').replace(/>/g,'&gt;') : '';

    window.checkLogin = () => {
        if(document.getElementById('admin-pw').value === '1234') {
            document.getElementById('login-overlay').style.display='none';
            document.getElementById('admin-main').style.display='block';
            fetchData();
        } else alert("비밀번호 오류");
    };

    window.switchMainTab = (id, el) => {
        document.querySelectorAll('.main-tab').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
        document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
        document.getElementById('sec-' + id).classList.add('active');
    };

    function fetchData() {
        onSnapshot(collection(db, "silla_v3"), snap => {
            rawData = [];
            snap.forEach(d => rawData.push({ id: d.id, ...d.data() }));
            updateStats();
            renderPosts(currentPostView);
        });
    }

    function updateStats() {
        let n=0, a=0, k=0;
        let html = '';
        rawData.forEach(d => {
            const newsLen = (d.news||[]).length;
            n += newsLen;
            if(d.ad) a++;
            k += (d.keywords||[]).length;

            html += `<tr>
                <td>${esc(d.studentId)}</td><td><b>${esc(d.studentName)}</b></td>
                <td style="font-size:12px;">${(d.keywords||[]).join(', ')}</td>
                <td>${newsLen}건</td><td>${d.ad ? 'O' : 'X'}</td>
                <td><button class="btn btn-red" style="padding:4px 8px; font-size:11px;" onclick="deleteUser('${d.id}')">삭제</button></td>
            </tr>`;
        });
        document.getElementById('s-total').innerText = rawData.length;
        document.getElementById('s-news').innerText = n;
        document.getElementById('s-ad').innerText = a;
        document.getElementById('s-key').innerText = k;
        document.getElementById('stat-tbody').innerHTML = html;
    }

    window.renderPosts = (type) => {
        currentPostView = type;
        document.querySelectorAll('#post-type-tabs .sub-tab').forEach(t => t.classList.remove('active'));
        event.currentTarget?.classList.add('active');
        
        document.getElementById('news-cat-tabs').style.display = (type === 'news' || type === 'all') ? 'flex' : 'none';
        
        const thead = document.getElementById('post-thead');
        const tbody = document.getElementById('post-tbody');
        let html = '';

        if(type === 'keywords') {
            thead.innerHTML = '<tr><th>순위</th><th>검색어</th><th>검색 횟수</th></tr>';
            let map = {};
            rawData.forEach(d => (d.keywords||[]).forEach(w => { map[w] = (map[w]||0)+1; }));
            const sorted = Object.entries(map).sort((a,b)=>b[1]-a[1]);
            sorted.forEach((item, i) => {
                html += `<tr><td>${i+1}위</td><td><b>${esc(item[0])}</b></td><td>${item[1]}회</td></tr>`;
            });
        } 
        else if (type === 'ad') {
            thead.innerHTML = '<tr><th>학생</th><th>광고 내용</th><th>좋아요</th><th>교사 Pick</th></tr>';
            rawData.forEach(d => {
                if(!d.ad) return;
                const adText = typeof d.ad === 'string' ? d.ad : d.ad.text;
                const likes = d.ad.likes || 0;
                const isPick = d.ad.pick || false;
                const adId = d.ad.id || 'old';
                
                html += `<tr>
                    <td>${esc(d.studentId)} ${esc(d.studentName)}</td>
                    <td>${esc(adText)}</td>
                    <td>❤️ ${likes}</td>
                    <td><button class="pick-btn ${isPick?'picked':''}" onclick="togglePick('${d.id}', '${adId}', 'ad')">
                        ${isPick ? '⭐ Picked' : '☆ Pick'}
                    </button></td>
                </tr>`;
            });
        } 
        else { // news 또는 all
            thead.innerHTML = '<tr><th>학생</th><th>분야</th><th>헤드라인 제목</th><th>교사 Pick</th></tr>';
            rawData.forEach(d => {
                (d.news||[]).forEach(n => {
                    if(currentNewsFilter !== '전체' && n.category !== currentNewsFilter) return;
                    html += `<tr>
                        <td>${esc(d.studentId)} ${esc(d.studentName)}</td>
                        <td><span class="tag-cat">${esc(n.category)}</span></td>
                        <td>${esc(n.title)} <span class="likes-badge">❤️ ${n.likes||0}</span></td>
                        <td><button class="pick-btn ${n.pick?'picked':''}" onclick="togglePick('${d.id}', '${n.id}', 'news')">
                            ${n.pick ? '⭐ Picked' : '☆ Pick'}
                        </button></td>
                    </tr>`;
                });
            });
        }
        tbody.innerHTML = html || '<tr><td colspan="4" style="text-align:center;color:#999;">데이터가 없습니다.</td></tr>';
    };

    window.renderNewsCat = (cat) => {
        currentNewsFilter = cat;
        document.querySelectorAll('#news-cat-tabs .sub-tab').forEach(t => t.classList.remove('active'));
        event.currentTarget?.classList.add('active');
        renderPosts(currentPostView === 'all' ? 'all' : 'news');
    };

    window.togglePick = async (docId, itemId, type) => {
        const docRef = doc(db, "silla_v3", docId);
        const snap = await getDoc(docRef);
        if(snap.exists()){
            let data = snap.data();
            if(type === 'news') {
                data.news = data.news.map(n => { if(n.id === itemId) n.pick = !n.pick; return n; });
            } else if (type === 'ad') {
                data.ad.pick = !data.ad.pick;
            }
            await updateDoc(docRef, { news: data.news, ad: data.ad });
        }
    };

    window.deleteUser = async (id) => {
        if(confirm("이 학생의 데이터를 삭제하시겠습니까?")) await deleteDoc(doc(db, "silla_v3", id));
    };

    window.resetAll = async () => {
        if(confirm("🚨 경고: 모든 데이터를 삭제합니다! 진행하시겠습니까?")) {
            const snap = await getDocs(collection(db, "silla_v3"));
            snap.docs.forEach(d => deleteDoc(doc(db, "silla_v3", d.id)));
        }
    };
    
    // (엑셀 코드는 이전과 동일하게 유지하거나 필요시 추가)
    window.exportToExcel = () => { alert("데이터가 많아 복사가 필요합니다. (생략된 기존 엑셀 함수 사용)"); };
</script>
</body>
</html>
