<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Blind - 려</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
  <style>
    :root {
      --bg: #fff;
      --surface: #f7f8fa;
      --card: #fff;
      --text: #1a1a1a;
      --sub: #666;
      --muted: #999;
      --border: #e8e8e8;
      --border-dark: #d0d0d0;
      --accent: #00c4b4;
      --accent-dark: #00a89a;
      --danger: #ff4757;
      --like: #888;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--surface);
      color: var(--text);
      font-family: 'Pretendard', -apple-system, sans-serif;
      display: flex; justify-content: center;
      min-height: 100vh;
    }

    /* ── 로그인 ── */
    #loginOverlay {
      position: fixed; inset: 0;
      background: #fff;
      z-index: 1000;
      display: flex; flex-direction: column;
      align-items: center; justify-content: flex-start;
      overflow-y: auto;
    }
    .login-wrap {
      width: 100%; max-width: 480px;
      padding: 40px 24px 60px;
    }
    .login-logo {
      text-align: center; margin-bottom: 28px;
    }
    .login-logo .logo-text {
      font-size: 2rem; font-weight: 800;
      color: var(--accent); letter-spacing: -0.03em;
    }
    .login-logo .logo-sub {
      font-size: 12px; color: var(--muted);
      margin-top: 4px; letter-spacing: 0.01em;
    }

    .section-title {
      font-size: 13px; font-weight: 700;
      color: var(--text); margin-bottom: 10px;
      display: flex; align-items: center; gap: 6px;
    }
    .section-title .req {
      font-size: 10px; font-weight: 600;
      color: #fff; background: var(--accent);
      padding: 1px 6px; border-radius: 3px;
    }

    .input-field {
      width: 100%; padding: 13px 14px;
      border: 1px solid var(--border-dark);
      border-radius: 8px;
      font-size: 15px; font-family: 'Pretendard', sans-serif;
      color: var(--text); background: #fff;
      margin-bottom: 10px;
      outline: none; transition: border-color 0.15s;
    }
    .input-field:focus { border-color: var(--accent); }
    .input-field::placeholder { color: var(--muted); }

    /* 기관 선택 그리드 */
    .org-category {
      margin-bottom: 16px;
    }
    .org-cat-label {
      font-size: 11px; font-weight: 700;
      color: var(--muted); letter-spacing: 0.08em;
      text-transform: uppercase; margin-bottom: 7px;
      padding-left: 2px;
    }
    .org-grid {
      display: flex; flex-wrap: wrap; gap: 7px;
    }
    .org-chip {
      padding: 7px 13px;
      border: 1.5px solid var(--border-dark);
      border-radius: 20px;
      font-size: 13px; font-weight: 500;
      color: var(--sub);
      background: #fff;
      cursor: pointer;
      transition: all 0.12s;
      font-family: 'Pretendard', sans-serif;
    }
    .org-chip:hover { border-color: var(--accent); color: var(--accent); }
    .org-chip.selected {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
      font-weight: 600;
    }

    .info-box {
      background: #f0fffe; border: 1px solid #b2ede9;
      border-radius: 8px; padding: 11px 14px;
      font-size: 12px; color: #00857a;
      margin-bottom: 18px; line-height: 1.6;
    }

    .btn-main {
      width: 100%; padding: 15px;
      background: var(--accent); color: #fff;
      border: none; border-radius: 8px;
      font-size: 16px; font-weight: 700;
      font-family: 'Pretendard', sans-serif;
      cursor: pointer; transition: background 0.15s;
    }
    .btn-main:hover { background: var(--accent-dark); }
    .btn-gray { background: #f0f0f0; color: var(--sub); }
    .btn-gray:hover { background: #e4e4e4; }
    .btn-red { background: #fff; color: var(--danger); border: 1px solid #ffd0d0; }
    .btn-red:hover { background: #fff0f0; }

    .err-msg {
      font-size: 12px; color: var(--danger);
      margin-bottom: 10px; padding: 0 2px; display: none;
    }
    .err-msg.show { display: block; }

    .divider { height: 1px; background: var(--border); margin: 16px 0; }

    /* ── 앱 ── */
    #appContainer {
      display: none; width: 100%; max-width: 480px;
      min-height: 100vh; flex-direction: column;
      background: var(--surface);
    }

    /* 헤더 */
    header {
      background: #fff; border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 100;
    }
    .header-top {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 16px; height: 52px;
    }
    .header-logo {
      font-size: 1.25rem; font-weight: 800;
      color: var(--accent); letter-spacing: -0.02em;
    }
    .header-right { display: flex; align-items: center; gap: 8px; }
    .icon-btn {
      width: 34px; height: 34px;
      display: flex; align-items: center; justify-content: center;
      border: none; background: none; cursor: pointer;
      border-radius: 50%; color: var(--sub);
      font-size: 18px; transition: background 0.12s;
    }
    .icon-btn:hover { background: var(--surface); }

    /* 탭 바 */
    .tab-bar {
      display: flex; border-top: 1px solid var(--border);
      overflow-x: auto; scrollbar-width: none;
    }
    .tab-bar::-webkit-scrollbar { display: none; }
    .tab-item {
      flex-shrink: 0; padding: 10px 16px;
      font-size: 13px; font-weight: 500;
      color: var(--muted); cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.12s;
      font-family: 'Pretendard', sans-serif;
      border: none; background: none;
      white-space: nowrap;
    }
    .tab-item.active { color: var(--accent); border-bottom: 2px solid var(--accent); font-weight: 700; }

    /* 정렬 바 */
    .sort-bar {
      display: flex; justify-content: flex-end; align-items: center;
      padding: 8px 14px; background: #fff;
      border-bottom: 1px solid var(--border);
      gap: 4px;
    }
    .sort-btn {
      font-size: 12px; color: var(--muted);
      border: none; background: none; cursor: pointer;
      font-family: 'Pretendard', sans-serif; padding: 3px 6px;
      border-radius: 4px; transition: 0.12s;
    }
    .sort-btn.active { color: var(--text); font-weight: 700; background: var(--surface); }
    .sort-dot { color: var(--border-dark); font-size: 10px; }

    /* 게시글 작성 */
    .post-composer {
      background: #fff; padding: 14px 16px;
      border-bottom: 6px solid var(--surface);
    }
    .composer-top {
      display: flex; align-items: flex-start; gap: 10px;
    }
    .my-org-badge {
      font-size: 11px; font-weight: 700;
      color: var(--accent); background: #f0fffe;
      border: 1px solid #b2ede9; border-radius: 4px;
      padding: 3px 8px; white-space: nowrap; flex-shrink: 0;
    }
    .composer-input {
      flex: 1; border: none; outline: none;
      font-size: 15px; font-family: 'Pretendard', sans-serif;
      color: var(--text); resize: none;
      min-height: 48px; background: transparent;
    }
    .composer-input::placeholder { color: var(--muted); }
    .composer-bottom {
      display: flex; justify-content: space-between; align-items: center;
      margin-top: 10px; padding-top: 10px;
      border-top: 1px solid var(--border);
    }
    .char-count { font-size: 11px; color: var(--muted); }
    .post-btn {
      padding: 7px 18px;
      background: var(--accent); color: #fff;
      border: none; border-radius: 5px;
      font-size: 13px; font-weight: 700;
      font-family: 'Pretendard', sans-serif;
      cursor: pointer;
    }
    .post-btn:disabled { background: var(--border-dark); cursor: default; }

    /* 피드 */
    #feed { flex: 1; }

    /* 게시글 카드 */
    .post-card {
      background: #fff; margin-bottom: 1px;
      padding: 16px 16px 12px;
      cursor: pointer; transition: background 0.1s;
    }
    .post-card:hover { background: #fafafa; }

    .post-top {
      display: flex; align-items: center;
      margin-bottom: 3px; gap: 6px;
    }
    .post-org {
      font-size: 12px; font-weight: 700; color: var(--text);
    }
    .post-nick {
      font-size: 12px; color: var(--muted);
    }
    .post-time { font-size: 11px; color: var(--muted); margin-left: auto; }

    /* 기관 유형 태그 */
    .cat-dot {
      width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
    }
    .cat-dot.central  { background: #00c4b4; }
    .cat-dot.local    { background: #4a90e2; }
    .cat-dot.military { background: #e24a4a; }
    .cat-dot.edu      { background: #9b4ae2; }

    .post-title {
      font-size: 16px; font-weight: 700;
      color: var(--text); margin: 6px 0 5px;
      line-height: 1.4;
    }
    .post-body {
      font-size: 14px; color: #444;
      line-height: 1.6; margin-bottom: 10px;
      display: -webkit-box; -webkit-line-clamp: 3;
      -webkit-box-orient: vertical; overflow: hidden;
    }
    .post-body.expanded {
      display: block; -webkit-line-clamp: unset;
    }

    /* 하단 액션 바 */
    .post-actions {
      display: flex; align-items: center; gap: 14px;
      padding-top: 8px; border-top: 1px solid var(--border);
    }
    .action-btn {
      display: flex; align-items: center; gap: 4px;
      font-size: 12px; color: var(--muted);
      cursor: pointer; user-select: none;
      border: none; background: none;
      font-family: 'Pretendard', sans-serif;
      padding: 0;
    }
    .action-btn:hover { color: var(--sub); }
    .action-btn.liked { color: var(--danger); }
    .action-btn svg { width: 15px; height: 15px; }

    /* 빈 상태 */
    .empty-state {
      padding: 60px 20px; text-align: center; color: var(--muted);
      font-size: 14px; line-height: 1.7;
    }
    .empty-state .icon { font-size: 40px; margin-bottom: 12px; }

    /* 더보기 */
    .more-btn {
      font-size: 12px; color: var(--accent);
      background: none; border: none; cursor: pointer;
      font-family: 'Pretendard', sans-serif;
      padding: 0; margin-bottom: 8px;
    }

    /* ── 모달들 ── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 500; display: none;
      align-items: flex-end; justify-content: center;
    }
    .modal-overlay.show { display: flex; }
    .modal-sheet {
      background: #fff; width: 100%; max-width: 480px;
      border-radius: 16px 16px 0 0;
      padding: 20px 20px 40px;
      max-height: 90vh; overflow-y: auto;
    }
    .modal-handle {
      width: 36px; height: 4px; background: #ddd;
      border-radius: 2px; margin: 0 auto 18px;
    }
    .modal-title {
      font-size: 16px; font-weight: 700;
      margin-bottom: 16px; color: var(--text);
    }
    .modal-input {
      width: 100%; padding: 12px 14px;
      border: 1px solid var(--border-dark); border-radius: 8px;
      font-size: 15px; font-family: 'Pretendard', sans-serif;
      color: var(--text); outline: none; margin-bottom: 10px;
    }
    .modal-input:focus { border-color: var(--accent); }
    .modal-btn {
      width: 100%; padding: 13px;
      border-radius: 8px; border: none;
      font-size: 15px; font-weight: 700;
      font-family: 'Pretendard', sans-serif;
      cursor: pointer; margin-bottom: 8px;
    }
    .modal-btn.primary { background: var(--accent); color: #fff; }
    .modal-btn.gray { background: #f0f0f0; color: var(--sub); }
    .modal-btn.red { background: #fff; color: var(--danger); border: 1px solid #ffdede; }

    /* ── 관리자 ── */
    #adminOverlay {
      position: fixed; inset: 0;
      background: #fff; z-index: 2000;
      display: none; flex-direction: column;
      overflow-y: auto;
    }
    .admin-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 16px; border-bottom: 1px solid var(--border);
      position: sticky; top: 0; background: #fff; z-index: 1;
    }
    .admin-header h2 { font-size: 16px; font-weight: 700; }
    .admin-close {
      font-size: 22px; background: none; border: none; cursor: pointer; color: var(--sub);
    }
    .admin-body { padding: 16px; max-width: 700px; margin: 0 auto; width: 100%; }
    .admin-tabs { display: flex; border-bottom: 1px solid var(--border); margin-bottom: 16px; }
    .admin-tab {
      padding: 9px 16px; border: none; background: none;
      font-size: 13px; font-weight: 500; color: var(--muted);
      cursor: pointer; border-bottom: 2px solid transparent;
      font-family: 'Pretendard', sans-serif; transition: 0.15s;
    }
    .admin-tab.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 700; }
    .admin-panel { display: none; }
    .admin-panel.active { display: block; }

    .search-input {
      width: 100%; padding: 10px 14px;
      border: 1px solid var(--border-dark); border-radius: 8px;
      font-size: 13px; font-family: 'Pretendard', sans-serif;
      outline: none; margin-bottom: 12px;
    }
    .search-input:focus { border-color: var(--accent); }

    .admin-table { width: 100%; border-collapse: collapse; font-size: 12px; }
    .admin-table th {
      background: var(--surface); padding: 9px 8px;
      text-align: left; border-bottom: 1px solid var(--border);
      color: var(--sub); font-weight: 600; font-size: 11px;
    }
    .admin-table td { padding: 8px; border-bottom: 1px solid var(--border); vertical-align: top; }
    .admin-table tr:hover td { background: #fafafa; }
    .del-btn {
      background: #fff; color: var(--danger);
      border: 1px solid #ffdede; border-radius: 5px;
      padding: 3px 8px; cursor: pointer; font-size: 11px;
      font-family: 'Pretendard', sans-serif;
    }

    .stat-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 10px; margin-bottom: 16px; }
    .stat-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 14px; text-align: center;
    }
    .stat-card .num { font-size: 24px; font-weight: 800; color: var(--accent); }
    .stat-card .lbl { font-size: 11px; color: var(--muted); margin-top: 3px; }

    .bar-wrap { margin-bottom: 9px; }
    .bar-label { display: flex; justify-content: space-between; font-size: 12px; color: var(--sub); margin-bottom: 3px; }
    .bar-bg { background: var(--border); border-radius: 3px; height: 6px; }
    .bar-fill { background: var(--accent); height: 6px; border-radius: 3px; transition: width 0.4s; }

    .tool-btn {
      padding: 10px 16px; border-radius: 7px; border: none;
      font-size: 13px; font-weight: 600; cursor: pointer;
      font-family: 'Pretendard', sans-serif; margin-right: 8px; margin-bottom: 8px;
    }
    .notice { background: #fff8e1; border: 1px solid #ffe082; border-radius: 8px; padding: 12px 14px; font-size: 12px; color: #7a6000; margin-bottom: 14px; }

    footer { padding: 24px 16px; text-align: center; font-size: 11px; color: var(--muted); }


    /* ── 픽 배지 & 버튼 ── */
    .pick-badge {
      display: inline-block;
      background: #fff8e1; color: #b8860b;
      border: 1px solid #ffe082;
      border-radius: 5px; padding: 1px 7px;
      font-size: 11px; font-weight: 700;
      margin-right: 6px; vertical-align: middle;
    }
    .pick-btn {
      font-size: 18px; color: #ccc;
      transition: color 0.15s; margin-left: auto;
    }
    .pick-btn:hover { color: #f5a623; }
    .pick-btn.picked { color: #f5a623; }
    /* 토글 스위치 */
    .toggle-switch { position: relative; display: inline-block; width: 44px; height: 24px; }
    .toggle-switch input { opacity: 0; width: 0; height: 0; }
    .toggle-slider {
      position: absolute; cursor: pointer; inset: 0;
      background: #ccc; border-radius: 24px; transition: 0.2s;
    }
    .toggle-slider:before {
      content: ''; position: absolute;
      width: 18px; height: 18px; left: 3px; bottom: 3px;
      background: #fff; border-radius: 50%; transition: 0.2s;
    }
    .toggle-switch input:checked + .toggle-slider { background: var(--accent); }
    .toggle-switch input:checked + .toggle-slider:before { transform: translateX(20px); }
  </style>
</head>
<body>

<!-- ── 로그인 ── -->
<div id="loginOverlay">
  <div class="login-wrap">
    <div class="login-logo">
      <div class="logo-text">blind</div>
      <div class="logo-sub">고려 관료 익명 커뮤니티</div>
    </div>

    <div style="margin-bottom:14px;">
      <input class="input-field" type="text" id="joinId" placeholder="학번 (5자리)" maxlength="5" inputmode="numeric">
      <input class="input-field" type="text" id="joinName" placeholder="이름 (실명)">
      <input class="input-field" type="text" id="joinNick" placeholder="닉네임 (영문/숫자/_)" oninput="validateNick(this)">
    </div>

    <div class="org-category">
      <div class="org-cat-label">🏛️ 근무 기관 선택</div>
      <select class="input-field" id="joinOrg">
        <option value="">근무 기관을 선택하세요</option>
        <optgroup label="🏛️ 중앙 기관">
          <option value="중서문하성" data-cat="central">중서문하성</option>
          <option value="상서성"     data-cat="central">상서성</option>
          <option value="중추원"     data-cat="central">중추원</option>
          <option value="어사대"     data-cat="central">어사대</option>
          <option value="삼사"       data-cat="central">삼사</option>
        </optgroup>
        <optgroup label="🗺️ 지방 기관 (5도)">
          <option value="서해도 관리" data-cat="local">서해도 관리</option>
          <option value="교주도 관리" data-cat="local">교주도 관리</option>
          <option value="양광도 관리" data-cat="local">양광도 관리</option>
          <option value="전라도 관리" data-cat="local">전라도 관리</option>
          <option value="경상도 관리" data-cat="local">경상도 관리</option>
        </optgroup>
        <optgroup label="🗺️ 지방 기관 (양계·경기)">
          <option value="동계 관리" data-cat="local">동계 관리</option>
          <option value="북계 관리" data-cat="local">북계 관리</option>
          <option value="경기 관리" data-cat="local">경기 관리</option>
        </optgroup>
        <optgroup label="⚔️ 군사 기관">
          <option value="2군 소속"    data-cat="military">2군 소속</option>
          <option value="6위 소속"    data-cat="military">6위 소속</option>
          <option value="주현군 소속" data-cat="military">주현군 소속</option>
          <option value="주진군 소속" data-cat="military">주진군 소속</option>
        </optgroup>
        <optgroup label="📚 교육 기관">
          <option value="국자감" data-cat="edu">국자감</option>
        </optgroup>
      </select>
    </div>

    <div id="loginErr" class="err-msg"></div>
    <button class="btn-main" onclick="enterApp()">접속하기</button>
  </div>
</div>

<!-- ── 메인 앱 ── -->
<div id="appContainer">
  <header>
    <div class="header-top">
      <div class="header-logo">blind</div>
      <div class="header-right">
        <div id="adminModeBanner" style="display:none; align-items:center; gap:6px; background:#fff8e1; border:1px solid #ffe082; border-radius:8px; padding:4px 10px; font-size:12px; font-weight:700; color:#b8860b;">
          👑 관리자
          <button onclick="exitAdminMode()" style="background:none; border:none; color:#b8860b; cursor:pointer; font-size:14px; line-height:1; padding:0 0 0 4px;">×</button>
        </div>
        <button class="icon-btn" id="adminLoginBtn" onclick="openAdminAuth()" title="관리자">⚙</button>
        <button class="icon-btn" onclick="openProfileModal()" title="프로필">👤</button>
      </div>
    </div>
    <div class="tab-bar" id="tabBar">
      <button class="tab-item active" onclick="setFilter('all',this)">전체</button>
      <button class="tab-item" onclick="setFilter('central',this)">중앙 기관</button>
      <button class="tab-item" onclick="setFilter('local',this)">지방 기관</button>
      <button class="tab-item" onclick="setFilter('military',this)">군사 기관</button>
      <button class="tab-item" onclick="setFilter('edu',this)">교육 기관</button>
      <button class="tab-item" onclick="setFilter('pick',this)">⭐ Pick</button>
    </div>
  </header>

  <div class="sort-bar">
    <button class="sort-btn active" id="sortNewest" onclick="changeSort('newest')">최신순</button>
    <span class="sort-dot">•</span>
    <button class="sort-btn" id="sortPopular" onclick="changeSort('popular')">인기순</button>
  </div>

  <!-- 게시글 작성 -->
  <div class="post-composer">
    <div class="composer-top">
      <div class="my-org-badge" id="composerBadge">-</div>
      <textarea class="composer-input" id="postInput"
        placeholder="고려 관료로서 하고 싶은 말을 남겨보세요..." maxlength="300" rows="2"></textarea>

  <div id="feed"></div>

        <div style="font-size:13px; font-weight:700; margin-bottom:12px; color:var(--sub);">기관 유형별 게시글</div>
        <div id="orgStats"></div>

        <div style="font-size:13px; font-weight:700; color:#1a6db5; margin-bottom:10px;">📝 더미 게시글</div>
        <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:10px;">
          <span style="font-size:13px; color:#444;">피드에 더미 표시</span>

      <div class="notice">⚠️ 아래 기능은 되돌릴 수 없습니다.</div>

    </div>

</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getDatabase, ref, set, push, onValue, remove, update, get }
    from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDAc5S87JK-LtXzk5-iTR9rt7RnHWnUXTQ",
    authDomain: "ho0911seong-56638.firebaseapp.com",
    databaseURL: "https://ho0911seong-56638-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "ho0911seong-56638",
    storageBucket: "ho0911seong-56638.firebasestorage.app",
    messagingSenderId: "994509567071",
    appId: "1:994509567071:web:de99e71c125ec2a3f557ea"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const postsRef = ref(db, 'goryeo_v2');

  const ADMIN_PW_HASH = "57765044de4726b8a55db8c3846a7b6a038a2beaff40c0cc5113744ad8b62694";

  async function sha256(str) {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
    return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
  }

  const CAT_LABEL = { central:'중앙 기관', local:'지방 기관', military:'군사 기관', edu:'교육 기관' };
  const CAT_COLOR = { central:'#00c4b4', local:'#4a90e2', military:'#e24a4a', edu:'#9b4ae2' };

  let currentUser = null;
  let currentSort = 'newest';
  let currentFilter = 'all';
  let allPostsCache = [];

  // 드롭다운 옵션 → { name, cat } 변환 헬퍼
  function getOrgFromSelect(selId) {
    const sel = document.getElementById(selId);
    const val = sel.value;
    if (!val) return null;
    const opt = sel.querySelector(`option[value="${CSS.escape(val)}"]`) ||
                [...sel.options].find(o => o.value === val);
    const cat = opt?.dataset.cat || '';
    return { name: val, cat };
  }

  window.validateNick = (el) => {
    el.value = el.value.toLowerCase().replace(/[^a-z0-9_.]/g, '');
  };

  // ── 자동 로그인 ──
  window.onload = () => {
    const saved = localStorage.getItem('goryeo_v2_user');
    if (saved) { currentUser = JSON.parse(saved); showApp(); }
  };

  function showApp() {
    document.getElementById('loginOverlay').style.display = 'none';
    document.getElementById('appContainer').style.display = 'flex';
    updateComposerBadge();
    listenFeed();
  }

  function updateComposerBadge() {
    const org = currentUser.org;
    document.getElementById('composerBadge').textContent = org ? org.name : '-';
  }

  document.getElementById('postInput').addEventListener('input', function() {
    document.getElementById('charCount').textContent = `${this.value.length}/300`;
  });

  // ── 로그인 ──
  window.enterApp = () => {
    const id   = document.getElementById('joinId').value.trim();
    const name = document.getElementById('joinName').value.trim();
    const nick = document.getElementById('joinNick').value.trim();
    const errEl = document.getElementById('loginErr');
    const show = (msg) => { errEl.textContent = msg; errEl.classList.add('show'); };
    errEl.classList.remove('show');

    if (!/^\d{5}$/.test(id)) return show('학번은 숫자 5자리여야 합니다.');
    if (!name) return show('이름을 입력하세요.');
    if (!nick) return show('닉네임을 입력하세요.');

    const org = getOrgFromSelect('joinOrg');
    if (!org) return show('근무 기관을 선택하세요.');

    currentUser = { id, name, nick, org };
    localStorage.setItem('goryeo_v2_user', JSON.stringify(currentUser));
    showApp();
  };

  window.logout = () => {
    if (confirm('로그아웃 하시겠습니까?')) {
      localStorage.removeItem('goryeo_v2_user'); location.reload();
    }
  };

  // ── 게시 ──
  window.createPost = () => {
    const content = document.getElementById('postInput').value.trim();
    if (!content) return;
    const now = new Date();
    const time = `${now.getMonth()+1}.${now.getDate()}. ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
    const r = push(postsRef);
    set(r, {
      id: r.key,
      studentId: currentUser.id,
      realName: currentUser.name,
      nickname: currentUser.nick,
      org: currentUser.org,
      content, time, likes: 0,
      likedBy: { init: true }
    });
    document.getElementById('postInput').value = '';
    document.getElementById('charCount').textContent = '0/300';
  };

  // ── 피드 ──
  function listenFeed() {
    onValue(postsRef, snap => {
      const data = snap.val();
      allPostsCache = data ? Object.values(data).filter(p=>p.id) : [];
      renderFeed();
      renderAdminTable(allPostsCache);
      renderStats(allPostsCache);
    });
  }

  window.setFilter = (f, btn) => {
    currentFilter = f;
    document.querySelectorAll('.tab-item').forEach(el=>el.classList.remove('active'));
    btn.classList.add('active');
    renderFeed();
  };

  window.changeSort = (type) => {
    currentSort = type;
    document.getElementById('sortNewest').classList.toggle('active', type==='newest');
    document.getElementById('sortPopular').classList.toggle('active', type==='popular');
    renderFeed();
  };

  function renderFeed() {
    const feed = document.getElementById('feed');
    feed.innerHTML = '';

    let posts = allPostsCache.filter(p => dummyVisible || p.studentId !== '00000');
    if (currentFilter === 'pick') {
      posts = posts.filter(p => p.adminPick === true);
    } else if (currentFilter !== 'all') {
      posts = posts.filter(p => (p.org?.cat === currentFilter) || (p.orgs||[]).some(o=>o.cat===currentFilter));
    }
    }
    if (currentSort === 'popular') {
      posts.sort((a,b) => (b.likes||0)-(a.likes||0) || b.id.localeCompare(a.id));
    } else {
      posts.sort((a,b) => b.id.localeCompare(a.id));
    }

    if (!posts.length) {
      feed.innerHTML = `<div class="empty-state"><div class="icon">📋</div>아직 게시글이 없습니다.<br>첫 번째 글을 남겨보세요!</div>`;
      return;
    }

    posts.forEach(post => {
      // 단일 org 또는 구버전 orgs 배열 모두 호환
      const org = post.org || (post.orgs||[])[0] || null;
      const isLiked = post.likedBy && post.likedBy[currentUser.id];

      const card = document.createElement('div');
      card.className = 'post-card';

      // 상단 메타
      const top = document.createElement('div');
      top.className = 'post-top';

      // 카테고리 점
      if (org) {
        const dot = document.createElement('span');
        dot.className = `cat-dot ${org.cat}`;
        top.appendChild(dot);
      }

      // 기관명
      const orgEl = document.createElement('span');
      orgEl.className = 'post-org';
      orgEl.textContent = org ? org.name : '';
      top.appendChild(orgEl);

      const nick = document.createElement('span');
      nick.className = 'post-nick';
      nick.textContent = post.nickname;
      top.appendChild(nick);

      const time = document.createElement('span');
      time.className = 'post-time';
      time.textContent = post.time;
      top.appendChild(time);

      // 내용
      const body = document.createElement('div');
      body.className = 'post-body';
      body.id = `post-body-${post.id}`;
      body.textContent = post.content;

      // 하단
      const actions = document.createElement('div');
      actions.className = 'post-actions';

      // 픽 배지 (피드에서 모두에게 보임)
      if (post.adminPick) {
        const pickBadge = document.createElement('span');
        pickBadge.className = 'pick-badge';
        pickBadge.textContent = '⭐ Pick';
        top.insertBefore(pickBadge, top.firstChild);
      }

      // 좋아요
      const likeBtn = document.createElement('button');
      likeBtn.className = `action-btn${isLiked?' liked':''}`;
      likeBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="${isLiked?'currentColor':'none'}" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg> ${post.likes||0}`;
      likeBtn.onclick = (e) => { e.stopPropagation(); toggleLike(post.id, !!isLiked); };
      actions.appendChild(likeBtn);

      // 관리자 모드일 때 ☆/★ 픽 버튼
      if (isAdminMode) {
        const pickBtn = document.createElement('button');
        pickBtn.className = `action-btn pick-btn${post.adminPick ? ' picked' : ''}`;
        pickBtn.textContent = post.adminPick ? '★' : '☆';
        pickBtn.title = post.adminPick ? '픽 취소' : '픽하기';
        pickBtn.onclick = (e) => { e.stopPropagation(); togglePick(post.id, !!post.adminPick); };
        actions.appendChild(pickBtn);
      }

      card.append(top, body, actions);
      feed.appendChild(card);
    });
  }

  window.toggleLike = async (postId, isLiked) => {
    const snap = await get(ref(db, `goryeo_v2/${postId}`));
    const post = snap.val(); if (!post) return;
    const updates = {};
    updates[`goryeo_v2/${postId}/likes`] = Math.max(0, isLiked ? post.likes-1 : post.likes+1);
    updates[`goryeo_v2/${postId}/likedBy/${currentUser.id}`] = isLiked ? null : true;
    update(ref(db), updates);
  };

  // ── 프로필 모달 ──
  window.openProfileModal = () => {
    document.getElementById('editNick').value = currentUser.nick;
    // 현재 기관을 드롭다운에 반영 (org 단일 or 구버전 orgs 배열 모두 호환)
    const orgName = currentUser.org?.name || (currentUser.orgs||[])[0]?.name || '';
    document.getElementById('editOrg').value = orgName;
    document.getElementById('profileModal').classList.add('show');
  };
  window.closeProfileModal = () => {
    document.getElementById('profileModal').classList.remove('show');
  };

  window.saveProfile = () => {
    const nick = document.getElementById('editNick').value.trim();
    const errEl = document.getElementById('editErr');
    const show = (msg) => { errEl.textContent = msg; errEl.style.display = 'block'; };
    errEl.style.display = 'none';

    if (!nick) return show('닉네임을 입력하세요.');
    const org = getOrgFromSelect('editOrg');
    if (!org) return show('근무 기관을 선택하세요.');

    currentUser.nick = nick;
    currentUser.org = org;
    localStorage.setItem('goryeo_v2_user', JSON.stringify(currentUser));
    updateComposerBadge();
    closeProfileModal();
    alert('저장되었습니다.');
  };

  // ── 관리자 ──
  let isAdminMode = false;

  function setAdminMode(on) {
    isAdminMode = on;
    document.getElementById('adminModeBanner').style.display = on ? 'flex' : 'none';
    document.getElementById('adminLoginBtn').style.display = on ? 'none' : 'flex';
    renderFeed(); // 픽 버튼 토글
  }

  window.exitAdminMode = () => {
    setAdminMode(false);
    document.getElementById('adminOverlay').style.display = 'none';
  };

  window.openAdminAuth = () => {
    document.getElementById('adminPwInput').value = '';
    document.getElementById('adminAuthModal').classList.add('show');
  };
  window.closeAdminAuth = () => document.getElementById('adminAuthModal').classList.remove('show');

  window.checkAdmin = async () => {
    const hash = await sha256(document.getElementById('adminPwInput').value);
    if (hash === ADMIN_PW_HASH) {
      closeAdminAuth();
      setAdminMode(true);
      document.getElementById('adminOverlay').style.display = 'flex';
    } else { alert('Access Denied'); }
  };
  window.closeAdmin = () => document.getElementById('adminOverlay').style.display = 'none';

  // ── 픽 토글 ──
  window.togglePick = async (postId, isPicked) => {
    const updates = {};
    updates[`goryeo_v2/${postId}/adminPick`] = isPicked ? null : true;
    await update(ref(db), updates);
  };

  window.switchAdminTab = (tab) => {
    document.querySelectorAll('.admin-tab').forEach((el,i) => {
      el.classList.toggle('active', ['posts','stats','tools'][i]===tab);
    });
    document.querySelectorAll('.admin-panel').forEach(el=>el.classList.remove('active'));
    document.getElementById(`tab-${tab}`).classList.add('active');
  };

  // ── 관리자 테이블 ──
  let adminData = [];
  function renderAdminTable(arr) { adminData = arr; filterAdminTable(); }

  window.filterAdminTable = () => {
    const q = (document.getElementById('adminSearch')?.value||'').toLowerCase();
    const filtered = adminData.filter(p =>
      !q ||
      (p.studentId||'').includes(q) ||
      (p.realName||'').toLowerCase().includes(q) ||
      (p.nickname||'').toLowerCase().includes(q) ||
      (p.content||'').toLowerCase().includes(q) ||
      ((p.org?.name||'').includes(q) || (p.orgs||[]).some(o=>o.name.includes(q)))
    );
    const sorted = [...filtered].sort((a,b)=>b.id.localeCompare(a.id));

    const esc = s => { const d=document.createElement('div'); d.textContent=s; return d.innerHTML; };
    let html = `<table class="admin-table"><thead><tr>
      <th>학번</th><th>이름</th><th>닉네임</th><th>기관</th><th>내용</th><th>❤</th><th>⭐</th><th>삭제</th>
    </tr></thead><tbody>`;
    sorted.forEach(p => {
      const orgStr = p.org?.name || (p.orgs||[]).map(o=>o.name).join(', ') || '';
      const pickIcon = p.adminPick ? '★' : '☆';
      const pickStyle = p.adminPick ? 'color:#f5a623; font-size:16px; background:none; border:none; cursor:pointer;' : 'color:#ccc; font-size:16px; background:none; border:none; cursor:pointer;';
      html += `<tr>
        <td>${esc(p.studentId||'')}</td>
        <td>${esc(p.realName||'')}</td>
        <td>${esc(p.nickname||'')}</td>
        <td style="font-size:11px;color:var(--muted);">${esc(orgStr)}</td>
        <td style="max-width:140px;word-break:break-all;">${esc(p.content||'')}</td>
        <td>${p.likes||0}</td>
        <td><button style="${pickStyle}" onclick="togglePick('${p.id}', ${!!p.adminPick})">${pickIcon}</button></td>
        <td><button class="del-btn" onclick="deletePost('${p.id}')">삭제</button></td>
      </tr>`;
    });

  // ── 통계 ──
  function renderStats(arr) {
    if (!arr.length) return;
    const total = arr.length;
    const students = new Set(arr.map(p=>p.studentId)).size;
    const totalLikes = arr.reduce((s,p)=>s+(p.likes||0),0);
    document.getElementById('statTotal').textContent = total;
    document.getElementById('statStudents').textContent = students;
    document.getElementById('statLikes').textContent = totalLikes;
    document.getElementById('statAvg').textContent = total?(totalLikes/total).toFixed(1):0;

    const cats = { central:0, local:0, military:0, edu:0 };
    arr.forEach(p=>{
      const seen = new Set();
      const pOrg = p.org || (p.orgs||[])[0]; if(pOrg && !seen.has(pOrg.cat)){cats[pOrg.cat]=(cats[pOrg.cat]||0)+1;seen.add(pOrg.cat);};
    });
    const maxC = Math.max(...Object.values(cats),1);
    let html = '';
    Object.entries(cats).forEach(([cat,cnt])=>{
      const pct = Math.round((cnt/maxC)*100);
      html += `<div class="bar-wrap">
        <div class="bar-label"><span>${CAT_LABEL[cat]}</span><span>${cnt}개</span></div>
        <div class="bar-bg"><div class="bar-fill" style="width:${pct}%;background:${CAT_COLOR[cat]};"></div></div>
      </div>`;
    });
    document.getElementById('orgStats').innerHTML = html;
  }
