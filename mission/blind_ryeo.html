<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Blind - 려</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
  <style>
    :root {
      --bg: #fff; --surface: #f7f8fa; --card: #fff;
      --text: #1a1a1a; --sub: #666; --muted: #999;
      --border: #e8e8e8; --border-dark: #d0d0d0;
      --accent: #00c4b4; --accent-dark: #00a89a;
      --danger: #ff4757; --ok: #2ecc71;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--surface); color: var(--text);
      font-family: 'Pretendard', -apple-system, sans-serif;
      display: flex; justify-content: center; min-height: 100vh;
    }

    /* ── 로그인 ── */
    #loginOverlay {
      position: fixed; inset: 0; background: #fff;
      z-index: 1000; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 24px; overflow-y: auto;
    }
    .login-wrap { width: 100%; max-width: 380px; }
    .login-logo { text-align: center; margin-bottom: 28px; }
    .login-logo .logo-text { font-size: 2rem; font-weight: 800; color: var(--accent); letter-spacing: -0.03em; }
    .login-logo .logo-sub { font-size: 12px; color: var(--muted); margin-top: 4px; }

    /* 붙어있는 입력 그룹 */
    .input-group {
      border: 1px solid var(--border-dark); border-radius: 10px;
      overflow: hidden; margin-bottom: 10px; background: #fff;
    }
    .input-group-row {
      position: relative;
      border-bottom: 1px solid var(--border);
    }
    .input-group-row:last-child { border-bottom: none; }
    .input-group-row input {
      width: 100%; padding: 13px 38px 13px 14px;
      border: none; outline: none;
      font-size: 15px; font-family: 'Pretendard', sans-serif;
      color: var(--text); background: transparent;
    }
    .input-group-row input::placeholder { color: var(--muted); }
    .input-group-row input:disabled { background: #f8f8f8; color: var(--muted); }
    .input-status {
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      font-size: 14px; pointer-events: none;
    }
    /* 닉네임은 그룹 안 마지막 일반 input */
    .input-group input.nick-input {
      width: 100%; padding: 13px 14px;
      border: none; outline: none;
      font-size: 15px; font-family: 'Pretendard', sans-serif;
      color: var(--text); background: transparent;
    }
    .input-group input.nick-input::placeholder { color: var(--muted); }

    .input-field {
      width: 100%; padding: 13px 14px;
      border: 1px solid var(--border-dark); border-radius: 10px;
      font-size: 15px; font-family: 'Pretendard', sans-serif;
      color: var(--text); background: #fff; margin-bottom: 10px;
      outline: none; transition: border-color 0.15s;
      -webkit-appearance: none;
    }
    .input-field:focus { border-color: var(--accent); }
    .input-field::placeholder { color: var(--muted); }

    .btn-main {
      width: 100%; padding: 15px; background: var(--accent); color: #fff;
      border: none; border-radius: 10px; font-size: 16px; font-weight: 700;
      font-family: 'Pretendard', sans-serif; cursor: pointer; transition: background 0.15s;
    }
    .btn-main:hover:not(:disabled) { background: var(--accent-dark); }
    .btn-main:disabled { background: var(--border-dark); cursor: not-allowed; }

    .spinner-wrap {
      display: flex; flex-direction: column; align-items: center; gap: 10px; padding: 16px 0;
    }
    .spinner {
      width: 24px; height: 24px;
      border: 2px solid var(--border); border-top-color: var(--accent);
      border-radius: 50%; animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── 앱 ── */
    #appContainer {
      display: none; width: 100%; max-width: 480px;
      min-height: 100vh; flex-direction: column; background: var(--surface);
    }
    header {
      background: #fff; border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 100;
    }
    .header-top {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 14px; height: 52px; gap: 8px;
    }
    .header-logo {
      font-size: 1.25rem; font-weight: 800; color: var(--accent);
      letter-spacing: -0.02em; flex-shrink: 0;
    }

    /* 닉네임만 표시하는 프로필 버튼 */
    .profile-btn {
      background: none; border: none; cursor: pointer;
      font-family: 'Pretendard', sans-serif; padding: 0;
      display: flex; align-items: center;
    }
    .pb-nick {
      font-size: clamp(11px, 2.8vw, 14px);
      font-weight: 700; color: var(--accent);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      max-width: 140px;
    }

    /* 탭바 — 한 화면에 균등 */
    .tab-bar { display: flex; border-top: 1px solid var(--border); }
    .tab-item {
      flex: 1; padding: 9px 2px; font-size: 11px; font-weight: 500;
      color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent;
      transition: all 0.12s; font-family: 'Pretendard', sans-serif;
      white-space: nowrap; text-align: center;
      border-top: none; border-left: none; border-right: none; background: none;
    }
    .tab-item.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 700; }

    /* 정렬 + PICK 버튼 */
    .sort-bar {
      display: flex; justify-content: flex-end; align-items: center;
      padding: 8px 14px; background: #fff; border-bottom: 1px solid var(--border); gap: 6px;
    }
    .sort-box { display: flex; background: var(--surface); border-radius: 20px; padding: 2px; }
    .sort-btn {
      font-size: 11px; font-weight: 700; border: none;
      border-radius: 15px; padding: 4px 10px;
      cursor: pointer; font-family: 'Pretendard', sans-serif;
      color: var(--muted); background: none; transition: 0.15s;
    }
    .sort-btn.active { color: #fff; background: var(--accent); }
    .pick-filter-btn {
      font-size: 11px; font-weight: 700; border: 1px solid var(--border-dark);
      border-radius: 15px; padding: 4px 10px;
      cursor: pointer; font-family: 'Pretendard', sans-serif;
      color: var(--muted); background: #fff; transition: 0.15s;
    }
    .pick-filter-btn.active { background: #fff8e1; color: #b8860b; border-color: #ffe082; }

    /* 글 작성 */
    .post-composer {
      background: #fff; padding: 14px 16px; border-bottom: 6px solid var(--surface);
    }
    .composer-top { display: flex; align-items: flex-start; gap: 10px; }
    .my-org-badge {
      font-size: 11px; font-weight: 700; color: var(--accent);
      background: #f0fffe; border: 1px solid #b2ede9; border-radius: 4px;
      padding: 3px 8px; white-space: nowrap; flex-shrink: 0;
    }
    .composer-input {
      flex: 1; border: none; outline: none; font-size: 15px;
      font-family: 'Pretendard', sans-serif; color: var(--text);
      resize: none; min-height: 48px; background: transparent;
    }
    .composer-input::placeholder { color: var(--muted); }
    .composer-bottom {
      display: flex; justify-content: space-between; align-items: center;
      margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border);
    }
    .char-count { font-size: 11px; color: var(--muted); }
    .post-btn {
      padding: 7px 18px; background: var(--accent); color: #fff;
      border: none; border-radius: 5px; font-size: 13px; font-weight: 700;
      font-family: 'Pretendard', sans-serif; cursor: pointer; transition: 0.15s;
    }
    .post-btn:hover { background: var(--accent-dark); }

    #feed { flex: 1; }

    .post-card {
      background: #fff; margin-bottom: 1px; padding: 16px 16px 12px;
    }
    .post-top {
      display: flex; align-items: center; margin-bottom: 3px;
      gap: 6px; flex-wrap: wrap;
    }
    .post-org { font-size: 12px; font-weight: 700; color: var(--text); }
    .post-nick { font-size: 12px; color: var(--muted); }
    .post-time { font-size: 11px; color: var(--muted); margin-left: auto; }
    .cat-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .cat-dot.central  { background: #00c4b4; }
    .cat-dot.local    { background: #4a90e2; }
    .cat-dot.military { background: #e24a4a; }
    .cat-dot.edu      { background: #9b4ae2; }
    .edited-tag { font-size: 10px; color: var(--muted); }

    .post-body {
      font-size: 14px; color: #444; line-height: 1.6; margin: 6px 0 10px;
      white-space: pre-wrap;
    }
    .post-actions {
      display: flex; align-items: center; gap: 14px;
      padding-top: 8px; border-top: 1px solid var(--border);
    }
    .action-btn {
      display: flex; align-items: center; gap: 4px; font-size: 12px; color: var(--muted);
      cursor: pointer; user-select: none; border: none; background: none;
      font-family: 'Pretendard', sans-serif; padding: 0;
    }
    .action-btn.liked { color: var(--danger); }
    .action-btn svg { width: 15px; height: 15px; }
    .edit-btn {
      font-size: 12px; color: var(--muted); border: none; background: none;
      cursor: pointer; font-family: 'Pretendard', sans-serif; padding: 0;
    }
    .edit-btn:hover { color: var(--sub); }

    .pick-badge {
      display: inline-block; background: #fff8e1; color: #b8860b;
      border: 1px solid #ffe082; border-radius: 5px; padding: 1px 7px;
      font-size: 11px; font-weight: 700; margin-right: 4px;
    }

    .empty-state {
      padding: 60px 20px; text-align: center; color: var(--muted);
      font-size: 14px; line-height: 1.7;
    }
    .empty-state .icon { font-size: 40px; margin-bottom: 12px; }

    /* ── 모달 공통 ── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.5);
      z-index: 500; display: none; align-items: flex-end; justify-content: center;
    }
    .modal-overlay.show { display: flex; }
    .modal-sheet {
      background: #fff; width: 100%; max-width: 480px;
      border-radius: 16px 16px 0 0; padding: 20px 20px 40px;
      max-height: 90vh; overflow-y: auto;
    }
    .modal-handle { width: 36px; height: 4px; background: #ddd; border-radius: 2px; margin: 0 auto 18px; }
    .modal-header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
    .modal-avatar {
      width: 44px; height: 44px; background: #e0f7f6;
      border-radius: 50%; display: flex; align-items: center;
      justify-content: center; font-size: 18px; font-weight: 700;
      color: var(--accent); flex-shrink: 0;
    }
    .modal-user-name { font-size: 15px; font-weight: 800; }
    .modal-user-sub  { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .modal-label {
      font-size: 10px; font-weight: 700; color: var(--muted);
      letter-spacing: 0.06em; text-transform: uppercase; margin: 14px 0 8px;
    }
    .modal-input {
      width: 100%; padding: 12px 14px; border: 1px solid var(--border-dark); border-radius: 8px;
      font-size: 15px; font-family: 'Pretendard', sans-serif; color: var(--text);
      outline: none; margin-bottom: 4px;
    }
    .modal-input:focus { border-color: var(--accent); }
    .modal-btn-group { display: flex; flex-direction: column; gap: 8px; margin-top: 20px; }
    .modal-btn {
      width: 100%; padding: 13px; border-radius: 8px; border: none;
      font-size: 15px; font-weight: 700; font-family: 'Pretendard', sans-serif; cursor: pointer;
    }
    .modal-btn.primary { background: var(--accent); color: #fff; }
    .modal-btn.gray    { background: #f0f0f0; color: var(--sub); }
    .modal-btn.red     { background: #fff; color: var(--danger); border: 1px solid #ffdede; }

    /* ── 글 수정 모달 ── */
    #editPostModal {
      position: fixed; inset: 0; background: rgba(0,0,0,0.5);
      z-index: 600; display: none; align-items: flex-end; justify-content: center;
    }
    #editPostModal.show { display: flex; }
    .edit-modal-sheet {
      background: #fff; width: 100%; max-width: 480px;
      border-radius: 16px 16px 0 0; padding: 20px 20px 40px;
    }
    .edit-modal-title { font-size: 15px; font-weight: 800; margin-bottom: 14px; }
    .edit-modal-ta {
      width: 100%; border: 1px solid var(--border-dark); border-radius: 8px;
      font-size: 15px; font-family: 'Pretendard', sans-serif; color: var(--text);
      padding: 12px 14px; resize: none; height: 140px; outline: none; line-height: 1.5;
    }
    .edit-modal-ta:focus { border-color: var(--accent); }

    /* ── 토스트 ── */
    #toastContainer {
      position: fixed; top: 60px; left: 50%; transform: translateX(-50%);
      z-index: 9999; display: flex; flex-direction: column; gap: 8px;
      pointer-events: none; width: 90%; max-width: 420px;
    }
    .toast {
      background: linear-gradient(135deg, #fff8e1, #fffde7);
      border: 1.5px solid #ffe082; border-radius: 14px;
      padding: 14px 18px; display: flex; align-items: flex-start; gap: 10px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.12);
      animation: toastIn 0.35s cubic-bezier(.34,1.56,.64,1) forwards;
      pointer-events: auto;
    }
    .toast.err-toast { background: linear-gradient(135deg,#fff0f0,#fff5f5); border-color: #ffc0c0; }
    .toast.out { animation: toastOut 0.3s ease forwards; }
    @keyframes toastIn {
      from { opacity: 0; transform: translateY(-16px) scale(0.95); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes toastOut {
      from { opacity: 1; transform: translateY(0) scale(1); }
      to   { opacity: 0; transform: translateY(-10px) scale(0.95); }
    }
    .toast-icon { font-size: 22px; flex-shrink: 0; }
    .toast-body { flex: 1; }
    .toast-title { font-size: 13px; font-weight: 800; color: #b8860b; margin-bottom: 2px; }
    .toast-title.red { color: var(--danger); }
    .toast-msg   { font-size: 12px; color: #7a6000; line-height: 1.5; }
    .toast-msg.red { color: #c04040; }
    .toast-close {
      background: none; border: none; cursor: pointer;
      color: #ccc; font-size: 16px; padding: 0; line-height: 1; flex-shrink: 0;
    }

    footer { padding: 24px 16px; text-align: center; font-size: 11px; color: var(--muted); }
  </style>
</head>
<body>

<div id="toastContainer"></div>

<!-- ── 로그인 ── -->
<div id="loginOverlay">
  <div class="login-wrap">
    <div class="login-logo">
      <div class="logo-text">blind</div>
      <div class="logo-sub">고려 관료 익명 커뮤니티</div>
    </div>

    <!-- 학번 + 이름 + 닉네임 — 붙여서 표시 -->
    <div class="input-group">
      <div class="input-group-row">
        <input type="text" id="joinId" placeholder="학번 (5자리)" maxlength="5"
          inputmode="numeric" autocomplete="off" oninput="onIdInput(this)">
        <span class="input-status" id="idStatus"></span>
      </div>
      <div class="input-group-row">
        <input type="text" id="joinName" placeholder="이름 (실명)" autocomplete="off"
          oninput="onNameInput(this)" disabled>
        <span class="input-status" id="nameStatus"></span>
      </div>
      <div class="input-group-row" style="border-bottom:none;">
        <input type="text" id="joinNick" placeholder="닉네임 (영문/숫자/_)"
          oninput="validateNick(this)" autocomplete="off">
      </div>
    </div>

    <select class="input-field" id="joinOrg">
      <option value="">근무 기관을 선택하세요</option>
      <optgroup label="🏛️ 중앙 기관">
        <option value="중서문하성" data-cat="central">중서문하성</option>
        <option value="상서성"     data-cat="central">상서성</option>
        <option value="중추원"     data-cat="central">중추원</option>
        <option value="어사대"     data-cat="central">어사대</option>
        <option value="삼사"       data-cat="central">삼사</option>
      </optgroup>
      <optgroup label="🗺️ 지방 기관">
        <option value="5도 소속"  data-cat="local">5도 소속</option>
        <option value="양계 소속" data-cat="local">양계 소속</option>
        <option value="경기 소속" data-cat="local">경기 소속</option>
      </optgroup>
      <optgroup label="⚔️ 군사 기관">
        <option value="2군 소속"    data-cat="military">2군 소속</option>
        <option value="6위 소속"    data-cat="military">6위 소속</option>
        <option value="주현군 소속" data-cat="military">주현군 소속</option>
        <option value="주진군 소속" data-cat="military">주진군 소속</option>
      </optgroup>
      <optgroup label="📚 교육 기관">
        <option value="국자감" data-cat="edu">국자감</option>
      </optgroup>
    </select>

    <button class="btn-main" id="enterBtn" onclick="enterApp()" disabled>접속하기</button>
    <div id="loginSpinner" style="display:none;" class="spinner-wrap">
      <div class="spinner"></div>
      <div style="font-size:12px;color:var(--muted);">학생 명단 확인 중...</div>
    </div>
    <div style="text-align:center; margin-top:18px;">
      <a href="blind_ryeo_admin.html"
        style="color:var(--muted); font-size:11px; text-decoration:none; letter-spacing:0.02em;">
        관리자 센터
      </a>
    </div>
  </div>
</div>

<!-- ── 메인 앱 ── -->
<div id="appContainer">
  <header>
    <div class="header-top">
      <div class="header-logo">blind</div>
      <!-- 닉네임만 표시 -->
      <button class="profile-btn" onclick="openProfileModal()">
        <span class="pb-nick" id="headerNick">...</span>
      </button>
    </div>
    <div class="tab-bar">
      <button class="tab-item active" onclick="setFilter('all',this)">전체</button>
      <button class="tab-item" onclick="setFilter('central',this)">중앙</button>
      <button class="tab-item" onclick="setFilter('local',this)">지방</button>
      <button class="tab-item" onclick="setFilter('military',this)">군사</button>
      <button class="tab-item" onclick="setFilter('edu',this)">교육</button>
    </div>
  </header>

  <div class="sort-bar">
    <div class="sort-box">
      <button class="sort-btn active" id="sortNewest" onclick="changeSort('newest')">최신순</button>
      <button class="sort-btn" id="sortPopular" onclick="changeSort('popular')">인기순</button>
    </div>
    <button class="pick-filter-btn" id="pickFilterBtn" onclick="togglePickFilter()">⭐ PICK</button>
  </div>

  <div class="post-composer">
    <div class="composer-top">
      <div class="my-org-badge" id="composerBadge">-</div>
      <textarea class="composer-input" id="postInput"
        placeholder="고려 관료로서 하고 싶은 말을 남겨보세요..." rows="2"></textarea>
    </div>
    <div class="composer-bottom">
      <span class="char-count" id="charCount">0/300</span>
      <button class="post-btn" onclick="createPost()">게시</button>
    </div>
  </div>

  <div id="feed"></div>
  <footer>Blind 려 · 인천동양중학교 · 고려의 체제 정비</footer>
</div>

<!-- 프로필 모달 -->
<div class="modal-overlay" id="profileModal">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <div class="modal-avatar" id="modalIcon">👤</div>
      <div>
        <div class="modal-user-name" id="modalName">-</div>
        <div class="modal-user-sub" id="modalSub">-</div>
      </div>
    </div>
    <div class="modal-label">닉네임 변경</div>
    <input class="modal-input" type="text" id="editNick" placeholder="닉네임" oninput="validateNick(this)">
    <div class="modal-label">근무 기관 변경</div>
    <select class="input-field" id="editOrg" style="margin-bottom:0;">
      <option value="">근무 기관을 선택하세요</option>
      <optgroup label="🏛️ 중앙 기관">
        <option value="중서문하성" data-cat="central">중서문하성</option>
        <option value="상서성"     data-cat="central">상서성</option>
        <option value="중추원"     data-cat="central">중추원</option>
        <option value="어사대"     data-cat="central">어사대</option>
        <option value="삼사"       data-cat="central">삼사</option>
      </optgroup>
      <optgroup label="🗺️ 지방 기관">
        <option value="5도 소속"  data-cat="local">5도 소속</option>
        <option value="양계 소속" data-cat="local">양계 소속</option>
        <option value="경기 소속" data-cat="local">경기 소속</option>
      </optgroup>
      <optgroup label="⚔️ 군사 기관">
        <option value="2군 소속"    data-cat="military">2군 소속</option>
        <option value="6위 소속"    data-cat="military">6위 소속</option>
        <option value="주현군 소속" data-cat="military">주현군 소속</option>
        <option value="주진군 소속" data-cat="military">주진군 소속</option>
      </optgroup>
      <optgroup label="📚 교육 기관">
        <option value="국자감" data-cat="edu">국자감</option>
      </optgroup>
    </select>
    <div id="editErr" style="font-size:12px;color:var(--danger);margin-top:6px;display:none;"></div>
    <div class="modal-btn-group">
      <button class="modal-btn primary" onclick="saveProfile()">저장</button>
      <button class="modal-btn red" onclick="logout()">로그아웃</button>
      <button class="modal-btn gray" onclick="closeProfileModal()">취소</button>
    </div>
  </div>
</div>

<!-- 글 수정 모달 -->
<div id="editPostModal">
  <div class="edit-modal-sheet">
    <div class="modal-handle" style="margin:0 auto 14px;"></div>
    <div class="edit-modal-title">✏️ 글 수정</div>
    <textarea class="edit-modal-ta" id="editPostContent" placeholder="내용을 수정하세요..."></textarea>
    <div style="font-size:11px;color:var(--muted);text-align:right;margin:4px 0 14px;" id="editCharCount">0 / 300</div>
    <div class="modal-btn-group" style="margin-top:0;">
      <button class="modal-btn primary" onclick="submitPostEdit()">수정 완료</button>
      <button class="modal-btn gray" onclick="closeEditPost()">취소</button>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getDatabase, ref, set, push, onValue, update, get }
    from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDAc5S87JK-LtXzk5-iTR9rt7RnHWnUXTQ",
    authDomain: "ho0911seong-56638.firebaseapp.com",
    databaseURL: "https://ho0911seong-56638-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "ho0911seong-56638",
    storageBucket: "ho0911seong-56638.firebasestorage.app",
    messagingSenderId: "994509567071",
    appId: "1:994509567071:web:de99e71c125ec2a3f557ea"
  };

  const app = initializeApp(firebaseConfig);
  const db  = getDatabase(app);
  const postsRef    = ref(db, 'goryeo_v2');
  const toastRef    = ref(db, 'goryeo_v2_toast');
  const studentsRef = ref(db, 'students');

  /* ── 욕설 필터 ── */
  const BAD_WORDS = [
    "씨발","시발","쉬발","씨바","시바","ㅅㅂ","ㅆㅂ",
    "개새끼","개새","ㄱㅅㄲ","개샊","개섀끼",
    "병신","ㅂㅅ","벙신","뻥신","지랄","ㅈㄹ",
    "미친","미치","ㅁㅊ","미칀","엠창",
    "fuck","shit","bitch","asshole","bastard",
    "새끼","쌔끼","섀끼","ㅅㄲ","꺼져","꺼지",
    "죽어","죽여","뒤져","뒈져","뒤지","뒈지",
    "창녀","창년","걸레","보지","자지",
    "강간","성폭","성추","닥쳐",
    "느금마","느그엄마","니애미","니에미","니엄마",
    "존나","ㅈㄴ","좆","좆같","빡대가리","찐따","머저리"
  ];
  function containsBadWord(t) {
    const n = t.replace(/\s/g,'').toLowerCase();
    return BAD_WORDS.some(w => n.includes(w.toLowerCase().replace(/\s/g,'')));
  }

  /* ── 상태 ── */
  let currentUser   = null;
  let currentSort   = 'newest';
  let currentFilter = 'all';
  let showPickOnly  = false;
  let allPostsCache = [];
  let lastToastKey  = null;
  let studentMap    = {};
  let studentMapLoaded = false;
  let editingPostId = null;

  /* ── 학생 명단 ── */
  async function loadStudentMap() {
    if (studentMapLoaded) return;
    try {
      const snap = await get(studentsRef);
      const data = snap.val();
      if (data) {
        Object.values(data).forEach(s => {
          const sid   = s.studentId || s.id || '';
          const sname = s.name || s.studentName || s.realName || '';
          if (sid && sname) studentMap[sid] = sname;
        });
      }
    } catch(e) { console.warn('학생 명단 로드 실패:', e); }
    studentMapLoaded = true;
  }

  /* ── 로그인 검증 ── */
  let idVerifyTimer = null;
  let verifiedStudentName = null;

  window.validateNick = (el) => {
    el.value = el.value.toLowerCase().replace(/[^a-z0-9_.]/g,'');
    updateEnterBtn();
  };

  window.onIdInput = async (el) => {
    const val = el.value.replace(/\D/g,'');
    el.value = val;
    const idStatus   = document.getElementById('idStatus');
    const nameInput  = document.getElementById('joinName');
    const nameStatus = document.getElementById('nameStatus');

    verifiedStudentName = null;
    nameInput.disabled = true; nameInput.value = '';
    nameStatus.textContent = ''; idStatus.textContent = '';
    updateEnterBtn();

    if (val.length < 5) return;
    idStatus.textContent = '⏳';

    clearTimeout(idVerifyTimer);
    idVerifyTimer = setTimeout(async () => {
      await loadStudentMap();

      // 명단이 없으면 형식만 확인
      if (Object.keys(studentMap).length === 0) {
        idStatus.textContent = '✅';
        nameInput.disabled = false;
        updateEnterBtn(); return;
      }

      if (studentMap[val] !== undefined) {
        verifiedStudentName = studentMap[val];
        idStatus.textContent = '✅';
        nameInput.value = verifiedStudentName;
        nameInput.disabled = false;
        nameStatus.textContent = '✅';
      } else {
        idStatus.textContent = '❌';
        nameInput.disabled = true;
      }
      updateEnterBtn();
    }, 400);
  };

  window.onNameInput = (el) => {
    const val = el.value.trim();
    const nameStatus = document.getElementById('nameStatus');
    if (!val) { nameStatus.textContent = ''; updateEnterBtn(); return; }
    if (verifiedStudentName) {
      nameStatus.textContent = val === verifiedStudentName ? '✅' : '❌';
    } else {
      nameStatus.textContent = '✅';
    }
    updateEnterBtn();
  };

  function isLoginValid() {
    const id   = document.getElementById('joinId').value.trim();
    const name = document.getElementById('joinName').value.trim();
    const nick = document.getElementById('joinNick').value.trim();
    const org  = document.getElementById('joinOrg').value;
    if (!/^\d{5}$/.test(id) || !name || !nick || !org) return false;
    if (verifiedStudentName && name !== verifiedStudentName) return false;
    if (studentMapLoaded && Object.keys(studentMap).length > 0 && !studentMap[id]) return false;
    return true;
  }

  function updateEnterBtn() {
    document.getElementById('enterBtn').disabled = !isLoginValid();
  }

  document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('joinOrg').addEventListener('change', updateEnterBtn);

    /* 글 작성 글자수 */
    document.getElementById('postInput').addEventListener('input', function() {
      const len = this.value.replace(/\s/g,'').length;
      if (len > 300) {
        let count=0, cut=0;
        for (let i=0;i<this.value.length;i++) {
          if (this.value[i]!==' '&&this.value[i]!=='\n') count++;
          if (count===300){cut=i+1;break;}
        }
        this.value = this.value.slice(0,cut);
      }
      document.getElementById('charCount').textContent =
        `${this.value.replace(/\s/g,'').length}/300`;
    });

    /* 수정 글자수 */
    document.getElementById('editPostContent').addEventListener('input', function() {
      const len = this.value.replace(/\s/g,'').length;
      if (len > 300) {
        let count=0, cut=0;
        for (let i=0;i<this.value.length;i++) {
          if (this.value[i]!==' '&&this.value[i]!=='\n') count++;
          if (count===300){cut=i+1;break;}
        }
        this.value = this.value.slice(0,cut);
      }
      document.getElementById('editCharCount').textContent =
        `${this.value.replace(/\s/g,'').length} / 300`;
    });
  });

  function getOrgFromSelect(selId) {
    const sel = document.getElementById(selId);
    const val = sel.value;
    if (!val) return null;
    const opt = [...sel.options].find(o => o.value === val);
    return { name: val, cat: opt?.dataset.cat || '' };
  }

  /* ── 앱 진입 ── */
  window.enterApp = () => {
    if (!isLoginValid()) return;
    const id   = document.getElementById('joinId').value.trim();
    const name = document.getElementById('joinName').value.trim();
    const nick = document.getElementById('joinNick').value.trim();
    const org  = getOrgFromSelect('joinOrg');
    currentUser = { id, name, nick, org };
    localStorage.setItem('goryeo_v2_user', JSON.stringify(currentUser));
    showApp();
  };

  window.onload = () => {
    const saved = localStorage.getItem('goryeo_v2_user');
    if (saved) { currentUser = JSON.parse(saved); showApp(); }
  };

  function showApp() {
    document.getElementById('loginOverlay').style.display = 'none';
    document.getElementById('appContainer').style.display = 'flex';
    document.getElementById('headerNick').textContent = currentUser.nick;
    document.getElementById('composerBadge').textContent = currentUser.org?.name || '-';
    listenFeed();
    listenToast();
  }

  /* ── 피드 ── */
  function listenFeed() {
    onValue(postsRef, snap => {
      const data = snap.val();
      allPostsCache = data ? Object.values(data).filter(p => p && p.id) : [];
      renderFeed();
    });
  }

  function listenToast() {
    onValue(toastRef, snap => {
      const data = snap.val();
      if (!data) return;
      if (data.key === lastToastKey) return;
      lastToastKey = data.key;
      if (Date.now() - data.ts > 5000) return;
      showPickToast(data.content, data.nickname);
    });
  }

  function showPickToast(content, nickname) {
    _toast(`⭐`, '선생님이 이 글을 Pick 했어요!',
      `"${content.length>40?content.slice(0,40)+'…':content}"<br><span style="color:#b8860b;font-weight:700;">— ${nickname}</span>`,
      false);
  }

  function showToast(msg, isError=false) {
    _toast(isError?'🚫':'✏️', isError?'게시 불가':'알림', msg, isError);
  }

  function _toast(icon, title, msg, isError) {
    const c = document.getElementById('toastContainer');
    const t = document.createElement('div');
    t.className = isError ? 'toast err-toast' : 'toast';
    t.innerHTML = `
      <div class="toast-icon">${icon}</div>
      <div class="toast-body">
        <div class="toast-title${isError?' red':''}">${title}</div>
        <div class="toast-msg${isError?' red':''}">${msg}</div>
      </div>
      <button class="toast-close" onclick="this.closest('.toast').remove()">×</button>`;
    c.appendChild(t);
    setTimeout(()=>{ t.classList.add('out'); setTimeout(()=>t.remove(),300); }, isError?3500:5000);
  }

  window.setFilter = (f, btn) => {
    currentFilter = f;
    document.querySelectorAll('.tab-item').forEach(el=>el.classList.remove('active'));
    btn.classList.add('active');
    renderFeed();
  };

  window.changeSort = (type) => {
    currentSort = type;
    document.getElementById('sortNewest').classList.toggle('active', type==='newest');
    document.getElementById('sortPopular').classList.toggle('active', type==='popular');
    renderFeed();
  };

  window.togglePickFilter = () => {
    showPickOnly = !showPickOnly;
    document.getElementById('pickFilterBtn').classList.toggle('active', showPickOnly);
    renderFeed();
  };

  function isMyPost(post) {
    if (!currentUser) return false;
    return post.studentId === currentUser.id &&
           post.realName  === currentUser.name &&
           post.nickname  === currentUser.nick;
  }

  function renderFeed() {
    const feed = document.getElementById('feed');
    feed.innerHTML = '';

    let posts = allPostsCache.filter(p => p.studentId !== '00000');

    if (showPickOnly) {
      posts = posts.filter(p => p.adminPick === true);
    } else if (currentFilter !== 'all') {
      posts = posts.filter(p => p.org?.cat === currentFilter);
    }

    if (currentSort === 'popular') {
      posts.sort((a,b) =>
        (b.likes||0)-(a.likes||0) ||
        (b.timestamp||0)-(a.timestamp||0) ||
        b.id.localeCompare(a.id)
      );
    } else {
      // timestamp 우선, 없으면 Firebase push key 순서
      posts.sort((a,b) =>
        (b.timestamp||0)-(a.timestamp||0) ||
        b.id.localeCompare(a.id)
      );
    }

    if (!posts.length) {
      feed.innerHTML = `<div class="empty-state"><div class="icon">📋</div>아직 게시글이 없습니다.<br>첫 번째 글을 남겨보세요!</div>`;
      return;
    }

    posts.forEach(post => {
      const org     = post.org || null;
      const isLiked = !!(post.likedBy && post.likedBy[currentUser.id]);
      const mine    = isMyPost(post);

      const card = document.createElement('div');
      card.className = 'post-card';

      /* top 줄 */
      const top = document.createElement('div');
      top.className = 'post-top';

      if (post.adminPick) {
        const b = document.createElement('span');
        b.className = 'pick-badge'; b.textContent = '⭐ Pick';
        top.appendChild(b);
      }
      if (org) {
        const dot = document.createElement('span');
        dot.className = `cat-dot ${org.cat}`;
        top.appendChild(dot);
      }

      const orgEl = document.createElement('span');
      orgEl.className = 'post-org';
      orgEl.textContent = org?.name || '';

      const nick = document.createElement('span');
      nick.className = 'post-nick';
      nick.textContent = post.nickname;

      top.append(orgEl, nick);

      if (post.edited) {
        const et = document.createElement('span');
        et.className = 'edited-tag'; et.textContent = '수정됨';
        top.appendChild(et);
      }

      const time = document.createElement('span');
      time.className = 'post-time'; time.textContent = post.time;
      top.appendChild(time);

      /* 본문 */
      const body = document.createElement('div');
      body.className = 'post-body';
      body.textContent = post.content;

      /* 액션 */
      const actions = document.createElement('div');
      actions.className = 'post-actions';

      const likeBtn = document.createElement('button');
      likeBtn.className = `action-btn${isLiked?' liked':''}`;
      likeBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="${isLiked?'currentColor':'none'}" stroke="currentColor" stroke-width="2">
        <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
      </svg> ${post.likes||0}`;
      likeBtn.onclick = () => toggleLike(post.id, isLiked);
      actions.appendChild(likeBtn);

      if (mine) {
        const eb = document.createElement('button');
        eb.className = 'edit-btn'; eb.textContent = '수정';
        eb.onclick = () => openEditPost(post);
        actions.appendChild(eb);
      }

      card.append(top, body, actions);
      feed.appendChild(card);
    });
  }

  window.toggleLike = async (postId, isLiked) => {
    const snap = await get(ref(db, `goryeo_v2/${postId}`));
    const post = snap.val(); if (!post) return;
    await update(ref(db), {
      [`goryeo_v2/${postId}/likes`]:               Math.max(0, isLiked ? post.likes-1 : post.likes+1),
      [`goryeo_v2/${postId}/likedBy/${currentUser.id}`]: isLiked ? null : true
    });
  };

  /* ── 게시글 작성 ── */
  window.createPost = () => {
    const content    = document.getElementById('postInput').value.trim();
    const trimmedLen = content.replace(/\s/g,'').length;

    if (trimmedLen < 10) {
      showToast(`공백 제외 10자 이상 작성해 주세요. (현재 ${trimmedLen}자)`);
      return;
    }
    if (containsBadWord(content)) {
      showToast('부적절한 표현이 포함되어 있어 게시할 수 없습니다.', true);
      return;
    }

    const now  = new Date();
    const time = `${now.getMonth()+1}.${now.getDate()}. ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
    const r    = push(postsRef);
    set(r, {
      id:        r.key,
      studentId: currentUser.id,
      realName:  currentUser.name,
      nickname:  currentUser.nick,
      org:       currentUser.org,
      content,
      time,
      timestamp: Date.now(),
      likes:     0,
      likedBy:   { init: true },
      edited:    false
    });
    document.getElementById('postInput').value = '';
    document.getElementById('charCount').textContent = '0/300';
  };

  /* ── 글 수정 ── */
  window.openEditPost = (post) => {
    editingPostId = post.id;
    const ta = document.getElementById('editPostContent');
    ta.value = post.content;
    document.getElementById('editCharCount').textContent =
      `${post.content.replace(/\s/g,'').length} / 300`;
    document.getElementById('editPostModal').classList.add('show');
  };
  window.closeEditPost = () => {
    document.getElementById('editPostModal').classList.remove('show');
    editingPostId = null;
  };
  window.submitPostEdit = async () => {
    if (!editingPostId) return;
    const content    = document.getElementById('editPostContent').value.trim();
    const trimmedLen = content.replace(/\s/g,'').length;
    if (trimmedLen < 10) { showToast(`공백 제외 10자 이상 작성해 주세요. (현재 ${trimmedLen}자)`); return; }
    if (containsBadWord(content)) { showToast('부적절한 표현이 포함되어 있습니다.', true); return; }

    const snap = await get(ref(db, `goryeo_v2/${editingPostId}`));
    const post = snap.val();
    if (!post) { closeEditPost(); return; }
    if (post.studentId !== currentUser.id ||
        post.realName  !== currentUser.name ||
        post.nickname  !== currentUser.nick) {
      showToast('수정 권한이 없습니다.', true); closeEditPost(); return;
    }
    await update(ref(db), {
      [`goryeo_v2/${editingPostId}/content`]: content,
      [`goryeo_v2/${editingPostId}/edited`]:  true
    });
    closeEditPost();
  };

  /* ── 프로필 모달 ── */
  window.openProfileModal = () => {
    document.getElementById('editNick').value  = currentUser.nick;
    document.getElementById('editOrg').value   = currentUser.org?.name || '';
    document.getElementById('modalName').textContent = `${currentUser.name} (${currentUser.nick})`;
    document.getElementById('modalSub').textContent  = `학번 ${currentUser.id} · ${currentUser.org?.name||'-'}`;
    document.getElementById('modalIcon').textContent = currentUser.org?.name?.[0] || '👤';
    document.getElementById('editErr').style.display = 'none';
    document.getElementById('profileModal').classList.add('show');
  };
  window.closeProfileModal = () => document.getElementById('profileModal').classList.remove('show');

  window.saveProfile = () => {
    const nick  = document.getElementById('editNick').value.trim();
    const errEl = document.getElementById('editErr');
    if (!nick) { errEl.textContent='닉네임을 입력하세요.'; errEl.style.display='block'; return; }
    const org = getOrgFromSelect('editOrg');
    if (!org) { errEl.textContent='근무 기관을 선택하세요.'; errEl.style.display='block'; return; }
    errEl.style.display='none';
    currentUser.nick = nick; currentUser.org = org;
    localStorage.setItem('goryeo_v2_user', JSON.stringify(currentUser));
    document.getElementById('headerNick').textContent  = currentUser.nick;
    document.getElementById('composerBadge').textContent = currentUser.org.name;
    closeProfileModal();
  };

  window.logout = () => {
    if (confirm('로그아웃 하시겠습니까?')) {
      localStorage.removeItem('goryeo_v2_user'); location.reload();
    }
  };
</script>
</body>
</html>
