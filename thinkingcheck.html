<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 인천동양중학교 3학년 역사 수업 : 생각 Check</title>
    
    <!-- Firebase SDK (Compat 버전: 로컬 파일에서도 쉽게 실행 가능) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

    <style>
        /* 🎨 폰트 및 배경 */
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        body { 
            font-family: 'Pretendard', sans-serif; 
            background: linear-gradient(135deg, #fbc2eb 0%, #a6c1ee 100%);
            color: #333; margin: 0; padding: 20px; 
            min-height: 100vh;
        }
        
        /* 💠 글래스모피즘 컨테이너 */
        .glass-container { 
            max-width: 900px; margin: 0 auto; 
            background: rgba(255, 255, 255, 0.6); 
            backdrop-filter: blur(15px); 
            -webkit-backdrop-filter: blur(15px);
            padding: 30px; border-radius: 20px; 
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 8px 32px rgba(31, 38, 135, 0.1); 
        }

        h1, h2, h3 { color: #2c3e50; text-align: center; margin-top: 0; }
        
        /* 📝 폼 및 입력 요소 */
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #34495e; }
        input[type="text"], textarea { 
            width: 100%; padding: 15px; 
            border: 1px solid rgba(255, 255, 255, 0.5); 
            border-radius: 12px; box-sizing: border-box; font-size: 16px; 
            background: rgba(255, 255, 255, 0.8);
            font-family: 'Pretendard', sans-serif;
            transition: all 0.3s;
        }
        input[type="text"]:focus, textarea:focus { outline: none; border-color: #a6c1ee; box-shadow: 0 0 8px rgba(166, 193, 238, 0.5); }
        
        /* 🔘 버튼 스타일 */
        button { 
            background-color: #74b9ff; color: white; border: none; 
            padding: 15px 24px; border-radius: 12px; cursor: pointer; 
            font-size: 16px; font-weight: bold; width: 100%; transition: 0.3s; 
            box-shadow: 0 4px 6px rgba(116, 185, 255, 0.3);
        }
        button:hover { background-color: #0984e3; transform: translateY(-2px); }
        .btn-green { background-color: #55efc4; color: #2d3436; }
        .btn-green:hover { background-color: #00b894; color: white; }

        /* 유틸리티 및 경고 */
        .hidden { display: none !important; }
        .char-count { font-size: 14px; color: #555; text-align: right; margin-top: 5px; font-weight: bold; }
        .warning { color: #d63031; font-size: 14px; font-weight: bold; margin-top: 10px; text-align: center; padding: 10px; background: rgba(253, 114, 114, 0.2); border-radius: 8px; }
        
        /* 📊 관리자 대시보드 및 테이블 */
        .status-summary { background: rgba(255, 255, 255, 0.8); padding: 20px; border-radius: 12px; margin-bottom: 20px; text-align: center; }
        .class-tabs { display: flex; gap: 10px; margin-bottom: 20px; justify-content: center; flex-wrap: wrap; }
        .tab-btn { background-color: rgba(255,255,255,0.5); color: #4a5568; padding: 10px 20px; border-radius: 20px; width: auto; box-shadow: none; }
        .tab-btn.active { background-color: #74b9ff; color: white; }
        
        .table-container { overflow-x: auto; background: rgba(255, 255, 255, 0.9); border-radius: 12px; }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th, td { border-bottom: 1px solid #e2e8f0; padding: 15px; text-align: left; vertical-align: top; }
        th { background-color: #f8f9fa; text-align: center; font-weight: bold; color: #2d3436; }
        
        .edit-btn { background-color: #dfe6e9; color: #2d3436; padding: 4px 8px; font-size: 12px; width: auto; border-radius: 6px; box-shadow: none; margin-top: 5px; }
        .pick-btn { background-color: #ffeaa7; color: #2d3436; padding: 8px 12px; font-size: 14px; width: auto; border-radius: 8px; box-shadow: none; }
        .pick-btn.picked { background-color: #fdcb6e; box-shadow: inset 0 0 5px rgba(0,0,0,0.2); }

        .mode-toggle { position: fixed; bottom: 20px; right: 20px; width: auto; background: #2d3436; border-radius: 30px; z-index: 999; }
        
        @keyframes fadeInRow { from { opacity: 0; transform: translateY(-10px); background-color: #e8f4fd; } to { opacity: 1; transform: translateY(0); background-color: transparent; } }
        .new-row { animation: fadeInRow 0.8s ease-out forwards; }
    </style>
</head>
<body>

<button class="mode-toggle" onclick="toggleMode()">🔄 학생 / 교사 모드 전환</button>

<!-- ==================== 👨‍🎓 학생 화면 ==================== -->
<div id="student-view">
    <div class="glass-container">
        <h1>📝 2026 인천동양중 생각 Check</h1>
        
        <div id="login-section">
            <div class="form-group">
                <label>학번 (5자리)</label>
                <input type="text" id="student-id" placeholder="예: 30101">
            </div>
            <div class="form-group">
                <label>이름</label>
                <input type="text" id="student-name" placeholder="이름을 입력하세요">
            </div>
            <div class="form-group">
                <label>본인 확인 문구 (학습지와 동일하게 작성)</label>
                <input type="text" id="verify-phrase" placeholder="나만의 확인 문구 입력">
            </div>
            <button onclick="login()">접속하기</button>
        </div>

        <div id="lecture-list-section" class="hidden">
            <h2>📚 오늘의 강의 선택</h2>
            <div id="student-lecture-list">
                <p style="text-align:center; color:#666;">데이터를 불러오는 중입니다...</p>
            </div>
        </div>

        <div id="writing-section" class="hidden">
            <h2 id="lecture-title-display"></h2>
            <div class="form-group">
                <label>💡 오늘의 질문</label>
                <p id="lecture-question-display" style="font-size: 1.1em; line-height: 1.5; font-weight: bold;"></p>
                <p id="lecture-reference-display" style="font-size: 14px; color: #555; background: rgba(0,0,0,0.05); padding: 10px; border-radius: 8px;" class="hidden"></p>
                
                <textarea id="answer-text" rows="8" placeholder="자신의 생각을 자유롭게 적어주세요. (AI 복붙 방지 작동 중!)"></textarea>
                <div class="char-count">글자 수 (공백 제외): <span id="count-display">0</span>자</div>
                <div id="cheat-warning" class="warning hidden">⚠️ 다른 화면으로 이동한 기록이 있습니다. 본인의 생각으로 직접 작성해주세요!</div>
            </div>
            <button onclick="submitAnswer()">제출하기</button>
        </div>
    </div>
</div>

<!-- ==================== 👨‍🏫 교사(관리자) 화면 ==================== -->
<div id="admin-view" class="hidden">
    <div class="glass-container" style="max-width: 1000px;">
        <h1>👨‍🏫 선생님 대시보드</h1>
        
        <div style="background: rgba(255,255,255,0.7); padding: 20px; border-radius: 12px; margin-bottom: 30px; border: 1px solid #eee;">
            <h3>➕ 새 강의 열기</h3>
            <div style="display: flex; gap: 10px; margin-bottom: 10px;">
                <input type="text" id="new-lecture-title" placeholder="강의명 (예: 12강 일제강점기 민족의 저항)" style="flex: 1;">
            </div>
            <div style="margin-bottom: 10px;">
                <input type="text" id="new-lecture-question" placeholder="오늘의 생각 질문 입력">
            </div>
            <div style="margin-bottom: 10px;">
                <input type="text" id="new-lecture-reference" placeholder="참고용 글 (선택사항, 학생 화면에 표시됨)">
            </div>
            <button class="btn-green" onclick="addLecture()">학생들에게 강의 공개하기</button>
        </div>

        <div class="status-summary">
            <h2 style="margin: 0;">제출 완료: <span id="total-submitted-count" style="color: #e74c3c; font-size: 1.5em;">0</span> 명</h2>
        </div>

        <div class="class-tabs">
            <button class="tab-btn active" onclick="filterClass('all')">전체보기</button>
            <button class="tab-btn" onclick="filterClass('1')">1반</button>
            <button class="tab-btn" onclick="filterClass('2')">2반</button>
            <button class="tab-btn" onclick="filterClass('3')">3반</button>
            <button class="tab-btn" onclick="filterClass('4')">4반</button>
            <button class="tab-btn" onclick="filterClass('5')">5반</button>
            <button class="tab-btn" onclick="filterClass('6')">6반</button>
            <button class="tab-btn" onclick="filterClass('picked')" style="background-color: #ffeaa7;">⭐ 픽 모아보기</button>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th style="width: 15%;">학번/이름</th>
                        <th style="width: 55%;">답변 내용</th>
                        <th style="width: 15%;">분석</th>
                        <th style="width: 15%;">관리</th>
                    </tr>
                </thead>
                <tbody id="realtime-table-body">
                    <!-- 실시간 데이터 렌더링 영역 -->
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- ==================== ⚙️ 스크립트 (Firebase 연동) ==================== -->
<script>
    // 1. Firebase 초기화
    const firebaseConfig = {
        apiKey: "AIzaSyDAc5S87JK-LtXzk5-iTR9rt7RnHWnUXTQ",
        authDomain: "ho0911seong-56638.firebaseapp.com",
        databaseURL: "https://ho0911seong-56638-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "ho0911seong-56638",
        storageBucket: "ho0911seong-56638.firebasestorage.app",
        messagingSenderId: "994509567071",
        appId: "1:994509567071:web:be8ed4e8e9b0a833f557ea"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // --- 전역 상태 변수 ---
    let activeLectures = []; 
    let allSubmissions = []; 
    let currentUser = null; 
    let currentSelectedLecture = null; 
    let startTime = 0; 
    let cheatCount = 0; 
    let currentClassFilter = 'all'; 

    // 2. 실시간 데이터베이스 구독 (강의 목록)
    db.collection("lectures").orderBy("createdAt", "asc").onSnapshot((snapshot) => {
        activeLectures = [];
        snapshot.forEach((doc) => {
            activeLectures.push({ docId: doc.id, ...doc.data() });
        });
        renderStudentLectures();
    });

    // 3. 실시간 데이터베이스 구독 (제출 현황)
    db.collection("submissions").orderBy("createdAt", "desc").onSnapshot((snapshot) => {
        allSubmissions = [];
        snapshot.forEach((doc) => {
            allSubmissions.push({ subId: doc.id, ...doc.data() });
        });
        renderAdminDashboard();
    });

    // --- 👨‍🎓 학생 로직 ---
    function login() {
        const id = document.getElementById('student-id').value.trim();
        const name = document.getElementById('student-name').value.trim();
        const verify = document.getElementById('verify-phrase').value.trim();

        if (!id || !name || !verify) { alert("모든 칸을 입력해주세요!"); return; }
        
        currentUser = { id, name, verify };
        
        document.getElementById('login-section').classList.add('hidden');
        document.getElementById('lecture-list-section').classList.remove('hidden');
        renderStudentLectures();
    }

    function renderStudentLectures() {
        const listContainer = document.getElementById('student-lecture-list');
        listContainer.innerHTML = ''; 

        if (activeLectures.length === 0) {
            listContainer.innerHTML = '<p style="text-align:center; color:#666;">현재 열려있는 강의가 없습니다.<br>선생님의 안내를 기다려주세요.</p>';
            return;
        }

        activeLectures.forEach(lecture => {
            const btn = document.createElement('button');
            btn.textContent = lecture.title;
            btn.style.marginBottom = '15px';
            btn.onclick = () => openWritingSection(lecture);
            listContainer.appendChild(btn);
        });
    }

    function openWritingSection(lecture) {
        currentSelectedLecture = lecture;
        document.getElementById('lecture-list-section').classList.add('hidden');
        document.getElementById('writing-section').classList.remove('hidden');
        
        document.getElementById('lecture-title-display').textContent = lecture.title;
        document.getElementById('lecture-question-display').textContent = lecture.question;
        
        const refElement = document.getElementById('lecture-reference-display');
        if (lecture.reference) {
            refElement.textContent = "참고: " + lecture.reference;
            refElement.classList.remove('hidden');
        } else {
            refElement.classList.add('hidden');
        }
        
        document.getElementById('answer-text').value = '';
        document.getElementById('count-display').textContent = '0';
        cheatCount = 0;
        document.getElementById('cheat-warning').classList.add('hidden');
        startTime = Date.now(); 
    }

    // 글자수 카운팅 & 복붙 방지
    const textarea = document.getElementById('answer-text');
    const countDisplay = document.getElementById('count-display');
    
    textarea.addEventListener('input', function() {
        const textWithoutSpaces = this.value.replace(/\s/g, ''); 
        countDisplay.textContent = textWithoutSpaces.length;
    });

    textarea.addEventListener('paste', e => { e.preventDefault(); alert('붙여넣기는 차단되어 있습니다. 직접 타이핑해주세요!'); });
    textarea.addEventListener('contextmenu', e => e.preventDefault());

    document.addEventListener('visibilitychange', function() {
        if (document.hidden && !document.getElementById('writing-section').classList.contains('hidden')) {
            cheatCount++;
            document.getElementById('cheat-warning').classList.remove('hidden');
        }
    });

    // DB에 답변 제출
    function submitAnswer() {
        const text = textarea.value.trim();
        if(!text) { alert("내용을 작성해주세요!"); return; }

        const textLength = text.replace(/\s/g, '').length;
        const duration = Math.floor((Date.now() - startTime) / 1000); 
        
        db.collection("submissions").add({
            lectureDocId: currentSelectedLecture.docId,
            lectureTitle: currentSelectedLecture.title,
            id: currentUser.id,
            name: currentUser.name,
            verify: currentUser.verify,
            text: text,
            textLength: textLength,
            duration: duration,
            cheatCount: cheatCount,
            isPicked: false,
            createdAt: Date.now()
        }).then(() => {
            alert("제출이 완료되었습니다! 수고하셨습니다.");
            document.getElementById('writing-section').classList.add('hidden');
            document.getElementById('lecture-list-section').classList.remove('hidden');
        }).catch((error) => {
            console.error("Error adding document: ", error);
            alert("오류가 발생했습니다. 다시 시도해주세요.");
        });
    }

    // --- 👨‍🏫 교사(관리자) 로직 ---

    // DB에 새 강의 추가
    function addLecture() {
        const title = document.getElementById('new-lecture-title').value.trim();
        const question = document.getElementById('new-lecture-question').value.trim();
        const reference = document.getElementById('new-lecture-reference').value.trim();

        if (!title || !question) { alert("강의명과 질문을 입력해주세요."); return; }

        db.collection("lectures").add({
            title: title,
            question: question,
            reference: reference,
            createdAt: Date.now()
        }).then(() => {
            alert(`[${title}] 강의가 생성되었습니다.`);
            document.getElementById('new-lecture-title').value = '';
            document.getElementById('new-lecture-question').value = '';
            document.getElementById('new-lecture-reference').value = '';
        });
    }

    function filterClass(filterVal) {
        currentClassFilter = filterVal;
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');
        renderAdminDashboard();
    }

    // DB 데이터 수정 (학번/이름)
    function editStudentInfo(subId) {
        const target = allSubmissions.find(s => s.subId === subId);
        if(!target) return;

        const newId = prompt("수정할 학번을 입력하세요:", target.id);
        if(newId === null) return;
        const newName = prompt("수정할 이름을 입력하세요:", target.name);
        if(newName === null) return;

        db.collection("submissions").doc(subId).update({
            id: newId,
            name: newName
        });
    }

    // DB 데이터 수정 (선생님 픽)
    function togglePick(subId) {
        const target = allSubmissions.find(s => s.subId === subId);
        if(target) {
            db.collection("submissions").doc(subId).update({
                isPicked: !target.isPicked
            });
        }
    }

    function renderAdminDashboard() {
        const tbody = document.getElementById('realtime-table-body');
        tbody.innerHTML = '';
        let displayCount = 0;

        allSubmissions.forEach(data => {
            const classStr = data.id.toString();
            const classNumber = classStr.length >= 3 ? classStr.charAt(2) : '';

            if (currentClassFilter === 'picked') {
                if (!data.isPicked) return;
            } else if (currentClassFilter !== 'all' && currentClassFilter !== classNumber) {
                return;
            }

            displayCount++;

            const tr = document.createElement('tr');
            tr.className = 'new-row';
            const isSuspicious = data.cheatCount > 0 || data.duration < 10;
            
            tr.innerHTML = `
                <td style="text-align: center;">
                    <strong>${data.id}</strong><br>${data.name}<br>
                    <span style="font-size:11px; color:#888;">(확인: ${data.verify})</span><br>
                    <button class="edit-btn" onclick="editStudentInfo('${data.subId}')">정보 수정</button>
                </td>
                <td style="line-height: 1.6; word-break: break-all;">
                    <span style="font-size:12px; color:#3498db; font-weight:bold;">[${data.lectureTitle}]</span><br>
                    ${data.text}
                </td>
                <td style="text-align: center; font-size: 14px;">
                    <strong>${data.textLength}자</strong><br>
                    <span style="color: #7f8c8d;">${data.duration}초</span><br>
                    ${isSuspicious ? '<span style="color: #e74c3c; font-weight: bold; font-size: 12px;">⚠️ 의심</span>' : '<span style="color: #27ae60; font-size: 12px;">✅ 정상</span>'}
                </td>
                <td style="text-align: center;">
                    <button class="pick-btn ${data.isPicked ? 'picked' : ''}" onclick="togglePick('${data.subId}')">
                        ${data.isPicked ? '⭐ 픽 취소' : '⭐ 픽 하기'}
                    </button>
                </td>
            `;
            tbody.appendChild(tr);
        });

        document.getElementById('total-submitted-count').textContent = displayCount;
    }

    // --- 🔄 테스트 편의를 위한 모드 전환 기능 ---
    let isStudentMode = true;
    function toggleMode() {
        isStudentMode = !isStudentMode;
        if(isStudentMode) {
            document.getElementById('student-view').classList.remove('hidden');
            document.getElementById('admin-view').classList.add('hidden');
        } else {
            document.getElementById('student-view').classList.add('hidden');
            document.getElementById('admin-view').classList.remove('hidden');
        }
    }
</script>
</body>
</html>
