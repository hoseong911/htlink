<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>천년의 기억 - 관리자</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Nanum+Myeongjo:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1410; --paper: #f4ead5; --paper-dark: #e8d9b8;
    --red-seal: #a8322d; --gold: #c9a44c; --gold-dark: #8b6f2a;
    --jade: #4a6b5c; --shadow: rgba(26,20,16,0.25);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Gowun Batang',-apple-system,sans-serif;background:var(--paper);color:var(--ink);min-height:100vh;line-height:1.6;background-image:radial-gradient(circle at 15% 30%,rgba(168,50,45,.05) 0%,transparent 40%),radial-gradient(circle at 85% 70%,rgba(201,164,76,.08) 0%,transparent 40%),repeating-linear-gradient(45deg,transparent 0px,transparent 2px,rgba(26,20,16,.02) 2px,rgba(26,20,16,.02) 4px);}
  .btn{padding:.8rem 1.5rem;font-family:'Nanum Myeongjo',serif;font-weight:700;font-size:1rem;cursor:pointer;transition:all .2s ease;letter-spacing:.1em;border:2px solid var(--ink);background:rgba(255,255,255,.7);color:var(--ink);box-shadow:3px 3px 0 var(--ink);}
  .btn:hover{background:var(--paper-dark);transform:translate(-2px,-2px);box-shadow:5px 5px 0 var(--ink);}
  .btn:active{transform:translate(1px,1px);box-shadow:1px 1px 0 var(--ink);}
  .btn-primary{background:var(--ink);color:var(--paper);}
  .btn-primary:hover{background:var(--red-seal);border-color:var(--red-seal);color:white;}
  .btn-full{width:100%;margin-top:1rem;}
  .btn-sm{padding:.5rem 1rem;font-size:.85rem;box-shadow:2px 2px 0 var(--ink);}
  .form-input,.field-input,.field-textarea{width:100%;padding:.8rem 1rem;border:2px solid var(--ink);background:rgba(255,255,255,.6);font-family:inherit;font-size:.95rem;transition:all .3s ease;box-shadow:inset 2px 2px 5px rgba(0,0,0,.05);}
  .form-input:focus,.field-input:focus,.field-textarea:focus{outline:none;border-color:var(--red-seal);background:white;box-shadow:0 0 8px rgba(168,50,45,.15);}
  .field-textarea{min-height:80px;resize:vertical;line-height:1.7;}
  /* 로그인 */
  .login-screen{min-height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:2rem;}
  .login-screen.hidden{display:none;}
  .login-box{background:rgba(255,255,255,.5);backdrop-filter:blur(8px);padding:3rem;border:2px solid var(--ink);box-shadow:8px 8px 0 var(--shadow),inset 0 0 0 4px rgba(255,255,255,.3),inset 0 0 0 5px var(--gold-dark);max-width:420px;width:100%;text-align:center;}
  .login-title{font-family:'Nanum Myeongjo',serif;font-weight:800;font-size:1.8rem;letter-spacing:.2em;margin-bottom:.5rem;}
  .login-subtitle{color:var(--jade);font-style:italic;margin-bottom:2rem;font-size:.95rem;}
  .login-seal{width:80px;height:80px;background:var(--red-seal);color:white;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Nanum Myeongjo',serif;font-weight:800;font-size:1rem;margin:0 auto 2rem;box-shadow:0 6px 15px rgba(168,50,45,.4);border:2px solid var(--paper);}
  .form-group{margin-bottom:1.2rem;text-align:left;}
  .form-label{display:block;font-weight:700;margin-bottom:.4rem;font-size:.9rem;}
  .login-error{background:#fee;border-left:4px solid var(--red-seal);padding:.8rem 1rem;margin-top:1rem;color:var(--red-seal);font-size:.9rem;display:none;font-weight:700;}
  .login-error.show{display:block;}
  /* 메인 */
  .main-screen{display:none;min-height:100vh;}
  .main-screen.active{display:block;}
  .main-header{background:rgba(26,20,16,.95);backdrop-filter:blur(10px);color:var(--paper);padding:1rem 1.5rem;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:1rem;box-shadow:0 4px 15px var(--shadow);border-bottom:2px solid var(--gold);position:sticky;top:0;z-index:100;}
  .header-title{font-family:'Nanum Myeongjo',serif;font-weight:800;font-size:1.3rem;letter-spacing:.15em;}
  .header-actions{display:flex;gap:1rem;align-items:center;flex-wrap:wrap;}
  .user-email{color:var(--gold);font-size:.85rem;font-weight:700;}
  .main-tabs{background:rgba(255,255,255,.7);border-bottom:2px solid var(--ink);display:flex;overflow-x:auto;padding:0 1rem;}
  .tab-btn{background:transparent;border:none;padding:1rem 1.5rem;font-family:'Nanum Myeongjo',serif;font-weight:700;font-size:.95rem;cursor:pointer;color:var(--ink);border-bottom:3px solid transparent;letter-spacing:.1em;white-space:nowrap;transition:all .2s ease;}
  .tab-btn:hover{background:rgba(201,164,76,.1);}
  .tab-btn.active{color:var(--red-seal);border-bottom-color:var(--red-seal);background:rgba(255,255,255,.5);}
  .main-content{padding:2rem 1.5rem;max-width:1100px;margin:0 auto;padding-bottom:6rem;}
  /* 카드 */
  .episode-item,.settings-section,.preview-episode,.preview-controls-bar{background:rgba(255,255,255,.5);backdrop-filter:blur(4px);border:2px solid var(--ink);margin-bottom:1.5rem;box-shadow:5px 5px 0 var(--shadow);transition:box-shadow .3s ease;}
  .episode-item:hover{box-shadow:7px 7px 0 var(--shadow);}
  .episode-item-header,.preview-ep-header{background:var(--ink);color:var(--paper);padding:1.2rem 1.5rem;cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:1rem;transition:background .3s ease;}
  .episode-item-header:hover,.preview-ep-header:hover{background:var(--red-seal);}
  .episode-item-info{flex:1;min-width:0;}
  .episode-num{color:var(--gold);font-size:.8rem;letter-spacing:.2em;margin-bottom:.3rem;font-weight:700;}
  .episode-name{font-family:'Nanum Myeongjo',serif;font-weight:700;font-size:1.1rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .episode-toggle,.prev-toggle{color:var(--gold);font-size:1.3rem;transition:transform .4s cubic-bezier(.34,1.56,.64,1);flex-shrink:0;}
  .episode-item.expanded .episode-toggle{transform:rotate(180deg);}
  .episode-item-body,.preview-ep-body{display:none;padding:2rem 1.5rem;background:rgba(255,255,255,.3);}
  .episode-item.expanded .episode-item-body,.preview-episode.expanded .preview-ep-body{display:block;animation:slideDown .4s ease;}
  /* 필드 */
  .field-group{margin-bottom:1.5rem;}
  .field-label{display:block;font-weight:700;color:var(--red-seal);margin-bottom:.5rem;font-size:.95rem;}
  .field-hint{color:#666;font-size:.85rem;margin-bottom:.5rem;font-style:italic;background:rgba(201,164,76,.1);display:inline-block;padding:.2rem .5rem;}
  .field-tag{display:inline-block;background:var(--ink);color:var(--paper);padding:.3rem .8rem;font-size:.8rem;font-weight:700;margin-right:.4rem;margin-bottom:.4rem;border-radius:20px;box-shadow:2px 2px 0 var(--shadow);}
  .array-item{display:flex;gap:.6rem;margin-bottom:.6rem;align-items:flex-start;flex-wrap:wrap;}
  .array-item-num{background:var(--gold-dark);color:white;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.82rem;font-weight:700;flex-shrink:0;margin-top:.55rem;}
  .array-item-input{flex:1;min-width:200px;}
  .sub-section{background:rgba(255,255,255,.6);border:1px dashed var(--gold-dark);padding:1rem;margin-bottom:.8rem;}
  .sub-section-title{font-weight:700;color:var(--gold-dark);margin-bottom:.6rem;font-size:.9rem;}
  .inline-sent-block{background:rgba(255,255,255,.7);border:1px solid var(--gold-dark);padding:.8rem;margin-bottom:.6rem;}
  /* 설정 */
  .settings-section{padding:2rem;background:rgba(255,255,255,.6);}
  .settings-section h3{font-family:'Nanum Myeongjo',serif;margin-bottom:1.5rem;letter-spacing:.1em;border-bottom:2px dashed var(--gold-dark);padding-bottom:.8rem;font-size:1.3rem;}
  /* 미리보기 */
  .preview-controls-bar{padding:1.2rem;display:flex;gap:.8rem;flex-wrap:wrap;justify-content:center;background:rgba(255,255,255,.8);}
  .preview-section{margin-bottom:1.5rem;}
  .preview-section-label{display:inline-block;background:var(--ink);color:white;padding:.3rem 1rem;font-weight:700;font-size:.85rem;letter-spacing:.1em;margin-bottom:.6rem;box-shadow:2px 2px 0 var(--shadow);}
  .preview-section-label.answer{background:var(--jade);}
  .preview-section-label.hint{background:var(--gold-dark);}
  .preview-section-label.treasure{background:var(--red-seal);}
  .preview-section-content{background:rgba(255,255,255,.7);border-left:4px solid var(--gold-dark);padding:1rem 1.2rem;line-height:1.8;}
  .preview-section-content.story{font-style:italic;color:var(--jade);background:rgba(74,107,92,.05);}
  .preview-section-content.answer{border-left-color:var(--jade);background:rgba(74,107,92,.1);font-weight:700;}
  /* 저장 바 */
  .save-bar{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.85);backdrop-filter:blur(10px);border-top:2px solid var(--ink);padding:1rem 2rem;display:flex;gap:1rem;justify-content:flex-end;box-shadow:0 -4px 20px var(--shadow);z-index:50;flex-wrap:wrap;align-items:center;}
  .save-indicator{color:var(--jade);font-size:.95rem;font-weight:700;align-self:center;margin-right:auto;}
  .toast{position:fixed;top:80px;left:50%;transform:translateX(-50%) translateY(-100px);background:var(--ink);color:var(--paper);padding:1.2rem 2rem;border:2px solid var(--gold);box-shadow:0 6px 25px var(--shadow);font-family:'Nanum Myeongjo',serif;font-weight:700;font-size:1.05rem;z-index:1000;transition:transform .5s cubic-bezier(.34,1.56,.64,1);max-width:90%;text-align:center;}
  .toast.show{transform:translateX(-50%) translateY(0);}
  .toast.success{background:var(--jade);border-color:var(--paper);}
  .toast.error{background:var(--red-seal);border-color:var(--paper);}
  .loading{text-align:center;padding:4rem 2rem;color:var(--red-seal);font-weight:700;}
  .loading-spinner{width:50px;height:50px;border:4px solid rgba(168,50,45,.2);border-top-color:var(--red-seal);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 1.5rem;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .empty-state{text-align:center;padding:4rem 2rem;color:#888;font-style:italic;background:rgba(255,255,255,.5);border:2px dashed var(--ink);}
  .info-banner{background:rgba(255,248,225,.8);border-left:4px solid var(--gold);padding:1.2rem 1.5rem;margin-bottom:2rem;font-size:.95rem;}
  .info-banner strong{color:var(--red-seal);}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  @keyframes slideDown{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
  @media(max-width:600px){
    .login-box{padding:2rem 1.5rem;}
    .main-content{padding:1rem;padding-bottom:6rem;}
    .save-bar{flex-direction:column-reverse;padding:1rem;}
    .save-bar .btn{width:100%;}
    .save-indicator{text-align:center;margin-right:0;}
  }
</style>
</head>
<body>

<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <div class="login-seal">관리</div>
    <h1 class="login-title">관리자 입장</h1>
    <p class="login-subtitle">천년의 기억 관리실</p>
    <form onsubmit="return false;">
      <div class="form-group">
        <label class="form-label">이메일</label>
        <input type="email" class="form-input" id="loginEmail" placeholder="이메일 입력" autocomplete="email">
      </div>
      <div class="form-group">
        <label class="form-label">비밀번호</label>
        <input type="password" class="form-input" id="loginPassword" placeholder="비밀번호 입력" autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn-primary btn-full" id="loginBtn" onclick="window.handleLogin()">입장하기</button>
    </form>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<div class="main-screen" id="mainScreen">
  <header class="main-header">
    <div class="header-title">🏯 천년의 기억 · 관리실</div>
    <div class="header-actions">
      <span class="user-email" id="userEmail"></span>
      <button class="btn btn-sm" onclick="window.handleLogout()">나가기</button>
    </div>
  </header>
  <nav class="main-tabs">
    <button class="tab-btn active" onclick="window.switchTab('episodes')" id="tab-episodes">📜 에피소드 편집</button>
    <button class="tab-btn" onclick="window.switchTab('settings')" id="tab-settings">⚙️ 게임 설정</button>
    <button class="tab-btn" onclick="window.switchTab('preview')" id="tab-preview">👁️ 미리보기</button>
  </nav>
  <main class="main-content">
    <div id="content-episodes">
      <div class="info-banner"><strong>📝 안내:</strong> 에피소드를 클릭해 펼친 뒤 수정하고 하단 <strong>"저장하기"</strong>를 누르세요.</div>
      <div id="episodesList"><div class="loading"><div class="loading-spinner"></div>데이터를 불러오는 중...</div></div>
    </div>
    <div id="content-settings" style="display:none;">
      <div class="info-banner"><strong>⚙️ 안내:</strong> 인트로·엔딩 텍스트를 수정할 수 있습니다.</div>
      <div id="settingsList"><div class="loading"><div class="loading-spinner"></div>설정을 불러오는 중...</div></div>
    </div>
    <div id="content-preview" style="display:none;">
      <div class="info-banner"><strong>👁️ 안내:</strong> 학생 화면의 내용과 정답을 확인합니다. <strong>관리자만 볼 수 있습니다.</strong></div>
      <div class="preview-controls-bar">
        <button class="btn btn-sm" onclick="window.expandAllPreview(true)">📂 모두 펼치기</button>
        <button class="btn btn-sm" onclick="window.expandAllPreview(false)">📁 모두 접기</button>
        <button class="btn btn-sm btn-primary" onclick="window.openStudentView()">🎮 학생 화면 열기</button>
      </div>
      <div id="previewContent"><div class="loading"><div class="loading-spinner"></div>미리보기 준비 중...</div></div>
    </div>
  </main>
  <div class="save-bar" id="saveBar" style="display:none;">
    <span class="save-indicator" id="saveIndicator"></span>
    <button class="btn" onclick="window.reloadData()">🔄 새로고침</button>
    <button class="btn btn-primary" onclick="window.saveAll()">💾 저장하기</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, getDoc, getDocs, collection, query, orderBy, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDAc5S87JK-LtXzk5-iTR9rt7RnHWnUXTQ",
  authDomain: "ho0911seong-56638.firebaseapp.com",
  databaseURL: "https://ho0911seong-56638-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "ho0911seong-56638",
  storageBucket: "ho0911seong-56638.firebasestorage.app",
  messagingSenderId: "994509567071",
  appId: "1:994509567071:web:40720d76850dd739f557ea"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let episodes = [], gameSettings = {}, currentTab = 'episodes';

const TYPE_LABELS = {
  'fillBlanksInline':  '인라인 빈칸 채우기',
  'kingMatch2stage':   '발해 왕 매칭 + 고구려 계승 (2단계)',
  'singleInput':       '비밀번호 추론',
  'classify4':         '4영역 카드 분류',
  'characterGuess':    '인물 대사 맞추기 + 정책 매칭 (2단계)',
  'pairMatch':         '인물·업적 짝짓기',
  'orderSource':       '사료 순서 배열',
  'blanks2stage':      '몽골 침입 빈칸 + 공민왕 정책 (2단계)',
  'finalQuest':        '세력 분류 + 단답 (2단계)',
};

// ── 로그인 ──
window.handleLogin = async function() {
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;
  const errorEl = document.getElementById('loginError');
  const btn = document.getElementById('loginBtn');
  if (!email || !password) { errorEl.textContent = '이메일과 비밀번호를 모두 입력하시오.'; errorEl.classList.add('show'); return; }
  btn.disabled = true; btn.textContent = '입장 중...'; errorEl.classList.remove('show');
  try {
    await signInWithEmailAndPassword(auth, email, password);
  } catch(e) {
    let msg = '입장에 실패하였소.';
    if (['auth/invalid-credential','auth/wrong-password','auth/user-not-found'].includes(e.code)) msg = '이메일 또는 비밀번호가 옳지 않소.';
    else if (e.code === 'auth/too-many-requests') msg = '잠시 후 다시 시도하시오.';
    errorEl.textContent = msg; errorEl.classList.add('show');
    btn.disabled = false; btn.textContent = '입장하기';
  }
};

window.handleLogout = async function() {
  if (!confirm('나가시겠습니까? 저장하지 않은 내용은 사라집니다.')) return;
  await signOut(auth); location.reload();
};

onAuthStateChanged(auth, user => {
  if (user) {
    document.getElementById('loginScreen').classList.add('hidden');
    document.getElementById('mainScreen').classList.add('active');
    document.getElementById('userEmail').textContent = user.email;
    loadData();
  } else {
    document.getElementById('loginScreen').classList.remove('hidden');
    document.getElementById('mainScreen').classList.remove('active');
  }
});

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('loginPassword')?.addEventListener('keypress', e => { if(e.key==='Enter') window.handleLogin(); });
});

// ── 데이터 로드 ──
async function loadData() {
  try {
    const snap = await getDocs(query(collection(db,'202606_escape_episodes'), orderBy('order')));
    episodes = [];
    snap.forEach(d => { const data = d.data(); data._docId = d.id; episodes.push(data); });
    const sd = await getDoc(doc(db,'202606_escape_settings','main'));
    gameSettings = sd.exists() ? sd.data() : {};
    renderCurrentTab();
  } catch(e) {
    showToast('로드 실패: ' + e.message, 'error');
  }
}

window.reloadData = async function() {
  if (!confirm('저장하지 않은 변경사항이 사라집니다. 계속하시겠습니까?')) return;
  await loadData(); showToast('새로 불러왔소.', 'success');
};

window.switchTab = function(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  ['episodes','settings','preview'].forEach(t => {
    document.getElementById('content-'+t).style.display = t===tab ? 'block' : 'none';
  });
  document.getElementById('saveBar').style.display = tab==='preview' ? 'none' : 'flex';
  renderCurrentTab();
};

function renderCurrentTab() {
  if (currentTab==='episodes') renderEpisodes();
  else if (currentTab==='settings') renderSettings();
  else renderPreview();
}

// ══════════════════════════════════════════
// 에피소드 편집
// ══════════════════════════════════════════
function renderEpisodes() {
  const list = document.getElementById('episodesList');
  if (!episodes.length) { list.innerHTML = '<div class="empty-state">에피소드가 없습니다.</div>'; return; }
  list.innerHTML = episodes.map((ep,idx) => `
    <div class="episode-item" id="ep-item-${idx}">
      <div class="episode-item-header" onclick="window.toggleEpisode(${idx})">
        <div class="episode-item-info">
          <div class="episode-num">${ep.subtitle||`제${idx+1}장`}</div>
          <div class="episode-name">${ep.title||'제목 없음'}</div>
        </div>
        <div class="episode-toggle">▼</div>
      </div>
      <div class="episode-item-body">${renderEpFields(ep,idx)}</div>
    </div>
  `).join('');
}

window.toggleEpisode = idx => document.getElementById(`ep-item-${idx}`).classList.toggle('expanded');

function renderEpFields(ep, idx) {
  return `
    <div class="field-group">
      <span class="field-tag">유형: ${TYPE_LABELS[ep.type]||ep.type}</span>
      <span class="field-tag">순서: ${ep.order}</span>
    </div>
    ${f('📖 제목','title',ep,idx)}
    ${f('🔢 부제 (예: 제1장)','subtitle',ep,idx)}
    ${fta('📜 스토리','story',ep,idx,3)}
    ${f('🎭 화자','speaker',ep,idx)}
    ${fta('💬 대사','dialog',ep,idx,3)}
    ${fta('❓ 문제 지시문','question',ep,idx,2)}
    ${renderTypeFields(ep,idx)}
    ${fta('💡 힌트','hint',ep,idx,2)}
    ${f('✦ 보물 이름','treasureName',ep,idx)}
    ${fta('✦ 보물 설명','treasureDesc',ep,idx,2)}
    ${fta('✦ 보물 역사적 의미','treasureMeaning',ep,idx,2)}
  `;
}

// 단축 필드 생성
function f(label, field, ep, idx) {
  return `<div class="field-group"><label class="field-label">${label}</label><input type="text" class="field-input" data-ep="${idx}" data-field="${field}" value="${escH(ep[field])}"></div>`;
}
function fta(label, field, ep, idx, rows=2) {
  return `<div class="field-group"><label class="field-label">${label}</label><textarea class="field-textarea" data-ep="${idx}" data-field="${field}" rows="${rows}">${escH(ep[field])}</textarea></div>`;
}
function arr(items, idx, field, label='') {
  return (items||[]).map((v,i) => `<div class="array-item"><span class="array-item-num">${i+1}</span><input type="text" class="field-input array-item-input" data-ep="${idx}" data-field="${field}" data-arr-idx="${i}" value="${escH(v)}"></div>`).join('');
}
function arrTa(items, idx, field, rows=2) {
  return (items||[]).map((v,i) => `<div class="array-item"><span class="array-item-num">${i+1}</span><textarea class="field-textarea array-item-input" rows="${rows}" data-ep="${idx}" data-field="${field}" data-arr-idx="${i}">${escH(v)}</textarea></div>`).join('');
}

function renderTypeFields(ep, idx) {
  switch(ep.type) {

    case 'fillBlanksInline': return `
      <div class="field-group">
        <label class="field-label">📝 인라인 빈칸 문장 (▢ 로 빈칸 표시)</label>
        <div class="field-hint">answerIdx = answers 배열에서 몇 번째 정답인지 (0부터 시작)</div>
        ${(ep.inlineSentences||[]).map((sent,si) => `
          <div class="inline-sent-block">
            <div class="sub-section-title">문장 ${si+1}</div>
            <div class="array-item" style="margin-bottom:.4rem;">
              <span style="font-size:.85rem;font-weight:700;min-width:70px;margin-top:.6rem;">문장:</span>
              <input type="text" class="field-input array-item-input" data-ep="${idx}" data-field="sentText" data-arr-idx="${si}" value="${escH(sent.text)}">
            </div>
            <div class="array-item">
              <span style="font-size:.85rem;font-weight:700;min-width:70px;margin-top:.6rem;">정답 번호:</span>
              <input type="number" min="0" class="field-input" style="max-width:80px;" data-ep="${idx}" data-field="sentAnsIdx" data-arr-idx="${si}" value="${sent.answerIdx??si}">
            </div>
          </div>
        `).join('')}
      </div>
      <div class="field-group">
        <label class="field-label">✓ 정답 목록 (0번부터)</label>
        ${arr(ep.answers, idx, 'answers')}
      </div>
    `;

    case 'kingMatch2stage': return `
      <div class="field-group">
        <label class="field-label">👑 왕 이름 (시대순)</label>
        ${arr(ep.kings, idx, 'kings')}
      </div>
      <div class="field-group">
        <label class="field-label">📜 각 왕의 업적 (같은 번호와 1:1 대응)</label>
        ${arrTa(ep.achievements, idx, 'achievements')}
      </div>
      <div class="field-group">
        <label class="field-label">📋 제2단계 선택지 (고구려 계승 증거)</label>
        <div class="field-hint">체크된 항목이 정답입니다</div>
        ${(ep.options||[]).map((opt,i) => `
          <div class="array-item">
            <span class="array-item-num">${i+1}</span>
            <input type="text" class="field-input array-item-input" data-ep="${idx}" data-field="options" data-arr-idx="${i}" value="${escH(opt)}">
            <label style="display:flex;align-items:center;gap:.3rem;font-size:.85rem;cursor:pointer;white-space:nowrap;padding-top:.5rem;">
              <input type="checkbox" data-ep="${idx}" data-field="correctAnswers" data-arr-idx="${i}" ${(ep.correctAnswers||[]).includes(i)?'checked':''}> 정답
            </label>
          </div>
        `).join('')}
      </div>
    `;

    case 'singleInput': return `
      <div class="field-group">
        <label class="field-label">✓ 정답 (비밀번호)</label>
        <input type="text" class="field-input" data-ep="${idx}" data-field="answer" value="${escH(ep.answer)}">
      </div>
      <div class="field-group">
        <label class="field-label">📌 입력창 안내 문구</label>
        <input type="text" class="field-input" data-ep="${idx}" data-field="inputHint" value="${escH(ep.inputHint)}">
      </div>
    `;

    case 'classify4':
    case 'finalQuest': return `
      <div class="field-group">
        <label class="field-label">🃏 분류 카드 목록</label>
        ${arr(ep.items, idx, 'items')}
      </div>
      <div class="field-group">
        <label class="field-label">📂 분류 영역 + 정답</label>
        <div class="field-hint">정답 번호: 쉼표 구분, 1부터 시작 (예: 1, 3, 5)</div>
        ${(ep.zones||[]).map((zone,zi) => `
          <div class="sub-section">
            <div class="sub-section-title">영역 ${zi+1}</div>
            <div class="array-item" style="margin-bottom:.4rem;">
              <span style="font-size:.85rem;font-weight:700;min-width:50px;margin-top:.6rem;">이름:</span>
              <input type="text" class="field-input array-item-input" data-ep="${idx}" data-field="zoneName" data-arr-idx="${zi}" value="${escH(zone.name)}" placeholder="영역 이름">
            </div>
            <div class="array-item">
              <span style="font-size:.85rem;font-weight:700;min-width:50px;margin-top:.6rem;">정답:</span>
              <input type="text" class="field-input array-item-input" data-ep="${idx}" data-field="zoneCorrect" data-arr-idx="${zi}" value="${(zone.correct||[]).map(c=>c+1).join(', ')}" placeholder="예: 1, 3">
            </div>
          </div>
        `).join('')}
      </div>
      ${ep.type==='finalQuest' ? `
        ${fta('❓ 제2단계 질문','finalQuestion',ep,idx,2)}
        ${f('✓ 제2단계 정답','finalAnswer',ep,idx)}
      ` : ''}
    `;

    case 'characterGuess': return `
      <div class="field-group">
        <label class="field-label">🎭 제1단계 — 인물 대사 카드</label>
        ${(ep.characters||[]).map((ch,i) => `
          <div class="sub-section">
            <div class="sub-section-title">인물 ${i+1}</div>
            <div class="field-group" style="margin-bottom:.5rem;">
              <label class="field-label" style="font-size:.85rem;">대사 내용</label>
              <textarea class="field-textarea" rows="3" data-ep="${idx}" data-field="charQuote" data-arr-idx="${i}">${escH(ch.quote)}</textarea>
            </div>
            <div class="field-group" style="margin-bottom:0;">
              <label class="field-label" style="font-size:.85rem;">정답 이름</label>
              <input type="text" class="field-input" data-ep="${idx}" data-field="charAnswer" data-arr-idx="${i}" value="${escH(ch.answer)}">
            </div>
          </div>
        `).join('')}
      </div>
      <div class="field-group">
        <label class="field-label">📋 제2단계 — 왕건 정책</label>
        ${(ep.policies||[]).map((p,i) => `
          <div class="sub-section">
            <div class="sub-section-title">정책 ${i+1}</div>
            <div class="field-group" style="margin-bottom:.5rem;">
              <label class="field-label" style="font-size:.85rem;">설명</label>
              <textarea class="field-textarea" rows="2" data-ep="${idx}" data-field="policyDesc" data-arr-idx="${i}">${escH(p.desc)}</textarea>
            </div>
            <div class="field-group" style="margin-bottom:0;">
              <label class="field-label" style="font-size:.85rem;">정답 정책명</label>
              <input type="text" class="field-input" data-ep="${idx}" data-field="policyAnswer" data-arr-idx="${i}" value="${escH(p.answer)}">
            </div>
          </div>
        `).join('')}
      </div>
      <div class="field-group">
        <label class="field-label">📌 드롭다운 선택지 (쉼표 구분)</label>
        <input type="text" class="field-input" data-ep="${idx}" data-field="policyOptionsStr" value="${escH((ep.policyOptions||[]).join(', '))}">
      </div>
    `;

    case 'orderSource': return `
      <div class="field-group">
        <label class="field-label">📜 사료 목록 (정답 순서대로 입력)</label>
        <div class="field-hint">실제 게임에선 무작위로 노출됩니다</div>
        ${(ep.correctOrder||[]).map((origIdx,newIdx) => `
          <div class="array-item">
            <span class="array-item-num">${newIdx+1}</span>
            <textarea class="field-textarea array-item-input" rows="2" data-ep="${idx}" data-field="sourceItem" data-arr-idx="${newIdx}">${escH((ep.sources||[])[origIdx]||'')}</textarea>
          </div>
        `).join('')}
      </div>
    `;

    case 'blanks2stage': return `
      <div class="field-group">
        <label class="field-label">📝 제1단계 — 빈칸 문장 (▢ 로 빈칸)</label>
        <div class="field-hint">answerIdx = answers 배열 번호 (0부터)</div>
        ${(ep.inlineSentences||[]).map((sent,si) => `
          <div class="inline-sent-block">
            <div class="sub-section-title">문장 ${si+1}</div>
            <div class="array-item" style="margin-bottom:.4rem;">
              <span style="font-size:.85rem;font-weight:700;min-width:70px;margin-top:.6rem;">문장:</span>
              <input type="text" class="field-input array-item-input" data-ep="${idx}" data-field="sentText" data-arr-idx="${si}" value="${escH(sent.text)}">
            </div>
            <div class="array-item">
              <span style="font-size:.85rem;font-weight:700;min-width:70px;margin-top:.6rem;">정답 번호:</span>
              <input type="number" min="0" class="field-input" style="max-width:80px;" data-ep="${idx}" data-field="sentAnsIdx" data-arr-idx="${si}" value="${sent.answerIdx??si}">
            </div>
          </div>
        `).join('')}
      </div>
      <div class="field-group">
        <label class="field-label">✓ 제1단계 정답 목록</label>
        ${arr(ep.answers, idx, 'answers')}
      </div>
      <div class="field-group">
        <label class="field-label">📋 제2단계 — 공민왕 정책 선택지</label>
        <div class="field-hint">체크된 항목이 공민왕의 반원 자주 정책(정답)입니다</div>
        ${(ep.goryeoOptions||[]).map((opt,i) => `
          <div class="array-item">
            <span class="array-item-num">${i+1}</span>
            <input type="text" class="field-input array-item-input" data-ep="${idx}" data-field="goryeoOptText" data-arr-idx="${i}" value="${escH(opt.text)}">
            <label style="display:flex;align-items:center;gap:.3rem;font-size:.85rem;cursor:pointer;white-space:nowrap;padding-top:.5rem;">
              <input type="checkbox" data-ep="${idx}" data-field="goryeoOptCorrect" data-arr-idx="${i}" ${opt.correct?'checked':''}> 정답
            </label>
          </div>
        `).join('')}
      </div>
    `;

    default: return `<div class="field-group"><div class="field-hint">이 유형(${ep.type})의 편집 필드가 준비 중입니다.</div></div>`;
  }
}

function renderPreview() {
  const content = document.getElementById('previewContent');
  if (!episodes.length) { content.innerHTML = '<div class="empty-state">에피소드가 없습니다.</div>'; return; }
  content.innerHTML = episodes.map((ep,idx) => `
    <div class="preview-episode" id="prev-ep-${idx}">
      <div class="preview-ep-header" onclick="window.togglePreviewEp(${idx})">
        <div style="flex:1;min-width:0;">
          <div style="color:var(--gold);font-size:.8rem;letter-spacing:.2em;margin-bottom:.2rem;font-weight:700;">${ep.subtitle||''}</div>
          <div style="font-family:'Nanum Myeongjo',serif;font-weight:700;font-size:1.1rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${ep.title||''}</div>
        </div>
        <div class="prev-toggle" style="color:var(--gold);font-size:1.3rem;transition:transform .3s ease;">▼</div>
      </div>
      <div class="preview-ep-body">${renderPreviewBody(ep)}</div>
    </div>
  `).join('');
}

function renderPreviewBody(ep) {
  return `
    <div class="preview-section">
      <span class="preview-section-label">📜 스토리</span>
      <div class="preview-section-content story">${ep.story||''}</div>
    </div>
    <div class="preview-section">
      <span class="preview-section-label">💬 대사 (${ep.speaker||''} 가 말하기를)</span>
      <div class="preview-section-content">"${ep.dialog||''}"</div>
    </div>
    <div class="preview-section">
      <span class="preview-section-label">❓ 문제</span>
      <div style="margin-bottom:.5rem;"><span class="field-tag">${TYPE_LABELS[ep.type]||ep.type}</span></div>
      <div class="preview-section-content">${ep.question||''}</div>
      ${renderPreviewDetail(ep)}
    </div>
    <div class="preview-section">
      <span class="preview-section-label answer">✓ 정답</span>
      <div class="preview-section-content answer">${renderPreviewAnswer(ep)}</div>
    </div>
    <div class="preview-section">
      <span class="preview-section-label hint">💡 힌트</span>
      <div class="preview-section-content">${ep.hint||''}</div>
    </div>
    <div class="preview-section">
      <span class="preview-section-label treasure">✦ 보물</span>
      <div class="preview-section-content">
        <strong style="color:var(--red-seal);font-size:1.1rem;">${ep.treasureName||''}</strong><br>
        <span style="color:#555;font-style:italic;">${ep.treasureDesc||''}</span><br>
        <span style="color:var(--jade);font-size:.9rem;display:block;margin-top:.4rem;">${ep.treasureMeaning||''}</span>
      </div>
    </div>
  `;
}

function renderPreviewDetail(ep) {
  const row = (text,correct=null) => `<div style="padding:.35rem .8rem;background:${correct===true?'rgba(74,107,92,.15)':correct===false?'rgba(255,255,255,.7)':'rgba(255,255,255,.7)'};margin-bottom:.3rem;font-size:.9rem;border-left:3px solid ${correct===true?'var(--jade)':correct===false?'#ccc':'var(--gold)'};">${correct===true?'✓ ':correct===false?'✗ ':''}${text}</div>`;
  const tag = t => `<span class="field-tag" style="font-size:.8rem;">${t}</span>`;

  switch(ep.type) {
    case 'fillBlanksInline':
      return `<div style="margin-top:.8rem;"><strong style="color:var(--red-seal);font-size:.9rem;">▶ 빈칸 문장:</strong><div style="margin-top:.4rem;">${(ep.inlineSentences||[]).map((s,i)=>row(`${i+1}) ${s.text}`)).join('')}</div></div>`;

    case 'kingMatch2stage':
      return `<div style="margin-top:.8rem;">
        <strong style="color:var(--red-seal);font-size:.9rem;">▶ 왕 카드 (시대순):</strong>
        <div style="margin-top:.3rem;">${(ep.kings||[]).map(tag).join('')}</div>
        <strong style="color:var(--red-seal);font-size:.9rem;display:block;margin-top:.6rem;">▶ 업적 카드:</strong>
        <div style="margin-top:.3rem;">${(ep.achievements||[]).map((a,i)=>row(`${i+1}) ${a}`)).join('')}</div>
        <strong style="color:var(--red-seal);font-size:.9rem;display:block;margin-top:.6rem;">▶ 제2단계 선택지:</strong>
        <div style="margin-top:.3rem;">${(ep.options||[]).map((o,i)=>row(o,(ep.correctAnswers||[]).includes(i))).join('')}</div>
      </div>`;

    case 'classify4':
    case 'finalQuest':
      return `<div style="margin-top:.8rem;">
        <strong style="color:var(--red-seal);font-size:.9rem;">▶ 분류 카드:</strong>
        <div style="margin-top:.3rem;">${(ep.items||[]).map((item,i)=>tag(`${i+1}. ${item}`)).join('')}</div>
        <strong style="color:var(--red-seal);font-size:.9rem;display:block;margin-top:.6rem;">▶ 분류 영역:</strong>
        <div style="margin-top:.3rem;">${(ep.zones||[]).map(z=>tag(z.name)).join('')}</div>
        ${ep.type==='finalQuest'?`<strong style="color:var(--red-seal);font-size:.9rem;display:block;margin-top:.6rem;">▶ 제2단계 질문:</strong><div class="preview-section-content" style="margin-top:.3rem;font-size:.9rem;">${ep.finalQuestion||''}</div>`:''}
      </div>`;

    case 'characterGuess':
      return `<div style="margin-top:.8rem;">
        <strong style="color:var(--red-seal);font-size:.9rem;">▶ 인물 대사:</strong>
        ${(ep.characters||[]).map(ch=>`<div style="padding:.6rem .8rem;background:rgba(255,255,255,.7);margin:.3rem 0;border-left:3px solid var(--gold);font-size:.9rem;"><em>"${ch.quote}"</em><br><strong>→ 정답: ${ch.answer}</strong></div>`).join('')}
        <strong style="color:var(--red-seal);font-size:.9rem;display:block;margin-top:.6rem;">▶ 왕건 정책:</strong>
        ${(ep.policies||[]).map(p=>`<div style="padding:.5rem .8rem;background:rgba(255,255,255,.7);margin:.3rem 0;border-left:3px solid var(--gold);font-size:.9rem;">${p.desc}<br><strong>→ ${p.answer}</strong></div>`).join('')}
      </div>`;

    case 'orderSource':
      return `<div style="margin-top:.8rem;"><strong style="color:var(--red-seal);font-size:.9rem;">▶ 사료 (무작위 노출):</strong><div style="margin-top:.3rem;">${(ep.sources||[]).map(s=>row(`"${s}"`)).join('')}</div></div>`;

    case 'blanks2stage':
      return `<div style="margin-top:.8rem;">
        <strong style="color:var(--red-seal);font-size:.9rem;">▶ 빈칸 문장:</strong>
        <div style="margin-top:.3rem;">${(ep.inlineSentences||[]).map((s,i)=>row(`${i+1}) ${s.text}`)).join('')}</div>
        <strong style="color:var(--red-seal);font-size:.9rem;display:block;margin-top:.6rem;">▶ 제2단계 선택지:</strong>
        <div style="margin-top:.3rem;">${(ep.goryeoOptions||[]).map(o=>row(o.text,o.correct)).join('')}</div>
      </div>`;

    default: return '';
  }
}

function renderPreviewAnswer(ep) {
  switch(ep.type) {
    case 'fillBlanksInline':
      return (ep.answers||[]).map((a,i)=>`<strong>${i}번</strong> → ${a}`).join(' · ');

    case 'kingMatch2stage': {
      let h = (ep.kings||[]).map((k,i)=>`<div style="padding:.3rem 0;border-bottom:1px dashed var(--gold-dark);"><strong>${i+1}. ${k}</strong> — ${(ep.achievements||[])[i]||''}</div>`).join('');
      h += `<div style="margin-top:.5rem;padding-top:.5rem;border-top:2px dashed var(--gold-dark);"><strong style="color:var(--jade);">제2단계 정답:</strong> ${(ep.correctAnswers||[]).map(i=>`<strong>${(ep.options||[])[i]}</strong>`).join(', ')}</div>`;
      return h;
    }

    case 'singleInput':
      return `비밀번호: <strong style="font-size:1.3rem;letter-spacing:.3em;color:var(--red-seal);">${ep.answer||''}</strong>`;

    case 'classify4':
      return (ep.zones||[]).map(z=>`<div style="padding:.3rem 0;border-bottom:1px dashed var(--gold-dark);"><strong>${z.name}:</strong> ${(z.correct||[]).map(i=>(ep.items||[])[i]).join(', ')}</div>`).join('');

    case 'characterGuess': {
      let h = (ep.characters||[]).map(ch=>`<div style="padding:.3rem 0;border-bottom:1px dashed var(--gold-dark);">→ <strong>${ch.answer}</strong></div>`).join('');
      h += `<div style="margin-top:.5rem;"><strong style="color:var(--jade);">정책:</strong> ${(ep.policies||[]).map(p=>`<strong>${p.answer}</strong>`).join(', ')}</div>`;
      return h;
    }

    case 'orderSource':
      return (ep.correctOrder||[]).map((origIdx,ni)=>`<div style="padding:.3rem 0;border-bottom:1px dashed var(--gold-dark);"><strong>${ni+1}.</strong> ${(ep.sources||[])[origIdx]||''}</div>`).join('');

    case 'blanks2stage': {
      let h = (ep.answers||[]).map((a,i)=>`<strong>${i}번</strong> → ${a}`).join(' · ');
      h += `<div style="margin-top:.5rem;padding-top:.5rem;border-top:2px dashed var(--gold-dark);"><strong style="color:var(--jade);">제2단계 정답:</strong> ${(ep.goryeoOptions||[]).filter(o=>o.correct).map(o=>`<strong>${o.text}</strong>`).join(', ')}</div>`;
      return h;
    }

    case 'finalQuest': {
      let h = (ep.zones||[]).map(z=>`<div style="padding:.3rem 0;"><strong>${z.name}:</strong> ${(z.correct||[]).map(i=>(ep.items||[])[i]).join(', ')}</div>`).join('');
      h += `<div style="margin-top:.5rem;padding-top:.5rem;border-top:2px dashed var(--gold-dark);"><strong style="color:var(--red-seal);">제2단계 답:</strong> <span style="font-size:1.1rem;">${ep.finalAnswer||''}</span></div>`;
      return h;
    }

    default: return '—';
  }
}

window.togglePreviewEp = function(idx) {
  const el = document.getElementById(`prev-ep-${idx}`);
  el.classList.toggle('expanded');
  const t = el.querySelector('.prev-toggle');
  if (t) t.style.transform = el.classList.contains('expanded') ? 'rotate(180deg)' : '';
};

window.expandAllPreview = function(expand) {
  document.querySelectorAll('.preview-episode').forEach(el => {
    const t = el.querySelector('.prev-toggle');
    if (expand) { el.classList.add('expanded'); if(t) t.style.transform='rotate(180deg)'; }
    else { el.classList.remove('expanded'); if(t) t.style.transform=''; }
  });
};

window.openStudentView = () => window.open('es2606.html', '_blank');

// ══════════════════════════════════════════
// 저장
// ══════════════════════════════════════════
window.saveAll = async function() {
  const indicator = document.getElementById('saveIndicator');
  indicator.textContent = '저장 중...'; indicator.style.color = 'var(--gold-dark)';
  try {
    collectEpisodeChanges();
    collectSettingsChanges();
    for (const ep of episodes) {
      const data = {...ep}; delete data._docId;
      await setDoc(doc(db,'202606_escape_episodes',`ep${ep.id}`), data);
    }
    await setDoc(doc(db,'202606_escape_settings','main'), gameSettings);
    indicator.textContent = '✓ 저장 완료 (' + new Date().toLocaleTimeString() + ')';
    indicator.style.color = 'var(--jade)';
    showToast('저장되었소이다.', 'success');
  } catch(e) {
    console.error(e);
    indicator.textContent = '✗ 저장 실패'; indicator.style.color = 'var(--red-seal)';
    showToast('저장 실패: ' + e.message, 'error');
  }
};

function collectEpisodeChanges() {
  // 임시 저장소 초기화
  episodes.forEach(ep => {
    ep._tmpSrc = [];
    ep._tmpCQ = []; ep._tmpCA = [];
    ep._tmpPD = []; ep._tmpPA = [];
  });

  document.querySelectorAll('[data-ep]').forEach(el => {
    const epIdx = parseInt(el.dataset.ep);
    const field = el.dataset.field;
    const ai = el.dataset.arrIdx !== undefined ? parseInt(el.dataset.arrIdx) : null;
    const ep = episodes[epIdx];
    if (!ep) return;

    if (ai === null) {
      if (field === 'policyOptionsStr') {
        ep.policyOptions = el.value.split(',').map(s=>s.trim()).filter(Boolean);
      } else {
        ep[field] = el.value;
      }
      return;
    }

    // 배열 필드
    const simple = ['answers','options','kings','achievements','items','leftItems','rightItems'];
    if (simple.includes(field)) {
      if (!Array.isArray(ep[field])) ep[field] = [];
      ep[field][ai] = el.value;
    } else if (field === 'correctAnswers') {
      if (!Array.isArray(ep.correctAnswers)) ep.correctAnswers = [];
      if (el.checked) { if(!ep.correctAnswers.includes(ai)) ep.correctAnswers.push(ai); }
      else { ep.correctAnswers = ep.correctAnswers.filter(i=>i!==ai); }
    } else if (field === 'zoneName') {
      if (!ep.zones) ep.zones = [];
      if (!ep.zones[ai]) ep.zones[ai] = {name:'',correct:[]};
      ep.zones[ai].name = el.value;
    } else if (field === 'zoneCorrect') {
      if (!ep.zones) ep.zones = [];
      if (!ep.zones[ai]) ep.zones[ai] = {name:'',correct:[]};
      ep.zones[ai].correct = el.value.split(',').map(s=>parseInt(s.trim())-1).filter(n=>!isNaN(n)&&n>=0);
    } else if (field === 'sentText') {
      if (!ep.inlineSentences) ep.inlineSentences = [];
      if (!ep.inlineSentences[ai]) ep.inlineSentences[ai] = {text:'',answerIdx:ai};
      ep.inlineSentences[ai].text = el.value;
    } else if (field === 'sentAnsIdx') {
      if (!ep.inlineSentences) ep.inlineSentences = [];
      if (!ep.inlineSentences[ai]) ep.inlineSentences[ai] = {text:'',answerIdx:ai};
      ep.inlineSentences[ai].answerIdx = parseInt(el.value)||0;
    } else if (field === 'sourceItem') {
      ep._tmpSrc[ai] = el.value;
    } else if (field === 'charQuote') {
      ep._tmpCQ[ai] = el.value;
    } else if (field === 'charAnswer') {
      ep._tmpCA[ai] = el.value;
    } else if (field === 'policyDesc') {
      ep._tmpPD[ai] = el.value;
    } else if (field === 'policyAnswer') {
      ep._tmpPA[ai] = el.value;
    } else if (field === 'goryeoOptText') {
      if (!ep.goryeoOptions) ep.goryeoOptions = [];
      if (!ep.goryeoOptions[ai]) ep.goryeoOptions[ai] = {text:'',correct:false};
      ep.goryeoOptions[ai].text = el.value;
    } else if (field === 'goryeoOptCorrect') {
      if (!ep.goryeoOptions) ep.goryeoOptions = [];
      if (!ep.goryeoOptions[ai]) ep.goryeoOptions[ai] = {text:'',correct:false};
      ep.goryeoOptions[ai].correct = el.checked;
    }
  });

  // 후처리
  episodes.forEach(ep => {
    if (ep.type === 'orderSource' && ep._tmpSrc.length > 0) {
      ep.sources = [...ep._tmpSrc];
      ep.correctOrder = ep._tmpSrc.map((_,i)=>i);
    }
    if (ep.type === 'characterGuess') {
      if (ep._tmpCQ.length > 0) ep.characters = ep._tmpCQ.map((q,i)=>({quote:q, answer:ep._tmpCA[i]||''}));
      if (ep._tmpPD.length > 0) ep.policies = ep._tmpPD.map((d,i)=>({desc:d, answer:ep._tmpPA[i]||''}));
    }
    delete ep._tmpSrc; delete ep._tmpCQ; delete ep._tmpCA; delete ep._tmpPD; delete ep._tmpPA;
  });
}

function collectSettingsChanges() {
  document.querySelectorAll('[data-setting]').forEach(el => {
    const field = el.dataset.setting;
    const ai = el.dataset.arrIdx !== undefined ? parseInt(el.dataset.arrIdx) : null;
    if (ai === null) { gameSettings[field] = el.value; }
    else {
      if (!Array.isArray(gameSettings[field])) gameSettings[field] = [];
      gameSettings[field][ai] = el.value;
    }
  });
}

function escH(s) {
  if (s==null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');
}

let toastTimer;
function showToast(msg, type='success') {
  const toast = document.getElementById('toast');
  toast.textContent = msg; toast.className = `toast ${type}`; toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>toast.classList.remove('show'), 3000);
}
</script>
