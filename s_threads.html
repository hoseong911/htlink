<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>환승 신분 @Silla</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
  <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
  <style>
    /* 다크 모드 스레드 기본 세팅 */
    body {
      background-color: #000000;
      color: #ffffff;
      font-family: 'Pretendard', sans-serif;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
    }

    .app-container {
      width: 100%;
      max-width: 600px;
      min-height: 100vh;
      border-left: 1px solid #333;
      border-right: 1px solid #333;
      padding: 20px;
    }

    /* 상단 헤더 */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
    }

    header h1 {
      font-family: 'Jua', sans-serif;
      font-size: 28px;
      margin: 0;
      letter-spacing: 1px;
    }

    .logo {
      font-size: 24px;
    }

    /* 글 작성 폼 (어두운 글래스모피즘 적용) */
    .post-form {
      background: rgba(30, 30, 30, 0.6);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 15px;
      padding: 15px;
      margin-bottom: 30px;
    }

    .form-group {
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
    }

    select {
      background-color: #1e1e1e;
      color: white;
      border: 1px solid #444;
      border-radius: 8px;
      padding: 8px;
      font-family: 'Pretendard', sans-serif;
      outline: none;
    }

    textarea {
      width: 100%;
      background-color: transparent;
      color: white;
      border: none;
      resize: none;
      font-family: 'Pretendard', sans-serif;
      font-size: 16px;
      outline: none;
      box-sizing: border-box;
      margin-top: 10px;
    }

    textarea::placeholder {
      color: #777;
    }

    .btn-submit {
      background-color: #ffffff;
      color: #000000;
      border: none;
      padding: 8px 20px;
      border-radius: 20px;
      font-weight: bold;
      cursor: pointer;
      float: right;
    }

    .btn-submit:hover {
      background-color: #dddddd;
    }

    .clearfix::after {
      content: "";
      clear: both;
      display: table;
    }

    /* 피드 게시글 카드 */
    .thread-card {
      display: flex;
      gap: 15px;
      padding: 15px 0;
      border-bottom: 1px solid #333;
    }

    .avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background-color: #222;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .content {
      flex-grow: 1;
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 5px;
    }

    .username {
      font-weight: bold;
      font-size: 15px;
    }

    .time {
      color: #777;
      font-size: 13px;
    }

    .text {
      font-size: 15px;
      line-height: 1.5;
      margin: 0 0 10px 0;
      white-space: pre-wrap;
    }

    .interaction-icons {
      display: flex;
      gap: 15px;
      color: #777;
      font-size: 18px;
      cursor: pointer;
    }

    .interaction-icons span:hover {
      color: #fff;
    }
  </style>
</head>
<body>

  <div class="app-container">
    <header>
      <h1>환승 신분 @Silla</h1>
      <div class="logo">🕸️</div>
    </header>

    <div class="post-form clearfix">
      <div class="form-group">
        <div class="avatar">❓</div>
        <select id="roleSelect" onchange="updateAvatar()">
          <option value="진골">👑 진골 귀족</option>
          <option value="6두품">📜 6두품 지식인</option>
          <option value="호족">🏰 지방 호족</option>
          <option value="농민">🌾 일반 농민</option>
        </select>
      </div>
      <textarea id="postContent" rows="3" placeholder="새로운 스레드를 시작하세요..."></textarea>
      <button class="btn-submit" onclick="addPost()">게시</button>
    </div>

    <div id="feedContainer">
      </div>
  </div>

  <script>
    // 아바타 이모지 매핑
    const avatars = {
      "진골": "👑",
      "6두품": "📜",
      "호족": "🏰",
      "농민": "🌾"
    };

    // 더미 데이터 (초기 게시글)
    const initialPosts = [
      { role: "농민", name: "원종과 애노", time: "10분 전", text: "상주 사람들 다 모여라! 😡 세금 내다가 굶어 죽게 생겼다. 차라리 들고 일어나자! #농민봉기 #못살겠다" },
      { role: "호족", name: "견훤", time: "1시간 전", text: "경주 놈들 자기들끼리 왕 하겠다고 싸우는 꼴 우습네 ㅉㅉ 무진주 점령 완료. 이제 이 구역은 내가 접수한다. ⚔️" },
      { role: "6두품", name: "최치원", time: "3시간 전", text: "당나라 빈공과 수석하면 뭐하냐고... 귀국했더니 진골들 텃세 장난 아니네. 시무 10여 조 올렸는데 읽씹당함. 그냥 산에 들어갑니다 ⛰️ #퇴사 #은둔" },
      { role: "진골", name: "김사치", time: "5시간 전", text: "오늘 안압지 팟 구함~ 🥂 6두품은 컷인 거 알지? 나랏일은 골치 아프니까 놀자구~ #골품제최고 #알빠노" }
    ];

    // 입력 폼 아바타 업데이트
    function updateAvatar() {
      const role = document.getElementById('roleSelect').value;
      document.querySelector('.post-form .avatar').innerText = avatars[role];
    }

    // 피드에 게시글 렌더링
    function renderPost(post) {
      const feed = document.getElementById('feedContainer');
      const card = document.createElement('div');
      card.className = 'thread-card';
      
      card.innerHTML = `
        <div class="avatar">${avatars[post.role]}</div>
        <div class="content">
          <div class="user-info">
            <span class="username">${post.name}</span>
            <span class="time">${post.time}</span>
          </div>
          <p class="text">${post.text}</p>
          <div class="interaction-icons">
            <span>♡</span> <span>💬</span> <span>🔁</span> <span>➤</span>
          </div>
        </div>
      `;
      feed.prepend(card); // 최신 글이 위로 오도록
    }

    // 새 글 작성 기능
    function addPost() {
      const role = document.getElementById('roleSelect').value;
      const text = document.getElementById('postContent').value;
      
      if(text.trim() === "") {
        alert("내용을 입력해주세요!");
        return;
      }

      const newPost = {
        role: role,
        name: `익명의 ${role}`,
        time: "방금 전",
        text: text
      };

      renderPost(newPost);
      document.getElementById('postContent').value = ""; // 입력창 초기화
    }

    // 초기 실행
    window.onload = () => {
      updateAvatar();
      // 더미 데이터 역순으로 렌더링 (최신 글이 위로 가게 하기 위해)
      [...initialPosts].reverse().forEach(renderPost);
    };
  </script>

</body>
</html>
