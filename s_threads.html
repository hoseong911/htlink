<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>S_threads | 실시간 신라 하대</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
  <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
  <style>
    :root { --bg: #000; --card: #121212; --text: #fff; --sub: #777; }
    body { background: var(--bg); color: var(--text); font-family: 'Pretendard', sans-serif; margin: 0; display: flex; justify-content: center; }
    
    /* 접속 화면 */
    #loginOverlay { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .login-box { width: 90%; max-width: 400px; text-align: center; }
    .login-box h1 { font-family: 'Jua', sans-serif; font-size: 3.5rem; margin-bottom: 20px; }
    input, select { width: 100%; padding: 12px; background: #1e1e1e; border: 1px solid #333; border-radius: 8px; color: #fff; margin-bottom: 10px; box-sizing: border-box; }
    .btn-enter { width: 100%; padding: 15px; background: #fff; color: #000; border: none; border-radius: 30px; font-weight: bold; cursor: pointer; }

    /* 메인 앱 */
    #appContainer { display: none; width: 100%; max-width: 600px; min-height: 100vh; border-left: 1px solid #333; border-right: 1px solid #333; padding: 20px; box-sizing: border-box; }
    header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 20px; border-bottom: 1px solid #333; }
    header h1 { font-family: 'Jua', sans-serif; margin: 0; }
    .admin-trigger { cursor: pointer; opacity: 0.2; }

    /* 포스트 폼 */
    .post-form { padding: 20px 0; border-bottom: 1px solid #333; }
    textarea { width: 100%; background: transparent; border: none; color: #fff; font-size: 18px; resize: none; outline: none; margin-top: 10px; }
    .form-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
    .btn-post { background: #fff; padding: 8px 20px; border-radius: 20px; font-weight: bold; border: none; cursor: pointer; }

    /* 피드 */
    .thread-card { padding: 20px 0; border-bottom: 1px solid #222; display: flex; gap: 15px; }
    .avatar { width: 45px; height: 45px; background: #222; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; }
    .card-body { flex: 1; }
    .user-info { display: flex; gap: 8px; align-items: center; margin-bottom: 5px; }
    .nickname { font-weight: bold; }
    .time { color: var(--sub); font-size: 12px; margin-left: auto; }
    .content-text { line-height: 1.5; margin: 10px 0; white-space: pre-wrap; }
    .actions { display: flex; gap: 20px; color: var(--sub); }
    .like-btn { cursor: pointer; display: flex; align-items: center; gap: 5px; }
    .like-btn.active { color: #f91880; }

    /* 관리자 */
    #adminOverlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 2000; display: none; padding: 40px 20px; overflow-y: auto; }
    .admin-table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 14px; }
    .admin-table th, .admin-table td { border: 1px solid #444; padding: 10px; text-align: left; }
    .btn-del { background: #ff4444; color: #fff; border: none; padding: 5px; border-radius: 4px; cursor: pointer; }
  </style>
</head>
<body>

  <div id="loginOverlay">
    <div class="login-box">
      <h1 class="jua-font">S_threads</h1>
      <input type="text" id="joinId" placeholder="학번 (5자리, 예: 30601)" maxlength="5">
      <input type="text" id="joinName" placeholder="이름 (실명)">
      <input type="text" id="joinNick" placeholder="사용할 닉네임">
      <select id="joinRole">
        <option value="진골">👑 진골 귀족</option>
        <option value="6두품">📜 6두품 지식인</option>
        <option value="호족">🏰 지방 호족</option>
        <option value="농민">🌾 일반 농민</option>
      </select>
      <button class="btn-enter" onclick="enterApp()">신라 접속하기</button>
    </div>
  </div>

  <div id="appContainer">
    <header>
      <h1 class="jua-font">환승 신분 @Silla</h1>
      <div class="admin-trigger" onclick="tryAdmin()">⚙️</div>
    </header>
    <div class="post-form">
      <textarea id="postInput" placeholder="새로운 스레드를 시작하세요..." rows="2"></textarea>
      <div class="form-footer">
        <span id="myInfoDisplay" style="color:#555; font-size:12px;"></span>
        <button class="btn-post" onclick="createPost()">게시</button>
      </div>
    </div>
    <div id="feed"></div>
  </div>

  <div id="adminOverlay">
    <button onclick="closeAdmin()" style="float:right; background:none; border:none; color:#fff; font-size:30px;">×</button>
    <h2 class="jua-font">관리자 모드</h2>
    <button onclick="resetAll()" style="background:orange; padding:10px; border-radius:5px; border:none; cursor:pointer;">전체 초기화</button>
    <table class="admin-table">
      <thead><tr><th>학번</th><th>이름</th><th>닉네임</th><th>내용</th><th>관리</th></tr></thead>
      <tbody id="adminList"></tbody>
    </table>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, push, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDAc5S87JK-LtXzk5-iTR9rt7RnHWnUXTQ",
      authDomain: "ho0911seong-56638.firebaseapp.com",
      databaseURL: "https://ho0911seong-56638-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "ho0911seong-56638",
      storageBucket: "ho0911seong-56638.firebasestorage.app",
      messagingSenderId: "994509567071",
      appId: "1:994509567071:web:de99e71c125ec2a3f557ea"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const postsRef = ref(db, 'posts');

    let currentUser = null;
    const roleIcons = { "진골": "👑", "6두품": "📜", "호족": "🏰", "농민": "🌾" };

    // 접속하기
    window.enterApp = () => {
      const id = document.getElementById('joinId').value;
      const name = document.getElementById('joinName').value;
      const nick = document.getElementById('joinNick').value;
      const role = document.getElementById('joinRole').value;

      if(id.length !== 5 || !name || !nick) return alert("입력 정보를 확인하세요!");

      currentUser = { id, name, nick, role };
      document.getElementById('loginOverlay').style.display = 'none';
      document.getElementById('appContainer').style.display = 'block';
      document.getElementById('myInfoDisplay').innerText = `${roleIcons[role]} ${nick} 접속 중`;
      
      listenFeed();
    };

    // 포스트 작성
    window.createPost = () => {
      const content = document.getElementById('postInput').value;
      if(!content.trim()) return;

      const now = new Date();
      const timestamp = `${now.getMonth()+1}.${now.getDate()}. ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;

      const newPostRef = push(postsRef);
      set(newPostRef, {
        id: newPostRef.key,
        studentId: currentUser.id,
        realName: currentUser.name,
        nickname: currentUser.nick,
        role: currentUser.role,
        content: content,
        time: timestamp,
        likes: 0,
        likedBy: { "init": true } 
      });

      document.getElementById('postInput').value = "";
    };

    // 실시간 피드 리스너
    function listenFeed() {
      onValue(postsRef, (snapshot) => {
        const data = snapshot.val();
        const feed = document.getElementById('feed');
        const adminList = document.getElementById('adminList');
        feed.innerHTML = "";
        adminList.innerHTML = "";

        if (!data) return;

        const postsArr = Object.values(data).filter(p => typeof p === 'object');
        // 좋아요 순 정렬
        postsArr.sort((a, b) => (b.likes || 0) - (a.likes || 0));

        postsArr.forEach(post => {
          const isLiked = post.likedBy && post.likedBy[currentUser.id];
          const card = document.createElement('div');
          card.className = 'thread-card';
          card.innerHTML = `
            <div class="avatar">${roleIcons[post.role]}</div>
            <div class="card-body">
              <div class="user-info">
                <span class="nickname">${post.nickname}</span>
                <span class="time">${post.time}</span>
              </div>
              <div class="content-text">${post.content}</div>
              <div class="actions">
                <div class="like-btn ${isLiked ? 'active' : ''}" onclick="toggleLike('${post.id}', ${isLiked})">
                  ${isLiked ? '❤️' : '♡'} <span>${post.likes || 0}</span>
                </div>
              </div>
            </div>
          `;
          feed.appendChild(card);

          // 관리자 리스트 추가
          const tr = document.createElement('tr');
          tr.innerHTML = `<td>${post.studentId}</td><td>${post.realName}</td><td>${post.nickname}</td><td>${post.content.substring(0,10)}..</td><td><button class="btn-del" onclick="deletePost('${post.id}')">삭제</button></td>`;
          adminList.appendChild(tr);
        });
      });
    }

    // 좋아요 토글
    window.toggleLike = (postId, isLiked) => {
      const postLikeRef = ref(db, `posts/${postId}`);
      onValue(postLikeRef, (snapshot) => {
        const post = snapshot.val();
        if(!post) return;
        const newLikes = isLiked ? (post.likes - 1) : (post.likes + 1);
        const updates = {};
        updates[`posts/${postId}/likes`] = newLikes;
        updates[`posts/${postId}/likedBy/${currentUser.id}`] = isLiked ? null : true;
        update(ref(db), updates);
      }, { onlyOnce: true });
    };

    // 관리자 기능
    window.tryAdmin = () => {
      if(prompt("관리자 암호(1234):") === "1234") document.getElementById('adminOverlay').style.display = 'block';
    };
    window.closeAdmin = () => document.getElementById('adminOverlay').style.display = 'none';
    window.deletePost = (id) => { if(confirm("삭제할까요?")) remove(ref(db, `posts/${id}`)); };
    window.resetAll = () => { if(confirm("전체 삭제하시겠습니까?")) remove(postsRef); };
  </script>
</body>
</html>
