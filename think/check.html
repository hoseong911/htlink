<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>생각 Check — 인천동양중 역사</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <style>
        :root {
            --bg-base: #121212;
            --bg-surface: #181818;
            --bg-interactive: #1f1f1f;
            --bg-card-hover: #252525;
            --brand-green: #1ed760;
            --brand-green-hover: #1db954;
            --text-base: #ffffff;
            --text-muted: #b3b3b3;
            --text-error: #f3727f;
            --border-gray: #4d4d4d;
            --shadow-heavy: rgba(0,0,0,0.5) 0px 8px 24px;
            --shadow-medium: rgba(0,0,0,0.3) 0px 8px 8px;
            --input-inset: rgb(18,18,18) 0px 1px 0px, rgb(124,124,124) 0px 0px 0px 1px inset;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Pretendard', 'Helvetica Neue', sans-serif;
            background: var(--bg-base); color: var(--text-base);
            min-height: 100vh; display: flex; flex-direction: column; align-items: center;
            padding: 24px 16px 80px;
        }
        .container { width: 100%; max-width: 860px; }

        /* ── 헤더 ── */
        .app-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 4px; margin-bottom: 36px;
        }
        .app-title { font-size: 20px; font-weight: 900; letter-spacing: -0.5px; }
        .app-title span { color: var(--brand-green); }
        .header-user { display: flex; align-items: center; gap: 12px; }
        .user-chip {
            background: var(--bg-surface); border: 1px solid var(--border-gray);
            border-radius: 500px; padding: 8px 16px;
            font-size: 13px; font-weight: 700; color: var(--brand-green);
        }

        /* ── 카드 ── */
        .surface-card {
            background: var(--bg-surface); border-radius: 12px;
            padding: 28px; box-shadow: var(--shadow-heavy); margin-bottom: 20px;
        }

        /* ── 로그인 ── */
        .login-wrap { max-width: 480px; margin: 60px auto 0; }
        .login-logo { text-align: center; margin-bottom: 32px; }
        .login-logo h1 { font-size: 28px; font-weight: 900; letter-spacing: -1px; }
        .login-logo h1 span { color: var(--brand-green); }
        .login-logo p { color: var(--text-muted); font-size: 14px; margin-top: 6px; }

        /* ── 인풋 ── */
        .form-group { margin-bottom: 16px; }
        label { display: block; font-size: 11px; font-weight: 700; letter-spacing: 1px; color: var(--text-muted); margin-bottom: 8px; text-transform: uppercase; }
        input[type="text"], input[type="password"], select, textarea {
            width: 100%; padding: 14px 20px;
            background: var(--bg-interactive); color: var(--text-base);
            border: none; border-radius: 8px;
            box-shadow: var(--input-inset); font-size: 14px; font-family: inherit;
        }
        textarea { border-radius: 12px; resize: vertical; line-height: 1.7; min-height: 180px; }
        input:focus, textarea:focus { outline: 2px solid var(--brand-green); box-shadow: none; }

        /* ── 버튼 ── */
        button { font-family: inherit; cursor: pointer; transition: all 0.15s; border: none; }
        .btn-primary {
            background: var(--brand-green); color: #000;
            padding: 14px 32px; border-radius: 500px;
            font-size: 14px; font-weight: 800; letter-spacing: 0.5px; width: 100%;
        }
        .btn-primary:hover { background: var(--brand-green-hover); transform: scale(1.01); }
        .btn-primary:active { transform: scale(0.98); }
        .btn-outline {
            background: transparent; color: var(--text-base);
            border: 1px solid var(--border-gray);
            padding: 10px 20px; border-radius: 500px; font-size: 13px; font-weight: 700;
        }
        .btn-outline:hover { border-color: var(--text-base); }
        .btn-sm { padding: 8px 16px; font-size: 12px; border-radius: 500px; }

        /* ── 탭 ── */
        .nav-tabs { display: flex; gap: 8px; margin-bottom: 28px; }
        .nav-tabs button {
            background: var(--bg-interactive); color: var(--text-muted);
            padding: 10px 22px; border-radius: 500px; font-size: 13px; font-weight: 700;
        }
        .nav-tabs button.active { background: var(--text-base); color: #000; }
        .nav-tabs button:hover:not(.active) { color: var(--text-base); }

        /* ── 강의 목록 버튼 ── */
        .lecture-list-btn {
            background: var(--bg-interactive); color: var(--text-base);
            width: 100%; text-align: left; padding: 18px 24px;
            border-radius: 10px; margin-bottom: 10px;
            font-size: 15px; font-weight: 600; display: flex; align-items: center; gap: 14px;
        }
        .lecture-list-btn:hover { background: var(--bg-card-hover); }
        .lecture-list-btn .lec-icon { color: var(--brand-green); font-size: 18px; }
        .lecture-list-btn .lec-meta { font-size: 12px; color: var(--text-muted); margin-top: 3px; font-weight: 500; }

        /* ── 작성 영역 ── */
        .writing-header { margin-bottom: 24px; }
        .writing-header h2 { font-size: 22px; font-weight: 900; color: var(--brand-green); margin-bottom: 10px; }
        .question-box {
            background: var(--bg-interactive); border-radius: 10px;
            padding: 16px 20px; font-size: 15px; font-weight: 700;
            line-height: 1.6; margin-bottom: 8px;
        }
        .reference-box {
            background: transparent; border: 1px solid var(--border-gray);
            border-radius: 10px; padding: 14px 20px;
            font-size: 13px; color: var(--text-muted); line-height: 1.6; margin-bottom: 20px;
        }
        .char-count { font-size: 12px; color: var(--text-muted); text-align: right; margin-top: 8px; font-weight: 700; }
        .cheat-warning {
            color: var(--text-error); font-size: 12px; font-weight: 700;
            text-align: center; margin-top: 12px; padding: 10px;
            background: rgba(243,114,127,0.1); border-radius: 8px;
        }

        /* ── 패들렛 / 아카이브 ── */
        .archive-header { margin-bottom: 24px; }
        .archive-header h2 { font-size: 22px; font-weight: 900; color: var(--brand-green); }
        .archive-header .q-label {
            font-size: 14px; color: var(--text-base); font-weight: 700;
            background: var(--bg-interactive); padding: 14px 18px; border-radius: 10px; margin-top: 12px;
        }
        .padlet-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 14px;
        }
        .padlet-card {
            background: var(--bg-surface); padding: 18px; border-radius: 10px;
            box-shadow: var(--shadow-medium); line-height: 1.65; word-break: break-word;
            font-size: 14px; border: 1px solid transparent; transition: border-color 0.2s;
        }
        .padlet-card.picked-card { border-color: var(--brand-green); }
        .pick-badge { color: var(--brand-green); font-size: 12px; font-weight: 800; margin-bottom: 10px; }

        /* ── 아카이브 강의 목록 ── */
        .archive-lec-btn {
            background: var(--bg-interactive); color: var(--text-base);
            width: 100%; text-align: left; padding: 18px 24px;
            border-radius: 10px; margin-bottom: 10px;
            font-size: 15px; font-weight: 600; display: flex; align-items: center; gap: 12px;
        }
        .archive-lec-btn:hover { background: var(--bg-card-hover); }
        .archive-lec-btn .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--brand-green); flex-shrink: 0; }

        /* ── 외부 링크 ── */
        .archive-ext-link {
            display: inline-flex; align-items: center; gap: 8px;
            color: var(--text-muted); font-size: 12px; font-weight: 700;
            text-decoration: none; padding: 8px 14px; border: 1px solid var(--border-gray);
            border-radius: 500px; transition: all 0.15s;
        }
        .archive-ext-link:hover { color: var(--text-base); border-color: var(--text-base); }

        /* ── 푸터 ── */
        .admin-footer { text-align: center; margin-top: 48px; }
        .admin-footer button { background: transparent; color: var(--border-gray); font-size: 12px; padding: 8px; letter-spacing: 1px; }
        .admin-footer button:hover { color: var(--text-muted); }

        /* ── 모달 ── */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.85);
            display: flex; justify-content: center; align-items: center;
            z-index: 9999; backdrop-filter: blur(8px);
        }
        .modal-box {
            background: var(--bg-surface); padding: 36px 32px; border-radius: 16px;
            width: 90%; max-width: 400px; box-shadow: var(--shadow-heavy); text-align: center;
        }
        .modal-box h3 { font-size: 18px; font-weight: 800; color: var(--brand-green); margin-bottom: 16px; }
        .modal-box p { font-size: 14px; color: var(--text-muted); margin-bottom: 24px; line-height: 1.6; }
        .modal-actions { display: flex; gap: 10px; justify-content: center; }

        /* ── 유틸 ── */
        .hidden { display: none !important; }
        .empty-msg { text-align: center; color: var(--text-muted); padding: 48px 0; font-size: 14px; }
        .back-btn { display: inline-flex; align-items: center; gap: 6px; margin-bottom: 24px; }
        .back-btn::before { content: '←'; }

        @media (max-width: 600px) {
            .padlet-grid { grid-template-columns: 1fr; }
            .app-title { font-size: 16px; }
        }
    </style>
</head>
<body>
<div class="container">

    <!-- ══════════════════ 로그인 화면 ══════════════════ -->
    <div id="screen-login">
        <div class="login-wrap">
            <div class="login-logo">
                <h1>생각 <span>Check</span></h1>
                <p>2026 인천동양중학교 역사 수업</p>
            </div>
            <div class="surface-card">
                <div class="form-group">
                    <label>학번 (5자리)</label>
                    <input type="text" id="student-id" placeholder="예: 30601" maxlength="5" inputmode="numeric">
                </div>
                <div class="form-group">
                    <label>이름</label>
                    <input type="text" id="student-name" placeholder="이름을 입력하세요">
                </div>
                <div class="form-group">
                    <label>본인 확인 문구</label>
                    <input type="text" id="verify-phrase" placeholder="학습지와 동일한 확인 문구">
                </div>
                <button class="btn-primary" style="margin-top:8px;" onclick="login()">접속하기</button>
            </div>
            <div class="admin-footer">
                <button onclick="goAdmin()">관리자 설정</button>
            </div>
        </div>
    </div>

    <!-- ══════════════════ 학생 메인 화면 ══════════════════ -->
    <div id="screen-main" class="hidden">

        <div class="app-header">
            <div class="app-title">생각 <span>Check</span></div>
            <div class="header-user">
                <span class="user-chip" id="welcome-chip"></span>
                <button class="btn-outline btn-sm" onclick="logout()">로그아웃</button>
            </div>
        </div>

        <div class="nav-tabs">
            <button id="tab-btn-today" class="active" onclick="switchTab('today')">✏️ 답변 작성</button>
            <button id="tab-btn-archive" onclick="switchTab('archive')">📂 아카이브</button>
        </div>

        <!-- ── 답변 작성 탭 ── -->
        <div id="tab-today">

            <!-- 강의 목록 -->
            <div id="area-lecture-list">
                <p style="font-size:13px; color:var(--text-muted); margin-bottom:18px; padding:0 4px;">답변할 강의를 선택하세요</p>
                <div id="student-lecture-list"></div>
            </div>

            <!-- 작성 화면 -->
            <div id="area-writing" class="hidden">
                <button class="btn-outline btn-sm back-btn" onclick="cancelWriting()">목록으로</button>
                <div class="surface-card">
                    <div class="writing-header">
                        <h2 id="writing-lecture-title"></h2>
                        <div class="question-box" id="writing-question"></div>
                        <div class="reference-box hidden" id="writing-reference"></div>
                    </div>
                    <div class="form-group">
                        <label>나의 생각</label>
                        <textarea id="answer-text" rows="8" placeholder="본인의 생각을 이유와 함께 작성해 봅시다."></textarea>
                        <div class="char-count">글자 수 (공백 제외): <span id="count-display">0</span>자</div>
                    </div>
                    <div id="cheat-warning" class="cheat-warning hidden">⚠️ 다른 화면으로 이동한 기록이 있습니다. 직접 작성해주세요!</div>
                    <button class="btn-primary" style="margin-top:16px;" onclick="submitAnswer()">제출하기</button>
                </div>
            </div>
        </div>

        <!-- ── 아카이브 탭 ── -->
        <div id="tab-archive" class="hidden">

            <!-- 강의 목록 -->
            <div id="area-archive-list">
                <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:18px; padding:0 4px;">
                    <p style="font-size:13px; color:var(--text-muted);">공개된 아카이브를 선택하세요</p>
                    <a href="archive.html" class="archive-ext-link" target="_blank">🔗 전시 페이지</a>
                </div>
                <div id="student-archive-list"></div>
            </div>

            <!-- 패들렛 -->
            <div id="area-padlet" class="hidden">
                <button class="btn-outline btn-sm back-btn" onclick="closePadlet()">목록으로</button>
                <div class="archive-header">
                    <h2 id="padlet-title"></h2>
                    <div class="q-label" id="padlet-question"></div>
                </div>
                <div id="padlet-grid" class="padlet-grid"></div>
            </div>
        </div>

    </div><!-- /screen-main -->

</div><!-- /container -->

<!-- 모달 -->
<div id="modal" class="modal-overlay hidden">
    <div class="modal-box">
        <h3 id="modal-title"></h3>
        <p id="modal-desc"></p>
        <input type="password" id="modal-pwd" class="hidden" placeholder="비밀번호" style="margin-bottom:20px;">
        <div class="modal-actions">
            <button class="btn-outline btn-sm" onclick="closeModal()">취소</button>
            <button class="btn-primary btn-sm" id="modal-confirm" style="width:auto; padding:10px 28px;">확인</button>
        </div>
    </div>
</div>

<script>
    // ── Firebase ──
    const firebaseConfig = {
        apiKey: "AIzaSyDAc5S87JK-LtXzk5-iTR9rt7RnHWnUXTQ",
        authDomain: "ho0911seong-56638.firebaseapp.com",
        databaseURL: "https://ho0911seong-56638-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "ho0911seong-56638",
        storageBucket: "ho0911seong-56638.firebasestorage.app",
        messagingSenderId: "994509567071",
        appId: "1:994509567071:web:be8ed4e8e9b0a833f557ea"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // ── 상태 ──
    let activeLectures = [];
    let allSubmissions = [];
    let currentUser = null;
    let currentLecture = null;
    let startTime = 0;
    let cheatCount = 0;

    // ── Firebase 구독 ──
    db.collection("lectures").orderBy("createdAt", "desc").onSnapshot(snap => {
        activeLectures = snap.docs.map(d => ({ docId: d.id, ...d.data() }));
        if (currentUser) {
            renderLectureList();
            renderArchiveList();
        }
    });

    db.collection("submissions").orderBy("createdAt", "desc").onSnapshot(snap => {
        allSubmissions = snap.docs.map(d => ({ subId: d.id, ...d.data() }));
    });

    // ── 로그인 / 로그아웃 ──
    function login() {
        const id   = document.getElementById('student-id').value.trim();
        const name = document.getElementById('student-name').value.trim();
        const verify = document.getElementById('verify-phrase').value.trim();
        if (!id || !name || !verify) { alert("모든 칸을 입력해주세요!"); return; }

        currentUser = { id, name, verify };
        // localStorage에 저장 → archive.html과 공유
        localStorage.setItem('sc_user', JSON.stringify(currentUser));

        show('screen-main'); hide('screen-login');
        document.getElementById('welcome-chip').textContent = `${id} ${name}`;
        switchTab('today');
    }

    function logout() {
        currentUser = null;
        localStorage.removeItem('sc_user');
        ['student-id','student-name','verify-phrase'].forEach(id => document.getElementById(id).value = '');
        show('screen-login'); hide('screen-main');
    }

    // 페이지 로드 시 로그인 상태 복원
    window.addEventListener('load', () => {
        const saved = localStorage.getItem('sc_user');
        if (saved) {
            try {
                currentUser = JSON.parse(saved);
                document.getElementById('student-id').value = currentUser.id;
                document.getElementById('student-name').value = currentUser.name;
                document.getElementById('verify-phrase').value = currentUser.verify;
                document.getElementById('welcome-chip').textContent = `${currentUser.id} ${currentUser.name}`;
                show('screen-main'); hide('screen-login');
                switchTab('today');
            } catch(e) { localStorage.removeItem('sc_user'); }
        }
    });

    // ── 탭 ──
    function switchTab(tab) {
        ['today','archive'].forEach(t => {
            document.getElementById(`tab-btn-${t}`).classList.toggle('active', t === tab);
            document.getElementById(`tab-${t}`).classList.toggle('hidden', t !== tab);
        });
        if (tab === 'today') {
            show('area-lecture-list'); hide('area-writing');
            renderLectureList();
        } else {
            show('area-archive-list'); hide('area-padlet');
            renderArchiveList();
        }
    }

    // ── 강의 목록 ──
    function renderLectureList() {
        const el = document.getElementById('student-lecture-list');
        el.innerHTML = '';
        if (!activeLectures.length) { el.innerHTML = '<p class="empty-msg">개설된 강의가 없습니다.</p>'; return; }
        activeLectures.forEach(lec => {
            const alreadySubmitted = allSubmissions.some(s => s.lectureDocId === lec.docId && s.id === currentUser.id);
            const btn = document.createElement('button');
            btn.className = 'lecture-list-btn';
            btn.innerHTML = `
                <span class="lec-icon">${alreadySubmitted ? '✅' : '📝'}</span>
                <div>
                    <div>${lec.title}</div>
                    <div class="lec-meta">${alreadySubmitted ? '제출 완료' : '답변 대기 중'}</div>
                </div>`;
            btn.onclick = () => openWriting(lec);
            el.appendChild(btn);
        });
    }

    // ── 작성 ──
    function openWriting(lec) {
        currentLecture = lec;
        document.getElementById('writing-lecture-title').textContent = lec.title;
        document.getElementById('writing-question').textContent = lec.question;
        const refEl = document.getElementById('writing-reference');
        if (lec.reference) { refEl.textContent = lec.reference; refEl.classList.remove('hidden'); }
        else { refEl.classList.add('hidden'); }
        document.getElementById('answer-text').value = '';
        document.getElementById('count-display').textContent = '0';
        cheatCount = 0;
        document.getElementById('cheat-warning').classList.add('hidden');
        startTime = Date.now();
        hide('area-lecture-list'); show('area-writing');
    }

    function cancelWriting() { hide('area-writing'); show('area-lecture-list'); }

    document.getElementById('answer-text').addEventListener('input', function() {
        document.getElementById('count-display').textContent = this.value.replace(/\s/g, '').length;
    });
    document.getElementById('answer-text').addEventListener('paste', e => { e.preventDefault(); alert('직접 타이핑해주세요!'); });
    document.getElementById('answer-text').addEventListener('contextmenu', e => e.preventDefault());
    document.addEventListener('visibilitychange', () => {
        if (document.hidden && !document.getElementById('area-writing').classList.contains('hidden')) {
            cheatCount++;
            document.getElementById('cheat-warning').classList.remove('hidden');
        }
    });

    function submitAnswer() {
        const text = document.getElementById('answer-text').value.trim();
        if (!text) { alert("내용을 작성해주세요!"); return; }
        db.collection("submissions").add({
            lectureDocId: currentLecture.docId,
            lectureTitle: currentLecture.title,
            id: currentUser.id,
            name: currentUser.name,
            verify: currentUser.verify,
            text,
            textLength: text.replace(/\s/g,'').length,
            duration: Math.floor((Date.now() - startTime) / 1000),
            cheatCount,
            isPicked: false,
            createdAt: Date.now()
        }).then(() => { alert("제출이 완료되었습니다!"); cancelWriting(); });
    }

    // ── 아카이브 ──
    function renderArchiveList() {
        const el = document.getElementById('student-archive-list');
        el.innerHTML = '';
        const archived = activeLectures.filter(l => l.isArchived);
        if (!archived.length) { el.innerHTML = '<p class="empty-msg">아직 공개된 아카이브가 없습니다.</p>'; return; }
        archived.forEach(lec => {
            const btn = document.createElement('button');
            btn.className = 'archive-lec-btn';
            btn.innerHTML = `<span class="dot"></span><span>${lec.title}</span>`;
            btn.onclick = () => openPadlet(lec);
            el.appendChild(btn);
        });
    }

    function openPadlet(lec) {
        document.getElementById('padlet-title').textContent = lec.title;
        document.getElementById('padlet-question').textContent = `Q. ${lec.question}`;
        const grid = document.getElementById('padlet-grid');
        grid.innerHTML = '';

        let subs = allSubmissions.filter(s => s.lectureDocId === lec.docId);
        subs.sort((a,b) => (b.isPicked - a.isPicked) || (b.textLength - a.textLength));

        if (!subs.length) { grid.innerHTML = '<p class="empty-msg">아직 공개된 답변이 없습니다.</p>'; }
        subs.forEach(sub => {
            const div = document.createElement('div');
            div.className = `padlet-card ${sub.isPicked ? 'picked-card' : ''}`;
            div.innerHTML = `
                ${sub.isPicked ? '<div class="pick-badge">⭐ PICK</div>' : ''}
                <div>${sub.text}</div>`;
            grid.appendChild(div);
        });

        hide('area-archive-list'); show('area-padlet');
    }

    function closePadlet() { hide('area-padlet'); show('area-archive-list'); }

    // ── 관리자 이동 ──
    function goAdmin() { window.location.href = 'admin.html'; }

    // ── 모달 ──
    function openModal(title, desc, hasInput, onConfirm) {
        document.getElementById('modal-title').textContent = title;
        document.getElementById('modal-desc').innerHTML = desc || '';
        const pwd = document.getElementById('modal-pwd');
        if (hasInput) { pwd.classList.remove('hidden'); pwd.value = ''; setTimeout(() => pwd.focus(), 50); }
        else pwd.classList.add('hidden');
        document.getElementById('modal-confirm').onclick = onConfirm;
        show('modal');
    }
    function closeModal() { hide('modal'); }

    // ── 유틸 ──
    function show(id) { document.getElementById(id).classList.remove('hidden'); }
    function hide(id) { document.getElementById(id).classList.add('hidden'); }
</script>
</body>
</html>
