<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Admin — 생각 Check</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-database-compat.js"></script>
    <style>
        :root {
            --bg-base: #0a0a0a;
            --bg-surface: #141414;
            --bg-interactive: #1c1c1c;
            --bg-card-hover: #222;
            --brand-green: #1ed760;
            --brand-green-hover: #1db954;
            --brand-accent: #3d91f4;
            --text-base: #ffffff;
            --text-muted: #a0a0a0;
            --text-error: #f3727f;
            --border-gray: #333;
            --shadow-heavy: rgba(0,0,0,0.6) 0px 12px 32px;
            --shadow-medium: rgba(0,0,0,0.3) 0px 4px 12px;
            --input-inset: rgb(10,10,10) 0px 1px 0px, rgb(80,80,80) 0px 0px 0px 1px inset;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Pretendard', 'Helvetica Neue', sans-serif;
            background: var(--bg-base); color: var(--text-base);
            min-height: 100vh; display: flex; flex-direction: column; align-items: center;
            padding: 24px 16px 80px;
        }
        .container { width: 100%; max-width: 960px; }

        .admin-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 4px; margin-bottom: 32px; flex-wrap: wrap; gap: 12px;
        }
        .admin-title { font-size: 18px; font-weight: 900; letter-spacing: -0.5px; }
        .admin-title .badge {
            display: inline-block; background: var(--brand-green); color: #000;
            font-size: 10px; font-weight: 900; letter-spacing: 1px; padding: 3px 8px;
            border-radius: 4px; margin-left: 10px; vertical-align: middle;
        }

        /* ── 로그인 ── */
        .login-wrap { max-width: 400px; margin: 80px auto 0; text-align: center; }
        .login-wrap h1 { font-size: 24px; font-weight: 900; margin-bottom: 8px; }
        .login-wrap p { color: var(--text-muted); font-size: 14px; margin-bottom: 32px; }
        .lock-icon { font-size: 48px; margin-bottom: 24px; }

        .surface-card {
            background: var(--bg-surface); border-radius: 12px;
            padding: 24px; box-shadow: var(--shadow-heavy); margin-bottom: 16px;
            border: 1px solid var(--border-gray);
        }
        .surface-card h3 { font-size: 15px; font-weight: 800; margin-bottom: 16px; }

        .form-group { margin-bottom: 14px; }
        label { display: block; font-size: 11px; font-weight: 700; letter-spacing: 1px; color: var(--text-muted); margin-bottom: 7px; text-transform: uppercase; }
        input[type="text"], input[type="password"], select, textarea {
            width: 100%; padding: 12px 18px;
            background: var(--bg-interactive); color: var(--text-base);
            border: none; border-radius: 8px;
            box-shadow: var(--input-inset); font-size: 14px; font-family: inherit;
        }
        textarea { border-radius: 10px; resize: vertical; line-height: 1.6; }
        input:focus, textarea:focus, select:focus { outline: 2px solid var(--brand-green); box-shadow: none; }
        select { cursor: pointer; }

        button { font-family: inherit; cursor: pointer; transition: all 0.15s; border: none; }
        .btn-primary { background: var(--brand-green); color: #000; padding: 12px 28px; border-radius: 500px; font-size: 13px; font-weight: 800; letter-spacing: 0.5px; }
        .btn-primary:hover { background: var(--brand-green-hover); }
        .btn-primary.full { width: 100%; }
        .btn-outline { background: transparent; color: var(--text-base); border: 1px solid var(--border-gray); padding: 10px 20px; border-radius: 500px; font-size: 13px; font-weight: 700; }
        .btn-outline:hover { border-color: var(--text-base); }
        .btn-danger { background: transparent; color: var(--text-error); border: 1px solid var(--text-error); padding: 8px 16px; border-radius: 500px; font-size: 12px; font-weight: 700; }
        .btn-danger:hover { background: rgba(243,114,127,0.1); }
        .btn-sm { padding: 8px 16px; font-size: 12px; }

        /* ── 로그아웃 버튼 ── */
        .btn-logout {
            background: rgba(243,114,127,0.12); color: var(--text-error);
            border: 1px solid rgba(243,114,127,0.4);
            padding: 8px 18px; border-radius: 500px; font-size: 13px; font-weight: 700;
        }
        .btn-logout:hover { background: rgba(243,114,127,0.24); border-color: var(--text-error); }

        .nav-tabs { display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap; }
        .nav-tabs button { background: var(--bg-interactive); color: var(--text-muted); padding: 10px 20px; border-radius: 500px; font-size: 13px; font-weight: 700; }
        .nav-tabs button.active { background: var(--text-base); color: #000; }
        .nav-tabs button:hover:not(.active) { color: var(--text-base); }

        .filter-tabs { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; }
        .filter-tabs button { background: var(--bg-interactive); color: var(--text-muted); padding: 8px 16px; border-radius: 500px; font-size: 12px; font-weight: 700; }
        .filter-tabs button.active { background: var(--text-base); color: #000; }
        .filter-tabs button:hover:not(.active) { color: var(--text-base); }
        .filter-pick { color: var(--brand-green) !important; }

        .sort-wrap { display: inline-flex; align-items: center; gap: 4px; background: var(--bg-interactive); border-radius: 500px; padding: 4px; border: 1px solid var(--border-gray); margin-bottom: 18px; }
        .sort-wrap-label { font-size: 11px; font-weight: 700; color: var(--text-muted); letter-spacing: 0.5px; padding: 0 4px 0 8px; }
        .sort-btn { background: transparent; color: var(--text-muted); padding: 6px 14px; border-radius: 500px; font-size: 12px; font-weight: 700; border: none; cursor: pointer; transition: all 0.15s; }
        .sort-btn.active { background: var(--text-base); color: #000; }
        .sort-btn:hover:not(.active) { color: var(--text-base); }

        /* ══ 미제출자 패널 ══ */
        .absent-panel {
            background: var(--bg-surface);
            border: 1px solid rgba(243,114,127,0.35);
            border-radius: 12px; padding: 20px 24px; margin-bottom: 20px;
        }
        .absent-panel-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; flex-wrap: wrap; gap: 8px; }
        .absent-panel-title { font-size: 15px; font-weight: 800; color: var(--text-error); }
        .absent-total-chip { background: var(--bg-interactive); border-radius: 8px; padding: 6px 14px; font-size: 12px; color: var(--text-muted); font-weight: 700; }
        .absent-total-chip span { color: var(--text-error); font-weight: 900; }
        .absent-class-tabs { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }
        .absent-class-btn { background: var(--bg-interactive); color: var(--text-muted); padding: 7px 16px; border-radius: 500px; font-size: 12px; font-weight: 700; border: none; cursor: pointer; transition: all 0.15s; }
        .absent-class-btn.active { background: var(--text-error); color: #fff; }
        .absent-class-btn:hover:not(.active) { color: var(--text-base); }
        .absent-grid { display: flex; flex-wrap: wrap; gap: 8px; }
        .absent-chip { background: rgba(243,114,127,0.1); border: 1px solid rgba(243,114,127,0.3); color: var(--text-error); padding: 6px 14px; border-radius: 500px; font-size: 13px; font-weight: 700; }
        .absent-ok { color: var(--brand-green); font-size: 14px; font-weight: 700; }

        /* ══ 현황 점검 탭 ══ */
        .inspect-cat-tabs { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
        .inspect-cat-btn {
            background: var(--bg-interactive); color: var(--text-muted);
            padding: 10px 20px; border-radius: 500px; font-size: 13px; font-weight: 700;
            border: none; cursor: pointer; transition: all 0.15s;
        }
        .inspect-cat-btn.active { background: var(--text-error); color: #fff; }
        .inspect-cat-btn:nth-child(2).active { background: #f0a500; color: #000; }
        .inspect-cat-btn:nth-child(3).active { background: var(--brand-accent); color: #fff; }
        .inspect-cat-btn:hover:not(.active) { color: var(--text-base); }

        .inspect-class-tabs { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; }
        .inspect-class-btn {
            background: var(--bg-interactive); color: var(--text-muted);
            padding: 7px 16px; border-radius: 500px; font-size: 12px; font-weight: 700;
            border: none; cursor: pointer; transition: all 0.15s;
        }
        .inspect-class-btn.active { background: var(--text-base); color: #000; }
        .inspect-class-btn:hover:not(.active) { color: var(--text-base); }

        .inspect-grid { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 8px; }

        /* 미제출 카드 */
        .inspect-chip-absent {
            background: rgba(243,114,127,0.1); border: 1px solid rgba(243,114,127,0.35);
            color: var(--text-error); padding: 8px 16px; border-radius: 500px;
            font-size: 13px; font-weight: 700;
        }
        /* 50자 미만 카드 */
        .inspect-chip-short {
            background: rgba(240,165,0,0.1); border: 1px solid rgba(240,165,0,0.35);
            color: #f0a500; padding: 8px 16px; border-radius: 500px;
            font-size: 13px; font-weight: 700;
        }
        /* 이탈 카드 */
        .inspect-chip-cheat {
            background: rgba(61,145,244,0.1); border: 1px solid rgba(61,145,244,0.35);
            color: var(--brand-accent); padding: 8px 16px; border-radius: 500px;
            font-size: 13px; font-weight: 700;
        }
        .inspect-chip-cheat .cheat-cnt {
            background: var(--brand-accent); color: #fff;
            font-size: 11px; font-weight: 900; padding: 2px 7px;
            border-radius: 500px; margin-left: 6px;
        }
        .inspect-ok { color: var(--brand-green); font-size: 14px; font-weight: 700; padding: 20px 0; }

        /* ── 강의 카드 ── */
        .lecture-card { background: var(--bg-surface); border-radius: 10px; padding: 20px; margin-bottom: 12px; border: 1px solid var(--border-gray); }
        .lecture-card .lec-title { font-size: 16px; font-weight: 800; color: var(--brand-green); margin-bottom: 6px; }
        .lecture-card .lec-q { font-size: 14px; color: var(--text-base); margin-bottom: 4px; }
        .lecture-card .lec-ref { font-size: 12px; color: var(--text-muted); margin-bottom: 14px; }
        .inline-edit { background: var(--bg-interactive); padding: 16px; border-radius: 8px; margin-top: 14px; border: 1px solid var(--border-gray); }

        .open-toggle-wrap { display: inline-flex; align-items: center; gap: 10px; background: var(--bg-interactive); border-radius: 500px; padding: 8px 16px; border: 1px solid var(--border-gray); }
        .open-toggle-label { font-size: 12px; font-weight: 700; }
        .open-toggle-label.on  { color: var(--brand-green); }
        .open-toggle-label.off { color: var(--text-muted); }
        .toggle-switch { position: relative; width: 40px; height: 22px; flex-shrink: 0; }
        .toggle-switch input { opacity: 0; width: 0; height: 0; }
        .toggle-switch .slider { position: absolute; inset: 0; background: var(--border-gray); border-radius: 500px; cursor: pointer; transition: background 0.2s; }
        .toggle-switch .slider::before { content: ''; position: absolute; width: 16px; height: 16px; left: 3px; top: 3px; background: #fff; border-radius: 50%; transition: transform 0.2s; }
        .toggle-switch input:checked + .slider { background: var(--brand-green); }
        .toggle-switch input:checked + .slider::before { transform: translateX(18px); }

        .table-wrap { overflow-x: auto; border-radius: 10px; border: 1px solid var(--border-gray); }
        table { width: 100%; border-collapse: collapse; min-width: 560px; font-size: 14px; }
        th, td { border-bottom: 1px solid var(--border-gray); padding: 14px 16px; text-align: left; vertical-align: top; }
        th { color: var(--text-muted); font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; background: var(--bg-interactive); }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: rgba(255,255,255,0.02); }

        .answer-cell { line-height: 1.65; }
        .student-info strong { font-size: 15px; }
        .student-meta { font-size: 12px; color: var(--text-muted); margin-top: 5px; line-height: 1.5; }
        .warning-tag { color: var(--text-error); font-size: 11px; font-weight: 800; margin-top: 6px; }

        .pick-btn { background: transparent; border: 1px solid var(--border-gray); color: var(--text-muted); padding: 7px 14px; border-radius: 500px; font-size: 12px; font-weight: 700; display: block; width: 100%; margin-bottom: 8px; text-align: center; }
        .pick-btn.picked { background: var(--brand-green); color: #000; border-color: var(--brand-green); }
        .del-btn { background: transparent; border: 1px solid #444; color: var(--text-muted); padding: 7px 14px; border-radius: 500px; font-size: 12px; font-weight: 700; display: block; width: 100%; text-align: center; }
        .del-btn:hover { border-color: var(--text-error); color: var(--text-error); }

        .status-badge { font-size: 12px; font-weight: 800; }
        .status-badge.on  { color: var(--brand-green); }
        .status-badge.off { color: var(--text-muted); }

        .stat-chips { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 14px; }
        .stat-chip { background: var(--bg-interactive); border-radius: 8px; padding: 10px 18px; font-size: 13px; }
        .stat-chip .num { font-size: 20px; font-weight: 900; color: var(--brand-green); display: block; }

        .loading-msg { text-align: center; color: var(--text-muted); padding: 48px 0; font-size: 14px; display: flex; flex-direction: column; align-items: center; gap: 14px; }
        .spinner { width: 28px; height: 28px; border: 3px solid var(--border-gray); border-top-color: var(--brand-green); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.88); display: flex; justify-content: center; align-items: center; z-index: 9999; backdrop-filter: blur(10px); }
        .modal-box { background: var(--bg-surface); padding: 36px 32px; border-radius: 16px; width: 90%; max-width: 420px; box-shadow: var(--shadow-heavy); text-align: center; border: 1px solid var(--border-gray); }
        .modal-box h3 { font-size: 18px; font-weight: 800; color: var(--brand-green); margin-bottom: 14px; }
        .modal-box p { font-size: 14px; color: var(--text-muted); margin-bottom: 24px; line-height: 1.6; }
        .modal-actions { display: flex; gap: 10px; justify-content: center; }

        .hidden { display: none !important; }
        .empty-msg { text-align: center; color: var(--text-muted); padding: 48px 0; font-size: 14px; }
        .row { display: flex; gap: 10px; align-items: flex-start; }

        @media (max-width: 600px) { .nav-tabs { flex-wrap: wrap; } .stat-chips { gap: 8px; } }
    </style>
</head>
<body>
<div class="container">

    <!-- ══ 로그인 ══ -->
    <div id="screen-login">
        <div class="login-wrap">
            <div class="lock-icon">🔐</div>
            <h1>관리자 전용</h1>
            <p>선생님만 접근할 수 있습니다</p>
            <div class="surface-card" style="text-align:left;">
                <div class="form-group">
                    <label>비밀번호</label>
                    <input type="password" id="admin-pw" placeholder="비밀번호를 입력하세요">
                </div>
                <div id="pw-error" class="hidden" style="color:var(--text-error); font-size:13px; margin-bottom:12px; font-weight:700;">비밀번호가 틀렸습니다.</div>
                <button class="btn-primary full" onclick="tryLogin()">접속하기</button>
            </div>
            <div style="margin-top:20px; text-align:center;">
                <a href="check.html" style="color:var(--text-muted); font-size:13px; text-decoration:none;">← 학생 화면으로</a>
            </div>
        </div>
    </div>

    <!-- ══ 관리자 패널 ══ -->
    <div id="screen-admin" class="hidden">

        <div class="admin-header">
            <div class="admin-title">생각 Check <span class="badge">ADMIN</span></div>
            <div style="display:flex; gap:10px; align-items:center; flex-wrap:wrap;">
                <a href="check.html" style="color:var(--text-muted); font-size:13px; text-decoration:none;">학생 화면</a>
                <a href="archive.html" target="_blank" style="color:var(--text-muted); font-size:13px; text-decoration:none;">전시 페이지 ↗</a>
                <button class="btn-logout" onclick="exitAdmin()">🚪 로그아웃</button>
            </div>
        </div>

        <div class="nav-tabs">
            <button id="tab-btn-lectures" class="active" onclick="switchTab('lectures')">📚 강의 관리</button>
            <button id="tab-btn-answers" onclick="switchTab('answers')">📋 답변 관리</button>
            <button id="tab-btn-inspect" onclick="switchTab('inspect')">📊 현황 점검</button>
            <button id="tab-btn-archive" onclick="switchTab('archive')">🖼️ 아카이브</button>
        </div>

        <!-- 1. 강의 관리 -->
        <div id="tab-lectures">
            <div class="surface-card">
                <h3>새 강의 열기</h3>
                <div class="form-group"><label>강의명</label><input type="text" id="new-title" placeholder="예: 1강 선사시대"></div>
                <div class="form-group"><label>오늘의 질문</label><input type="text" id="new-question" placeholder="생각 질문을 입력하세요"></div>
                <div class="form-group"><label>참고 문구 (선택)</label><input type="text" id="new-reference" placeholder="참고 글이나 자료 출처"></div>
                <button class="btn-primary full" onclick="addLecture()">강의 생성 (기본: 비공개)</button>
            </div>
            <h3 style="padding:0 4px; margin-bottom:14px;">개설된 강의</h3>
            <div id="lecture-list-admin">
                <div class="loading-msg"><div class="spinner"></div><span>강의 목록 불러오는 중…</span></div>
            </div>
        </div>

        <!-- 2. 답변 관리 -->
        <div id="tab-answers" class="hidden">
            <div class="surface-card" style="margin-bottom:20px;">
                <div class="row" style="flex-wrap:wrap; gap:10px; align-items:center;">
                    <select id="answer-lecture-select" onchange="onLectureChange()" style="flex:1; min-width:200px; margin-bottom:0;">
                        <option value="">강의를 선택하세요</option>
                    </select>
                    <button class="btn-primary btn-sm" onclick="exportCSV()">CSV 다운로드</button>
                    <button class="btn-danger btn-sm" onclick="promptDeleteAll()">전체 삭제</button>
                </div>
            </div>

            <!-- 통계 칩 -->
            <div id="answer-stats" class="stat-chips hidden"></div>

            <!-- 반 필터 -->
            <div class="filter-tabs">
                <button class="active" onclick="setFilter('all', this)">전체</button>
                <button onclick="setFilter('1', this)">1반</button>
                <button onclick="setFilter('2', this)">2반</button>
                <button onclick="setFilter('3', this)">3반</button>
                <button onclick="setFilter('4', this)">4반</button>
                <button onclick="setFilter('5', this)">5반</button>
                <button onclick="setFilter('6', this)">6반</button>
                <button class="filter-pick" onclick="setFilter('picked', this)">⭐ PICK만</button>
            </div>

            <!-- 정렬 -->
            <div class="sort-wrap">
                <span class="sort-wrap-label">정렬</span>
                <button class="sort-btn active" onclick="setSort('recent', this)">최신순</button>
                <button class="sort-btn" onclick="setSort('id-asc', this)">학번 ↑</button>
                <button class="sort-btn" onclick="setSort('id-desc', this)">학번 ↓</button>
            </div>

            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th style="width:22%;">학생 정보</th>
                            <th style="width:58%;">답변</th>
                            <th style="width:20%; text-align:center;">관리</th>
                        </tr>
                    </thead>
                    <tbody id="answers-tbody"></tbody>
                </table>
            </div>
        </div>

        <!-- 3. 현황 점검 -->
        <div id="tab-inspect" class="hidden">
            <div class="surface-card" style="margin-bottom:20px;">
                <div class="row" style="flex-wrap:wrap; gap:10px; align-items:center;">
                    <select id="inspect-lecture-select" onchange="onInspectLectureChange()" style="flex:1; min-width:200px; margin-bottom:0;">
                        <option value="">강의를 선택하세요</option>
                    </select>
                </div>
            </div>

            <!-- 현황 요약 칩 -->
            <div id="inspect-stats" class="stat-chips hidden"></div>

            <!-- 카테고리 탭 -->
            <div class="inspect-cat-tabs hidden" id="inspect-cat-tabs">
                <button class="inspect-cat-btn active" onclick="setInspectCat('absent', this)">⚠️ 미제출</button>
                <button class="inspect-cat-btn" onclick="setInspectCat('short', this)">✏️ 50자 미만</button>
                <button class="inspect-cat-btn" onclick="setInspectCat('cheat', this)">🚨 이탈 2회 이상</button>
            </div>

            <!-- 반 탭 -->
            <div class="inspect-class-tabs hidden" id="inspect-class-tabs"></div>

            <!-- 결과 그리드 -->
            <div id="inspect-grid" class="inspect-grid hidden"></div>
        </div>

        <!-- 4. 아카이브 -->
        <div id="tab-archive" class="hidden">
            <p style="font-size:13px; color:var(--text-muted); margin-bottom:20px; padding:0 4px;">
                공개하면 학생 아카이브 탭과 <a href="archive.html" target="_blank" style="color:var(--brand-green); text-decoration:none;">전시 페이지</a>에 나타납니다.
            </p>
            <div class="table-wrap">
                <table>
                    <thead><tr><th>강의명</th><th>상태</th><th>조작</th></tr></thead>
                    <tbody id="archive-tbody"></tbody>
                </table>
            </div>
        </div>

    </div>
</div>

<!-- 모달 -->
<div id="modal" class="modal-overlay hidden">
    <div class="modal-box">
        <h3 id="modal-title"></h3>
        <p id="modal-desc"></p>
        <input type="password" id="modal-pwd" class="hidden" placeholder="비밀번호" style="margin-bottom:20px;">
        <div class="modal-actions">
            <button class="btn-outline btn-sm" onclick="closeModal()">취소</button>
            <button class="btn-primary btn-sm" id="modal-confirm" style="width:auto; padding:10px 28px;">확인</button>
        </div>
    </div>
</div>

<script>
    /* ── Firebase 초기화 ── */
    const firebaseConfig = {
        apiKey: "AIzaSyDAc5S87JK-LtXzk5-iTR9rt7RnHWnUXTQ",
        authDomain: "ho0911seong-56638.firebaseapp.com",
        databaseURL: "https://ho0911seong-56638-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "ho0911seong-56638",
        storageBucket: "ho0911seong-56638.firebasestorage.app",
        messagingSenderId: "994509567071",
        appId: "1:994509567071:web:be8ed4e8e9b0a833f557ea"
    };
    firebase.initializeApp(firebaseConfig);
    const db   = firebase.firestore();
    const rtdb = firebase.database(); // Realtime DB (학생 명단)

    /* ── 상태 ── */
    const ADMIN_PW    = "ghtjd12!@";
    const SESSION_KEY = 'sc_admin_session'; // sessionStorage 키

    let activeLectures   = [];
    let allSubmissions   = [];
    let allStudents      = []; // student2026.html 과 동일한 students 노드
    let studentsReady    = false;
    let lecturesReady    = false;
    let submissionsReady = false;
    let currentFilter    = 'all';
    let currentSort      = 'recent';

    let lectureUnsub     = null;
    let submissionUnsub  = null;
    let studentsUnsub    = null;

    /* ─────────────────────────────────────────
       세션 유지
       sessionStorage 사용 → 탭/브라우저 닫으면 만료,
       새로고침·같은 탭 내 이동에는 유지됨
    ───────────────────────────────────────── */
    function saveSession()  { sessionStorage.setItem(SESSION_KEY, '1'); }
    function clearSession() { sessionStorage.removeItem(SESSION_KEY); }
    function hasSession()   { return sessionStorage.getItem(SESSION_KEY) === '1'; }

    window.addEventListener('load', () => {
        document.getElementById('admin-pw').addEventListener('keydown', e => {
            if (e.key === 'Enter') tryLogin();
        });
        // 세션 있으면 로그인 화면 건너뜀
        if (hasSession()) {
            hide('screen-login'); show('screen-admin');
            startListeners();
            switchTab('lectures');
        }
    });

    function tryLogin() {
        const pw = document.getElementById('admin-pw').value;
        if (pw === ADMIN_PW) {
            saveSession();
            hide('screen-login'); show('screen-admin');
            startListeners();
            switchTab('lectures');
        } else {
            show('pw-error');
            document.getElementById('admin-pw').value = '';
            document.getElementById('admin-pw').focus();
        }
    }

    function exitAdmin() {
        clearSession();
        stopListeners();
        hide('screen-admin'); show('screen-login');
        document.getElementById('admin-pw').value = '';
        hide('pw-error');
    }

    /* ── Firebase 구독 시작/종료 ── */
    function startListeners() {
        // Firestore: 강의
        lectureUnsub = db.collection("lectures").orderBy("createdAt","asc").onSnapshot(snap => {
            activeLectures = snap.docs.map(d => ({ docId: d.id, ...d.data() }));
            lecturesReady  = true;
            renderLectureAdmin();
            populateLectureSelect();
            renderArchiveAdmin();
            renderAnswers();
        });

        // Firestore: 제출
        submissionUnsub = db.collection("submissions").orderBy("createdAt","desc").onSnapshot(snap => {
            allSubmissions   = snap.docs.map(d => ({ subId: d.id, ...d.data() }));
            submissionsReady = true;
            renderAnswers();
            renderLectureAdmin();     // 제출 건수 갱신
            renderInspectPanel();     // 현황 점검 갱신
        });

        // Realtime DB: 학생 명단 (student2026.html 과 동일 노드)
        studentsUnsub = rtdb.ref('students').on('value', snap => {
            const data = snap.val();
            allStudents = [];
            if (data) {
                Object.entries(data).forEach(([key, val]) => {
                    const sid   = String(val.studentId || key);
                    const sname = val.name || val.studentName || val.realName || '';
                    if (sid && sname) allStudents.push({ studentId: sid, studentName: sname });
                });
            }
            allStudents.sort((a, b) => a.studentId.localeCompare(b.studentId));
            studentsReady = true;
            renderInspectPanel(); // 명단 바뀌면 현황도 갱신
        });
    }

    function stopListeners() {
        if (lectureUnsub)    lectureUnsub();
        if (submissionUnsub) submissionUnsub();
        if (studentsUnsub)   rtdb.ref('students').off('value', studentsUnsub);
        lecturesReady = submissionsReady = studentsReady = false;
        activeLectures = allSubmissions = allStudents = [];
    }

    /* ── 탭 전환 ── */
    function switchTab(tab) {
        ['lectures','answers','inspect','archive'].forEach(t => {
            document.getElementById(`tab-btn-${t}`).classList.toggle('active', t === tab);
            document.getElementById(`tab-${t}`).classList.toggle('hidden', t !== tab);
        });
    }

    /* ─────────────────────────────────────────
       학번 → 반 번호 추출
       student2026.html 의 parseClass 와 동일 로직
       학번 형식: [학년 1자리][반 2자리][번호 2자리]
       예) 30415 → 3학년 04반(4반) 15번
    ───────────────────────────────────────── */
    function classNumFromId(sid) {
        if (!sid || sid.length < 3) return null;
        const c = parseInt(sid.slice(1, 3), 10);
        return isNaN(c) ? null : c;
    }

    /* ── 강의 선택 변경 (답변 관리) ── */
    function onLectureChange() {
        renderAnswers();
    }

    /* ═══════════════════════════════════════════════
       현황 점검 탭
    ═══════════════════════════════════════════════ */
    let currentInspectCat = 'absent'; // absent | short | cheat
    let currentInspectCls = 'all';

    function onInspectLectureChange() {
        currentInspectCat = 'absent';
        currentInspectCls = 'all';
        // 카테고리 탭 active 초기화
        document.querySelectorAll('.inspect-cat-btn').forEach((b, i) => b.classList.toggle('active', i === 0));
        renderInspectPanel();
    }

    function setInspectCat(cat, btn) {
        currentInspectCat = cat;
        currentInspectCls = 'all';
        document.querySelectorAll('.inspect-cat-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderInspectPanel();
    }

    function setInspectCls(cls) {
        currentInspectCls = cls;
        renderInspectPanel();
    }

    function renderInspectPanel() {
        const lecId    = document.getElementById('inspect-lecture-select').value;
        const statsEl  = document.getElementById('inspect-stats');
        const catTabs  = document.getElementById('inspect-cat-tabs');
        const clsTabs  = document.getElementById('inspect-class-tabs');
        const grid     = document.getElementById('inspect-grid');

        if (!lecId) {
            statsEl.classList.add('hidden');
            catTabs.classList.add('hidden');
            clsTabs.classList.add('hidden');
            grid.classList.add('hidden');
            return;
        }

        const lecSubs = allSubmissions.filter(s => s.lectureDocId === lecId);
        const submittedIds = new Set(lecSubs.map(s => String(s.id)));

        /* ── 세 그룹 계산 ── */
        // 미제출: 명단에 있지만 제출 안 한 학생
        const absentList = studentsReady
            ? allStudents.filter(s => !submittedIds.has(String(s.studentId)))
            : [];

        // 50자 미만: 제출했지만 textLength < 50
        const shortList  = lecSubs.filter(s => (s.textLength || 0) < 50);

        // 이탈 2회 이상: cheatCount >= 2
        const cheatList  = lecSubs.filter(s => (s.cheatCount || 0) >= 2);

        /* ── 통계 칩 ── */
        statsEl.classList.remove('hidden');
        statsEl.innerHTML = `
            <div class="stat-chip" style="cursor:pointer;" onclick="setInspectCatByIdx(0)">
                <span class="num" style="color:var(--text-error);">${absentList.length}</span>미제출
            </div>
            <div class="stat-chip" style="cursor:pointer;" onclick="setInspectCatByIdx(1)">
                <span class="num" style="color:#f0a500;">${shortList.length}</span>50자 미만
            </div>
            <div class="stat-chip" style="cursor:pointer;" onclick="setInspectCatByIdx(2)">
                <span class="num" style="color:var(--brand-accent);">${cheatList.length}</span>이탈 2회 이상
            </div>`;

        catTabs.classList.remove('hidden');

        /* ── 현재 카테고리 데이터 결정 ── */
        let items = []; // { label, sub? } — absent는 student 객체, 나머지는 submission 객체
        let chipClass = '';

        if (currentInspectCat === 'absent') {
            items     = absentList.map(s => ({ id: s.studentId, name: s.studentName }));
            chipClass = 'inspect-chip-absent';
        } else if (currentInspectCat === 'short') {
            items     = shortList.map(s => ({ id: s.id, name: s.name, meta: `${s.textLength}자` }));
            chipClass = 'inspect-chip-short';
        } else {
            items     = cheatList.map(s => ({ id: s.id, name: s.name, cheat: s.cheatCount }));
            chipClass = 'inspect-chip-cheat';
        }

        /* ── 반 목록 생성 ── */
        const classes = [...new Set(items.map(i => classNumFromId(i.id)).filter(c => c !== null))].sort((a,b) => a-b);

        clsTabs.classList.remove('hidden');
        clsTabs.innerHTML = `
            <button class="inspect-class-btn ${currentInspectCls === 'all' ? 'active' : ''}"
                onclick="setInspectCls('all')">전체 (${items.length}명)</button>
            ${classes.map(c => {
                const cnt = items.filter(i => classNumFromId(i.id) === c).length;
                return `<button class="inspect-class-btn ${currentInspectCls == c ? 'active' : ''}"
                    onclick="setInspectCls(${c})">${c}반 (${cnt}명)</button>`;
            }).join('')}`;

        /* ── 필터링 ── */
        const filtered = currentInspectCls === 'all'
            ? items
            : items.filter(i => classNumFromId(i.id) === Number(currentInspectCls));

        grid.classList.remove('hidden');

        if (filtered.length === 0) {
            const label = currentInspectCat === 'absent' ? '미제출자' : currentInspectCat === 'short' ? '50자 미만 학생' : '이탈 2회 이상 학생';
            grid.innerHTML = `<span class="inspect-ok">✅ ${currentInspectCls === 'all' ? '전체' : currentInspectCls + '반'} ${label} 없음!</span>`;
            return;
        }

        if (currentInspectCat === 'cheat') {
            grid.innerHTML = filtered
                .sort((a,b) => b.cheat - a.cheat)
                .map(i => `<span class="${chipClass}">${i.id} ${i.name}<span class="cheat-cnt">${i.cheat}회</span></span>`)
                .join('');
        } else if (currentInspectCat === 'short') {
            grid.innerHTML = filtered
                .sort((a,b) => (a.meta||'').localeCompare(b.meta||'', undefined, {numeric:true}))
                .map(i => `<span class="${chipClass}">${i.id} ${i.name} <span style="font-size:11px;opacity:0.75;">${i.meta}</span></span>`)
                .join('');
        } else {
            grid.innerHTML = filtered
                .map(i => `<span class="${chipClass}">${i.id} ${i.name}</span>`)
                .join('');
        }
    }

    // 통계 칩 클릭 시 카테고리 전환 헬퍼
    function setInspectCatByIdx(idx) {
        const cats = ['absent','short','cheat'];
        currentInspectCat = cats[idx];
        currentInspectCls = 'all';
        document.querySelectorAll('.inspect-cat-btn').forEach((b, i) => b.classList.toggle('active', i === idx));
        renderInspectPanel();
    }

    /* ── 강의 목록 렌더 ── */
    function renderLectureAdmin() {
        const el = document.getElementById('lecture-list-admin');
        if (!lecturesReady) {
            el.innerHTML = `<div class="loading-msg"><div class="spinner"></div><span>강의 목록 불러오는 중…</span></div>`;
            return;
        }
        el.innerHTML = '';
        if (!activeLectures.length) { el.innerHTML = '<p class="empty-msg">강의가 없습니다.</p>'; return; }
        activeLectures.forEach(lec => {
            const subCount = allSubmissions.filter(s => s.lectureDocId === lec.docId).length;
            const isOpen   = lec.isOpen === true;
            const div      = document.createElement('div');
            div.className  = 'lecture-card';
            div.innerHTML  = `
                <div id="view-${lec.docId}">
                    <div class="lec-title">${lec.title}</div>
                    <div class="lec-q">Q. ${lec.question}</div>
                    <div class="lec-ref">참고: ${lec.reference || '없음'} · 제출 ${subCount}건</div>
                    <div style="display:flex; align-items:center; gap:12px; margin-bottom:14px; flex-wrap:wrap;">
                        <div class="open-toggle-wrap">
                            <span class="open-toggle-label ${isOpen ? 'on' : 'off'}">${isOpen ? '🟢 학생 공개 중' : '⚫ 학생 비공개'}</span>
                            <label class="toggle-switch">
                                <input type="checkbox" ${isOpen ? 'checked' : ''} onchange="toggleOpen('${lec.docId}', this.checked)">
                                <span class="slider"></span>
                            </label>
                        </div>
                    </div>
                    <div style="display:flex; gap:8px;">
                        <button class="btn-outline btn-sm" onclick="toggleEdit('${lec.docId}', true)">수정</button>
                        <button class="btn-danger btn-sm" onclick="deleteLecture('${lec.docId}', '${lec.title.replace(/'/g,"\\'")}')">강의 삭제</button>
                    </div>
                </div>
                <div id="edit-${lec.docId}" class="inline-edit hidden">
                    <div class="form-group"><label>강의명</label><input type="text" id="edit-title-${lec.docId}" value="${lec.title}"></div>
                    <div class="form-group"><label>질문</label><input type="text" id="edit-q-${lec.docId}" value="${lec.question}"></div>
                    <div class="form-group"><label>참고</label><input type="text" id="edit-ref-${lec.docId}" value="${lec.reference || ''}"></div>
                    <div style="display:flex; gap:8px;">
                        <button class="btn-primary btn-sm" onclick="saveLecture('${lec.docId}')">저장</button>
                        <button class="btn-outline btn-sm" onclick="toggleEdit('${lec.docId}', false)">취소</button>
                    </div>
                </div>`;
            el.appendChild(div);
        });
    }

    function toggleOpen(docId, value) { db.collection("lectures").doc(docId).update({ isOpen: value }); }
    function toggleEdit(docId, open) {
        document.getElementById(`view-${docId}`).classList.toggle('hidden', open);
        document.getElementById(`edit-${docId}`).classList.toggle('hidden', !open);
    }
    function saveLecture(docId) {
        const title     = document.getElementById(`edit-title-${docId}`).value.trim();
        const question  = document.getElementById(`edit-q-${docId}`).value.trim();
        const reference = document.getElementById(`edit-ref-${docId}`).value.trim();
        if (!title || !question) { alert("강의명과 질문은 필수입니다."); return; }
        db.collection("lectures").doc(docId).update({ title, question, reference });
    }
    function deleteLecture(docId, title) {
        openModal("강의 삭제", `<b>${title}</b>을(를) 삭제하시겠습니까?<br><span style="color:var(--text-error)">모든 답변도 함께 삭제됩니다.</span>`, false, () => {
            const subs  = allSubmissions.filter(s => s.lectureDocId === docId);
            const batch = db.batch();
            subs.forEach(s => batch.delete(db.collection("submissions").doc(s.subId)));
            batch.delete(db.collection("lectures").doc(docId));
            batch.commit().then(closeModal);
        });
    }
    function addLecture() {
        const title     = document.getElementById('new-title').value.trim();
        const question  = document.getElementById('new-question').value.trim();
        const reference = document.getElementById('new-reference').value.trim();
        if (!title || !question) { alert("강의명과 질문을 입력해주세요."); return; }
        db.collection("lectures").add({ title, question, reference, isOpen: false, isArchived: false, createdAt: Date.now() })
          .then(() => { ['new-title','new-question','new-reference'].forEach(id => document.getElementById(id).value = ''); });
    }

    /* ── 강의 셀렉트 ── */
    function populateLectureSelect() {
        // 답변 관리 셀렉트
        const sel = document.getElementById('answer-lecture-select');
        const cur = sel.value;
        sel.innerHTML = '<option value="">강의를 선택하세요</option>';
        activeLectures.forEach(l => sel.innerHTML += `<option value="${l.docId}">${l.title}</option>`);
        if (cur && activeLectures.some(l => l.docId === cur)) sel.value = cur;

        // 현황 점검 셀렉트
        const isel = document.getElementById('inspect-lecture-select');
        const icur = isel.value;
        isel.innerHTML = '<option value="">강의를 선택하세요</option>';
        activeLectures.forEach(l => isel.innerHTML += `<option value="${l.docId}">${l.title}</option>`);
        if (icur && activeLectures.some(l => l.docId === icur)) isel.value = icur;
    }

    /* ── 필터 / 정렬 ── */
    function setFilter(f, btn) {
        currentFilter = f;
        document.querySelectorAll('.filter-tabs button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderAnswers();
    }
    function setSort(mode, btn) {
        currentSort = mode;
        document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderAnswers();
    }
    function applySort(subs) {
        if (currentSort === 'recent') return subs;
        return [...subs].sort((a, b) => {
            const cmp = String(a.id || '').localeCompare(String(b.id || ''), undefined, { numeric: true });
            return currentSort === 'id-asc' ? cmp : -cmp;
        });
    }

    /* ── 답변 테이블 ── */
    function renderAnswers() {
        const tbody   = document.getElementById('answers-tbody');
        const statsEl = document.getElementById('answer-stats');
        tbody.innerHTML = '';
        const lecId = document.getElementById('answer-lecture-select').value;
        if (!lecId) { statsEl.classList.add('hidden'); return; }

        if (!submissionsReady) {
            tbody.innerHTML = `<tr><td colspan="3"><div class="loading-msg"><div class="spinner"></div><span>답변 불러오는 중…</span></div></td></tr>`;
            return;
        }

        let subs     = allSubmissions.filter(s => s.lectureDocId === lecId);
        const total  = subs.length;
        const picked = subs.filter(s => s.isPicked).length;
        const avgLen = total ? Math.round(subs.reduce((a, s) => a + (s.textLength || 0), 0) / total) : 0;

        statsEl.classList.remove('hidden');
        statsEl.innerHTML = `
            <div class="stat-chip"><span class="num">${total}</span>총 제출</div>
            <div class="stat-chip"><span class="num">${picked}</span>PICK</div>
            <div class="stat-chip"><span class="num">${avgLen}</span>평균 글자</div>`;

        if (currentFilter === 'picked') subs = subs.filter(s => s.isPicked);
        else if (currentFilter !== 'all') subs = subs.filter(s => (s.id?.toString().charAt(2) || '') === currentFilter);

        subs = applySort(subs);
        if (!subs.length) { tbody.innerHTML = `<tr><td colspan="3" class="empty-msg">해당 조건의 답변이 없습니다.</td></tr>`; return; }

        subs.forEach(data => {
            const warnings = [];
            if ((data.duration || 0) < 10)   warnings.push("작성시간 짧음");
            if ((data.cheatCount || 0) > 0)   warnings.push(`이탈 ${data.cheatCount}회`);
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>
                    <div class="student-info"><strong>${data.id} ${data.name}</strong></div>
                    <div class="student-meta">${data.textLength}자 · ${data.duration}초 · ${data.verify}</div>
                    ${warnings.length ? `<div class="warning-tag">⚠ ${warnings.join(', ')}</div>` : ''}
                </td>
                <td class="answer-cell">${data.text}</td>
                <td style="text-align:center; min-width:100px;">
                    <button class="pick-btn ${data.isPicked ? 'picked' : ''}" onclick="togglePick('${data.subId}')">
                        ${data.isPicked ? '★ PICK 취소' : '☆ PICK'}
                    </button>
                    <button class="del-btn" onclick="deleteSubmission('${data.subId}')">삭제</button>
                </td>`;
            tbody.appendChild(tr);
        });
    }

    function togglePick(subId) {
        const t = allSubmissions.find(s => s.subId === subId);
        if (t) db.collection("submissions").doc(subId).update({ isPicked: !t.isPicked });
    }
    function deleteSubmission(subId) {
        openModal("답변 삭제", "이 학생의 답변을 삭제하시겠습니까?", false, () => {
            db.collection("submissions").doc(subId).delete().then(closeModal);
        });
    }
    function promptDeleteAll() {
        const lecId = document.getElementById('answer-lecture-select').value;
        if (!lecId) { alert("강의를 먼저 선택하세요."); return; }
        const lec = activeLectures.find(l => l.docId === lecId);
        openModal("전체 삭제", `<b>${lec?.title}</b>의 모든 답변을 삭제합니다.<br><span style="color:var(--text-error)">되돌릴 수 없습니다.</span>`, false, () => {
            const subs  = allSubmissions.filter(s => s.lectureDocId === lecId);
            const batch = db.batch();
            subs.forEach(s => batch.delete(db.collection("submissions").doc(s.subId)));
            batch.commit().then(closeModal);
        });
    }
    function exportCSV() {
        const lecId = document.getElementById('answer-lecture-select').value;
        if (!lecId) { alert("강의를 먼저 선택하세요."); return; }
        const lec = activeLectures.find(l => l.docId === lecId);
        let csv = "\uFEFF학번,이름,확인문구,답변,글자수,작성시간(초),이탈횟수,PICK\n";
        allSubmissions.filter(s => s.lectureDocId === lecId).forEach(d => {
            const text = (d.text || '').replace(/"/g, '""').replace(/\n/g, ' ');
            csv += `${d.id},${d.name},${d.verify},"${text}",${d.textLength},${d.duration},${d.cheatCount},${d.isPicked ? 'O' : 'X'}\n`;
        });
        const a = document.createElement('a');
        a.href = encodeURI("data:text/csv;charset=utf-8," + csv);
        a.download = `${lec?.title || '답변'}_목록.csv`;
        document.body.appendChild(a); a.click(); document.body.removeChild(a);
    }

    /* ── 아카이브 ── */
    function renderArchiveAdmin() {
        const tbody = document.getElementById('archive-tbody');
        if (!lecturesReady) {
            tbody.innerHTML = `<tr><td colspan="3"><div class="loading-msg"><div class="spinner"></div><span>불러오는 중…</span></div></td></tr>`;
            return;
        }
        tbody.innerHTML = '';
        if (!activeLectures.length) { tbody.innerHTML = `<tr><td colspan="3" class="empty-msg">강의가 없습니다.</td></tr>`; return; }
        activeLectures.forEach(lec => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td style="font-weight:700;">${lec.title}</td>
                <td><span class="status-badge ${lec.isArchived ? 'on' : 'off'}">${lec.isArchived ? '● 공개 중' : '○ 비공개'}</span></td>
                <td>
                    <button class="${lec.isArchived ? 'btn-outline' : 'btn-primary'} btn-sm"
                        onclick="toggleArchive('${lec.docId}', ${lec.isArchived})">
                        ${lec.isArchived ? '내리기' : '공개하기'}
                    </button>
                </td>`;
            tbody.appendChild(tr);
        });
    }
    function toggleArchive(docId, current) {
        const action = current ? '내리기' : '공개하기';
        const desc   = current ? "학생 화면과 전시 페이지에서 숨깁니다." : "학생 화면과 전시 페이지에 공개합니다.";
        openModal(`아카이브 ${action}`, desc, false, () => {
            db.collection("lectures").doc(docId).update({ isArchived: !current }).then(closeModal);
        });
    }

    /* ── 모달 ── */
    function openModal(title, desc, hasInput, onConfirm) {
        document.getElementById('modal-title').textContent = title;
        document.getElementById('modal-desc').innerHTML = desc || '';
        const pwd = document.getElementById('modal-pwd');
        if (hasInput) { pwd.classList.remove('hidden'); pwd.value = ''; setTimeout(() => pwd.focus(), 50); }
        else pwd.classList.add('hidden');
        document.getElementById('modal-confirm').onclick = onConfirm;
        show('modal');
    }
    function closeModal() { hide('modal'); }

    /* ── 유틸 ── */
    function show(id) { document.getElementById(id).classList.remove('hidden'); }
    function hide(id) { document.getElementById(id).classList.add('hidden'); }
</script>
</body>
</html>
