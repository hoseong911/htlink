<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>생각 체크 아카이브 — 인천동양중 역사</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <style>
        :root {
            --bg-base: #0d0d0d;
            --bg-surface: #161616;
            --bg-interactive: #1e1e1e;
            --bg-hover: #232323;
            --brand-green: #1ed760;
            --brand-dim: rgba(30,215,96,0.15);
            --text-base: #f0f0f0;
            --text-muted: #888;
            --text-pick: #1ed760;
            --border-subtle: rgba(255,255,255,0.07);
            --shadow: rgba(0,0,0,0.5) 0px 12px 40px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Pretendard', 'Helvetica Neue', sans-serif;
            background: var(--bg-base); color: var(--text-base);
            min-height: 100vh;
        }

        /* ── 히어로 헤더 ── */
        .hero {
            background: linear-gradient(180deg, #111 0%, var(--bg-base) 100%);
            border-bottom: 1px solid var(--border-subtle);
            padding: 48px 24px 36px;
            text-align: center;
            position: relative;
        }
        .hero-eyebrow {
            font-size: 11px; font-weight: 800; letter-spacing: 3px;
            color: var(--brand-green); margin-bottom: 16px; text-transform: uppercase;
        }
        .hero-title {
            font-size: clamp(28px, 6vw, 52px); font-weight: 900;
            letter-spacing: -1.5px; line-height: 1.1; margin-bottom: 14px;
        }
        .hero-sub {
            font-size: 15px; color: var(--text-muted);
            max-width: 480px; margin: 0 auto 28px; line-height: 1.6;
        }
        .hero-nav {
            display: flex; justify-content: center; gap: 10px; flex-wrap: wrap;
        }
        .hero-nav a {
            background: var(--bg-interactive); color: var(--text-muted);
            border: 1px solid var(--border-subtle); border-radius: 500px;
            padding: 9px 20px; font-size: 13px; font-weight: 700; text-decoration: none;
            transition: all 0.15s;
        }
        .hero-nav a:hover { color: var(--text-base); border-color: rgba(255,255,255,0.2); }
        .hero-nav a.green { background: var(--brand-green); color: #000; border-color: var(--brand-green); }
        .hero-nav a.green:hover { background: #1db954; }

        /* ── 레이아웃 ── */
        .main { display: flex; min-height: calc(100vh - 300px); }

        /* ── 사이드바 (강의 목록) ── */
        .sidebar {
            width: 280px; flex-shrink: 0;
            border-right: 1px solid var(--border-subtle);
            padding: 28px 16px;
            position: sticky; top: 0; height: calc(100vh - 300px); overflow-y: auto;
        }
        .sidebar h3 {
            font-size: 11px; font-weight: 800; letter-spacing: 2px;
            color: var(--text-muted); text-transform: uppercase; margin-bottom: 16px; padding: 0 8px;
        }
        .lec-btn {
            width: 100%; text-align: left; background: transparent; color: var(--text-muted);
            border: none; border-radius: 8px; padding: 12px 12px;
            font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.15s;
            display: flex; align-items: center; gap: 10px; margin-bottom: 4px;
        }
        .lec-btn:hover { background: var(--bg-hover); color: var(--text-base); }
        .lec-btn.active { background: var(--bg-interactive); color: var(--text-base); }
        .lec-btn .dot {
            width: 6px; height: 6px; border-radius: 50%;
            background: var(--brand-green); flex-shrink: 0;
            opacity: 0.4; transition: opacity 0.15s;
        }
        .lec-btn.active .dot, .lec-btn:hover .dot { opacity: 1; }
        .lec-btn .count {
            margin-left: auto; font-size: 11px; color: var(--text-muted);
            background: var(--bg-interactive); padding: 2px 8px; border-radius: 20px;
        }
        .lec-btn.active .count { background: var(--bg-hover); }

        /* ── 콘텐츠 영역 ── */
        .content { flex: 1; padding: 32px 28px; overflow-y: auto; }

        /* ── 빈 화면 ── */
        .empty-screen {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 400px; color: var(--text-muted); text-align: center;
        }
        .empty-screen .icon { font-size: 56px; margin-bottom: 20px; }
        .empty-screen h2 { font-size: 20px; font-weight: 800; color: var(--text-base); margin-bottom: 10px; }
        .empty-screen p { font-size: 14px; line-height: 1.6; }

        /* ── 강의 헤더 ── */
        .lecture-header { margin-bottom: 28px; padding-bottom: 24px; border-bottom: 1px solid var(--border-subtle); }
        .lecture-header .lec-label {
            font-size: 11px; font-weight: 800; letter-spacing: 2px;
            color: var(--brand-green); text-transform: uppercase; margin-bottom: 8px;
        }
        .lecture-header h2 { font-size: 26px; font-weight: 900; letter-spacing: -0.5px; margin-bottom: 12px; }
        .question-banner {
            background: var(--bg-interactive); border-left: 3px solid var(--brand-green);
            border-radius: 0 10px 10px 0; padding: 14px 20px;
            font-size: 15px; font-weight: 700; line-height: 1.6; display: inline-block; width: 100%;
        }

        /* ── 필터 바 ── */
        .filter-bar {
            display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap; align-items: center;
        }
        .filter-bar span { font-size: 12px; color: var(--text-muted); font-weight: 700; margin-right: 4px; }
        .f-btn {
            background: var(--bg-interactive); color: var(--text-muted);
            border: 1px solid transparent; border-radius: 500px;
            padding: 7px 16px; font-size: 12px; font-weight: 700; cursor: pointer;
            transition: all 0.15s; font-family: inherit;
        }
        .f-btn:hover { color: var(--text-base); }
        .f-btn.active { background: var(--brand-green); color: #000; }

        /* ── 통계 바 ── */
        .stats-bar {
            display: flex; gap: 20px; margin-bottom: 24px; flex-wrap: wrap;
        }
        .stats-bar .s { font-size: 13px; color: var(--text-muted); }
        .stats-bar .s b { color: var(--text-base); }

        /* ── 패들렛 그리드 ── */
        .padlet-grid {
            columns: 3 200px; column-gap: 14px;
        }
        .padlet-card {
            break-inside: avoid; background: var(--bg-surface);
            border: 1px solid var(--border-subtle); border-radius: 12px;
            padding: 18px; margin-bottom: 14px;
            line-height: 1.7; word-break: break-word; font-size: 14px;
            transition: border-color 0.2s, transform 0.2s;
        }
        .padlet-card:hover { border-color: rgba(255,255,255,0.15); transform: translateY(-2px); }
        .padlet-card.pick { border-color: var(--brand-green); background: var(--bg-surface); }
        .pick-tag {
            font-size: 11px; font-weight: 800; color: var(--brand-green);
            letter-spacing: 1px; margin-bottom: 10px; display: flex; align-items: center; gap: 5px;
        }
        .pick-tag::before { content: ''; display: block; width: 6px; height: 6px; background: var(--brand-green); border-radius: 50%; }

        /* ── 뷰 토글 ── */
        .view-toggle { display: flex; gap: 6px; margin-left: auto; }
        .v-btn {
            background: var(--bg-interactive); border: 1px solid var(--border-subtle);
            color: var(--text-muted); border-radius: 6px;
            padding: 7px 12px; font-size: 12px; font-weight: 700; cursor: pointer; font-family: inherit;
        }
        .v-btn.active { background: var(--bg-hover); color: var(--text-base); }

        /* ── 리스트 뷰 ── */
        .list-view .padlet-card { columns: 1; }
        .list-grid { display: flex; flex-direction: column; gap: 10px; }
        .list-item {
            background: var(--bg-surface); border: 1px solid var(--border-subtle);
            border-radius: 10px; padding: 16px 20px;
            display: flex; gap: 16px; align-items: flex-start;
            line-height: 1.65; font-size: 14px; transition: border-color 0.2s;
        }
        .list-item:hover { border-color: rgba(255,255,255,0.12); }
        .list-item.pick { border-color: var(--brand-green); }
        .list-item .lnum {
            color: var(--text-muted); font-size: 12px; font-weight: 700;
            min-width: 24px; padding-top: 2px;
        }
        .list-item .lnum.p { color: var(--brand-green); }

        /* ── 로딩 ── */
        .loading { text-align: center; padding: 80px 0; color: var(--text-muted); font-size: 14px; }
        .spinner { width: 32px; height: 32px; border: 3px solid var(--border-subtle); border-top-color: var(--brand-green); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── 유저 배지 (로그인 상태 표시) ── */
        .user-badge {
            position: fixed; bottom: 24px; right: 24px;
            background: var(--bg-surface); border: 1px solid var(--border-subtle);
            border-radius: 500px; padding: 10px 20px;
            font-size: 13px; font-weight: 700; color: var(--brand-green);
            box-shadow: var(--shadow); display: flex; align-items: center; gap: 8px;
            opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 100;
        }
        .user-badge.show { opacity: 1; pointer-events: all; }
        .user-badge a { color: var(--text-muted); font-size: 12px; text-decoration: none; margin-left: 6px; }
        .user-badge a:hover { color: var(--text-base); }

        /* ── 반응형 ── */
        @media (max-width: 768px) {
            .main { flex-direction: column; }
            .sidebar { width: 100%; height: auto; position: static; border-right: none; border-bottom: 1px solid var(--border-subtle); padding: 16px; }
            .sidebar h3 { margin-bottom: 10px; }
            .content { padding: 20px 16px; }
            .padlet-grid { columns: 2 160px; }
        }
        @media (max-width: 480px) {
            .padlet-grid { columns: 1; }
            .hero { padding: 36px 16px 28px; }
        }
    </style>
</head>
<body>

<!-- ── 히어로 ── -->
<div class="hero">
    <div class="hero-eyebrow">2026 인천동양중학교 역사 수업</div>
    <h1 class="hero-title">생각 체크 아카이브</h1>
    <p class="hero-sub">수업 중 함께 나눈 생각들을 모아두는 공간입니다.</p>
    <nav class="hero-nav">
        <a href="check.html">✏️ 답변 작성하기</a>
        <a href="admin.html" class="green">관리자</a>
    </nav>
</div>

<!-- ── 메인 ── -->
<div class="main">

    <!-- 사이드바 -->
    <aside class="sidebar">
        <h3>강의 목록</h3>
        <div id="sidebar-list">
            <div class="loading"><div class="spinner"></div>불러오는 중…</div>
        </div>
    </aside>

    <!-- 콘텐츠 -->
    <main class="content" id="content-area">
        <div class="empty-screen">
            <div class="icon">📂</div>
            <h2>강의를 선택하세요</h2>
            <p>왼쪽에서 강의를 선택하면<br>학생들의 생각을 볼 수 있어요.</p>
        </div>
    </main>

</div>

<!-- 유저 배지 -->
<div class="user-badge" id="user-badge">
    <span id="badge-name"></span>
    <a href="check.html">← 돌아가기</a>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDAc5S87JK-LtXzk5-iTR9rt7RnHWnUXTQ",
        authDomain: "ho0911seong-56638.firebaseapp.com",
        databaseURL: "https://ho0911seong-56638-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "ho0911seong-56638",
        storageBucket: "ho0911seong-56638.firebasestorage.app",
        messagingSenderId: "994509567071",
        appId: "1:994509567071:web:be8ed4e8e9b0a833f557ea"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let lectures = [];
    let allSubs = [];
    let currentLecId = null;
    let currentFilter = 'all';
    let viewMode = 'grid'; // 'grid' | 'list'

    // ── 로그인 상태 (check.html과 localStorage 공유) ──
    window.addEventListener('load', () => {
        const saved = localStorage.getItem('sc_user');
        if (saved) {
            try {
                const user = JSON.parse(saved);
                document.getElementById('badge-name').textContent = `${user.id} ${user.name}`;
                document.getElementById('user-badge').classList.add('show');
            } catch(e) {}
        }
    });

    // ── Firebase 구독 ──
    db.collection("lectures").orderBy("createdAt","desc").onSnapshot(snap => {
        lectures = snap.docs.map(d => ({ docId: d.id, ...d.data() })).filter(l => l.isArchived);
        renderSidebar();
    });

    db.collection("submissions").orderBy("createdAt","desc").onSnapshot(snap => {
        allSubs = snap.docs.map(d => ({ subId: d.id, ...d.data() }));
        if (currentLecId) renderContent(currentLecId);
    });

    // ── 사이드바 ──
    function renderSidebar() {
        const el = document.getElementById('sidebar-list');
        el.innerHTML = '';
        if (!lectures.length) {
            el.innerHTML = '<p style="font-size:13px; color:var(--text-muted); padding:8px;">아직 공개된 아카이브가 없습니다.</p>';
            return;
        }
        lectures.forEach(lec => {
            const count = allSubs.filter(s => s.lectureDocId === lec.docId).length;
            const btn = document.createElement('button');
            btn.className = `lec-btn ${currentLecId === lec.docId ? 'active' : ''}`;
            btn.innerHTML = `
                <span class="dot"></span>
                <span style="flex:1; text-align:left;">${lec.title}</span>
                <span class="count">${count}</span>`;
            btn.onclick = () => selectLecture(lec.docId);
            el.appendChild(btn);
        });
    }

    // ── 강의 선택 ──
    function selectLecture(docId) {
        currentLecId = docId;
        currentFilter = 'all';
        renderSidebar();
        renderContent(docId);
    }

    // ── 콘텐츠 렌더 ──
    function renderContent(docId) {
        const lec = lectures.find(l => l.docId === docId);
        if (!lec) return;

        let subs = allSubs.filter(s => s.lectureDocId === docId);

        // 필터
        let filtered = subs;
        if (currentFilter === 'picked') filtered = subs.filter(s => s.isPicked);
        else if (currentFilter !== 'all') filtered = subs.filter(s => (s.id?.toString().charAt(2)||'') === currentFilter);

        // 정렬: PICK 먼저, 그 다음 글자 수
        filtered.sort((a,b) => (b.isPicked - a.isPicked) || (b.textLength - a.textLength));

        const pickCount = subs.filter(s => s.isPicked).length;
        const avgLen = subs.length ? Math.round(subs.reduce((a,s) => a+(s.textLength||0),0)/subs.length) : 0;

        // 반별 카운트
        const classCounts = {};
        subs.forEach(s => {
            const cn = s.id?.toString().charAt(2) || '?';
            classCounts[cn] = (classCounts[cn]||0) + 1;
        });

        const el = document.getElementById('content-area');
        el.innerHTML = `
            <div class="lecture-header">
                <div class="lec-label">아카이브</div>
                <h2>${lec.title}</h2>
                <div class="question-banner">Q. ${lec.question}</div>
            </div>

            <div class="stats-bar">
                <div class="s">총 제출 <b>${subs.length}명</b></div>
                <div class="s">PICK <b>${pickCount}개</b></div>
                <div class="s">평균 <b>${avgLen}자</b></div>
            </div>

            <div class="filter-bar">
                <span>필터</span>
                <button class="f-btn ${currentFilter==='all'?'active':''}" onclick="setFilter('all',this)">전체</button>
                ${[1,2,3,4,5,6].map(n => `<button class="f-btn ${currentFilter===String(n)?'active':''}" onclick="setFilter('${n}',this)">${n}반 ${classCounts[n]?`(${classCounts[n]})`:''}</button>`).join('')}
                <button class="f-btn ${currentFilter==='picked'?'active':''}" style="color:var(--brand-green);" onclick="setFilter('picked',this)">⭐ PICK</button>
                <div class="view-toggle">
                    <button class="v-btn ${viewMode==='grid'?'active':''}" onclick="setView('grid', this)">▦ 카드</button>
                    <button class="v-btn ${viewMode==='list'?'active':''}" onclick="setView('list', this)">☰ 목록</button>
                </div>
            </div>

            <div id="cards-area"></div>
        `;

        renderCards(filtered);
    }

    function setFilter(f, btn) {
        currentFilter = f;
        document.querySelectorAll('.f-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        if (!currentLecId) return;
        let subs = allSubs.filter(s => s.lectureDocId === currentLecId);
        let filtered = subs;
        if (f === 'picked') filtered = subs.filter(s => s.isPicked);
        else if (f !== 'all') filtered = subs.filter(s => (s.id?.toString().charAt(2)||'') === f);
        filtered.sort((a,b) => (b.isPicked - a.isPicked) || (b.textLength - a.textLength));
        renderCards(filtered);
    }

    function setView(mode, btn) {
        viewMode = mode;
        document.querySelectorAll('.v-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        // 현재 필터 기반 재렌더
        if (!currentLecId) return;
        let subs = allSubs.filter(s => s.lectureDocId === currentLecId);
        let filtered = subs;
        if (currentFilter === 'picked') filtered = subs.filter(s => s.isPicked);
        else if (currentFilter !== 'all') filtered = subs.filter(s => (s.id?.toString().charAt(2)||'') === currentFilter);
        filtered.sort((a,b) => (b.isPicked - a.isPicked) || (b.textLength - a.textLength));
        renderCards(filtered);
    }

    function renderCards(filtered) {
        const area = document.getElementById('cards-area');
        if (!area) return;
        if (!filtered.length) {
            area.innerHTML = '<div class="empty-screen"><div class="icon">🔍</div><h2>답변이 없습니다</h2><p>해당 조건에 맞는 답변이 없어요.</p></div>';
            return;
        }

        if (viewMode === 'grid') {
            area.innerHTML = `<div class="padlet-grid">${filtered.map((sub,i) => `
                <div class="padlet-card ${sub.isPicked ? 'pick' : ''}">
                    ${sub.isPicked ? '<div class="pick-tag">PICK</div>' : ''}
                    <div>${sub.text}</div>
                </div>`).join('')}</div>`;
        } else {
            area.innerHTML = `<div class="list-grid">${filtered.map((sub,i) => `
                <div class="list-item ${sub.isPicked ? 'pick' : ''}">
                    <div class="lnum ${sub.isPicked ? 'p' : ''}">${sub.isPicked ? '★' : (i+1)}</div>
                    <div>${sub.text}</div>
                </div>`).join('')}</div>`;
        }
    }
</script>
</body>
</html>
