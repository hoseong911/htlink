<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>신라버 SILLAVER - 통일 신라 포털</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <style>
        :root { --naver-green: #03c75a; --bg-gray: #f5f6f7; --border-gray: #e3e5e8; }
        * { box-sizing: border-box; }
        body { font-family: 'Pretendard', sans-serif; background-color: var(--bg-gray); margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        header { background: white; padding: 12px; text-align: center; border-bottom: 1px solid var(--border-gray); position: sticky; top: 0; z-index: 1000; width: 100%; }
        .logo { color: var(--naver-green); font-size: 26px; font-weight: 900; letter-spacing: -1.5px; text-decoration: none; }
        
        .container { width: 100%; max-width: 800px; margin: 0 auto; padding: 15px; }
        .box { background: white; border-radius: 12px; padding: 18px; border: 1px solid var(--border-gray); margin-bottom: 15px; width: 100%; }
        
        .section-title { font-size: 18px; font-weight: 800; color: #333; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
        .section-title::before { content: ''; width: 4px; height: 18px; background: var(--naver-green); display: inline-block; border-radius: 2px; }
        .section-desc { font-size: 13px; color: #777; margin-bottom: 15px; line-height: 1.4; }

        .user-info { display: flex; gap: 8px; margin-bottom: 15px; }
        .user-info input { flex: 1; padding: 14px; border: 1px solid var(--border-gray); border-radius: 8px; font-size: 16px; outline: none; -webkit-appearance: none; }

        .search-area { border: 2px solid var(--naver-green); border-radius: 30px; display: flex; align-items: center; padding: 5px 18px; background: white; margin-bottom: 15px; width: 100%; }
        .search-area span { color: var(--naver-green); font-weight: 900; font-size: 24px; margin-right: 12px; }
        .search-area input { border: none; outline: none; width: 100%; height: 45px; font-size: 16px; font-weight: 500; }

        .input-group { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
        .input-group label { width: 85px; font-size: 14px; font-weight: 700; color: #555; flex-shrink: 0; }
        .input-group input { flex: 1; padding: 12px; border: 1px solid var(--border-gray); border-radius: 8px; font-size: 15px; outline: none; width: 100%; }
        .input-group input:focus { border-color: var(--naver-green); }

        .ad-textarea { width: 100%; min-height: 140px; padding: 15px; border: 1px solid var(--border-gray); border-radius: 8px; font-family: inherit; font-size: 16px; resize: none; outline: none; line-height: 1.5; }
        .ad-textarea:focus { border-color: var(--naver-green); }

        .btn-submit { background: var(--naver-green); color: white; border: none; width: 100%; padding: 18px; border-radius: 10px; font-size: 19px; font-weight: 800; cursor: pointer; transition: 0.2s; margin-top: 10px; box-shadow: 0 4px 10px rgba(3, 199, 90, 0.2); }
        .btn-submit:active { transform: scale(0.97); }

        #result-view { display: none; }
        .rank-item { display: flex; justify-content: space-between; align-items: center; padding: 14px 0; border-bottom: 1px solid #f2f2f2; }
        .rank-left { display: flex; align-items: center; gap: 12px; }
        .rank-num { color: var(--naver-green); font-weight: 800; font-size: 17px; width: 22px; }
        .rank-word { font-weight: 600; font-size: 16px; color: #333; }
        .rank-count { font-size: 13px; color: #a1a1a1; font-weight: 500; }

        .tabs { display: flex; gap: 6px; overflow-x: auto; margin-bottom: 15px; padding-bottom: 8px; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
        .tabs::-webkit-scrollbar { display: none; }
        .tab-btn { padding: 9px 18px; border-radius: 20px; border: 1px solid var(--border-gray); background: white; white-space: nowrap; font-size: 14px; cursor: pointer; }
        .tab-btn.active { background: var(--naver-green); color: white; border-color: var(--naver-green); font-weight: 700; }

        .news-card { border-bottom: 1px solid #f2f2f2; padding: 15px 0; }
        .news-title { font-size: 16px; font-weight: 700; margin-bottom: 6px; line-height: 1.4; color: #222; }
        .news-reporter { font-size: 13px; color: var(--naver-green); font-weight: 600; }

        .ad-feed-item { background: #f9fdfa; border: 1px dashed var(--naver-green); padding: 18px; border-radius: 12px; margin-bottom: 12px; }
        .ad-feed-content { font-size: 16px; font-weight: 500; line-height: 1.6; color: #444; }
        
        .loading-text { text-align: center; padding: 30px; color: var(--naver-green); font-weight: 700; }
    </style>
</head>
<body>

<header>
    <a href="#" class="logo" onclick="location.reload()">SILLAVER</a>
</header>

<div class="container">
    <div id="input-view">
        <div class="user-info">
            <input type="number" id="user-id" placeholder="학번 (5자리)">
            <input type="text" id="user-name" placeholder="이름">
        </div>

        <div class="search-area">
            <span>N</span>
            <input type="text" id="keywords" placeholder="검색어 3~5개 입력 (쉼표로 구분)">
        </div>

        <div class="box">
            <div class="section-title">분야별 뉴스 헤드라인 작성</div>
            <div class="section-desc">통일 신라의 각 분야를 가장 잘 나타내는 기사 제목을 지어보세요.</div>
            <div class="input-group"><label>🏛️ 정치</label><input type="text" class="news-input" data-cat="정치" placeholder="제목 입력"></div>
            <div class="input-group"><label>📜 중앙제도</label><input type="text" class="news-input" data-cat="중앙제도" placeholder="제목 입력"></div>
            <div class="input-group"><label>🗺️ 지방행정</label><input type="text" class="news-input" data-cat="지방행정" placeholder="제목 입력"></div>
            <div class="input-group"><label>⚔️ 군사</label><input type="text" class="news-input" data-cat="군사" placeholder="제목 입력"></div>
            <div class="input-group"><label>🌾 토지/경제</label><input type="text" class="news-input" data-cat="토지" placeholder="제목 입력"></div>
        </div>

        <div class="box">
            <div class="section-title">📢 광고 홍보 배너 작성</div>
            <div class="section-desc">가상의 제품이나, 신라의 정책을 홍보하는 배너 문구를 작성해 주세요.</div>
            <textarea id="ad-banner" class="ad-textarea" placeholder="아이디어가 돋보이는 홍보 문구를 작성해 봅시다."></textarea>
        </div>

        <button class="btn-submit" id="main-btn" onclick="submitSilla()">기사 발행 및 포털 접속</button>
    </div>

    <div id="result-view">
        <div class="box">
            <div class="section-title">실시간 급상승 검색어</div>
            <div id="trend-list"><div class="loading-text">집계 중...</div></div>
        </div>

        <div class="box">
            <div class="section-title">분야별 실시간 뉴스</div>
            <div class="tabs" id="tab-container">
                <button class="tab-btn active" onclick="filterNews('전체')">전체</button>
                <button class="tab-btn" onclick="filterNews('정치')">정치</button>
                <button class="tab-btn" onclick="filterNews('중앙제도')">중앙</button>
                <button class="tab-btn" onclick="filterNews('지방행정')">지방</button>
                <button class="tab-btn" onclick="filterNews('군사')">군사</button>
                <button class="tab-btn" onclick="filterNews('토지')">토지</button>
            </div>
            <div id="news-feed"></div>
        </div>

        <div class="box">
            <div class="section-title">신라버 추천 광고</div>
            <div id="ad-feed"></div>
        </div>
        
        <button class="btn-submit" style="background:#888;" onclick="location.reload()">새로 작성하기</button>
    </div>

    <div style="text-align: center; margin-top: 40px; padding-bottom: 20px; color: #999;">
        <div style="font-size: 14px; font-weight: bold;">SILLAVER v1.1.0</div>
        <button onclick="location.href='silla_admin.html'" style="background: none; border: none; color: #bbb; cursor: pointer; text-decoration: underline; margin-top: 8px; font-size: 13px;">관리자 모드 (데이터 초기화)</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDAc5S87JK-LtXzk5-iTR9rt7RnHWnUXTQ",
        authDomain: "ho0911seong-56638.firebaseapp.com",
        projectId: "ho0911seong-56638",
        storageBucket: "ho0911seong-56638.firebasestorage.app",
        messagingSenderId: "994509567071",
        appId: "1:994509567071:web:778c95931e95e9cbf557ea"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let allNewsData = [];

    window.submitSilla = async function() {
        const userId = document.getElementById('user-id').value;
        const userName = document.getElementById('user-name').value;
        const keywords = document.getElementById('keywords').value;
        const adContent = document.getElementById('ad-banner').value;

        if(!userId || !userName || !keywords) { alert("학번, 이름, 검색어를 모두 입력해주세요!"); return; }

        const rawArr = keywords.split(',').map(v => v.trim()).filter(v => v !== "");
        if(rawArr.length < 3) { alert("검색어를 3개 이상 입력해주세요!"); return; }
        
        const btn = document.getElementById('main-btn');
        btn.innerText = "발행 및 연결 중...";
        btn.disabled = true;

        const newsArr = [];
        document.querySelectorAll('.news-input').forEach(input => {
            if(input.value.trim() !== "") {
                newsArr.push({ category: input.dataset.cat, title: input.value.trim() });
            }
        });

        try {
            await addDoc(collection(db, "silla_v3"), {
                studentId: userId, studentName: userName, keywords: rawArr.slice(0, 5),
                news: newsArr, ad: adContent, timestamp: serverTimestamp()
            });

            document.getElementById('input-view').style.display = 'none';
            document.getElementById('result-view').style.display = 'block';
            window.scrollTo(0, 0);
            
            startListening();
        } catch (e) {
            alert("저장 오류: " + e.message);
            btn.innerText = "기사 발행 및 포털 접속";
            btn.disabled = false;
        }
    };

    function startListening() {
        const q = query(collection(db, "silla_v3"), orderBy("timestamp", "desc"));
        onSnapshot(q, (snapshot) => {
            let trendMap = {};
            let adHtml = "";
            allNewsData = [];

            snapshot.forEach(doc => {
                const data = doc.data();
                data.keywords.forEach(word => {
                    const clean = word.replace(/\s+/g, ""); 
                    trendMap[clean] = (trendMap[clean] || 0) + 1;
                });
                if(data.news) {
                    data.news.forEach(n => { allNewsData.push({ ...n, author: data.studentName }); });
                }
                if(data.ad) {
                    adHtml += `<div class="ad-feed-item"><div class="ad-feed-content">${data.ad}</div><div style="font-size:12px; color:#999; margin-top:8px;">AD BY. ${data.studentName}</div></div>`;
                }
            });

            renderTrends(trendMap);
            filterNews('전체');
            document.getElementById('ad-feed').innerHTML = adHtml || "등록된 광고가 없습니다.";
        });
    }

    function renderTrends(map) {
        const sorted = Object.keys(map).map(word => ({ word, count: map[word] }))
                        .sort((a, b) => b.count - a.count).slice(0, 10);
        let html = "";
        sorted.forEach((item, i) => {
            html += `<div class="rank-item"><div class="rank-left"><span class="rank-num">${i+1}</span><span class="rank-word">${item.word}</span></div><span class="rank-count">${item.count}회 검색</span></div>`;
        });
        document.getElementById('trend-list').innerHTML = html || "데이터가 없습니다.";
    }

    window.filterNews = function(category) {
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.classList.toggle('active', btn.innerText === category || (category === '전체' && btn.innerText === '전체'));
        });
        const target = document.getElementById('news-feed');
        const filtered = category === '전체' ? allNewsData : allNewsData.filter(n => n.category === category);
        let html = "";
        filtered.forEach(n => {
            html += `<div class="news-card"><div class="news-title">${n.title}</div><div class="news-reporter">신라버 ${n.author} 기자 | ${n.category}</div></div>`;
        });
        target.innerHTML = html || `<p style="padding:20px; color:#999; text-align:center;">작성된 기사가 없습니다.</p>`;
    };
</script>

</body>
</html>
