<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>신라버 SILLAVER - 통일 신라를 검색하다</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <style>
        :root { --naver-green: #03c75a; --bg-gray: #f5f6f7; --border-gray: #e3e5e8; }
        body { font-family: 'Pretendard', sans-serif; background-color: var(--bg-gray); margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        /* 헤더 & 로고 */
        header { background: white; padding: 15px; text-align: center; border-bottom: 1px solid var(--border-gray); position: sticky; top: 0; z-index: 100; }
        .logo { color: var(--naver-green); font-size: 28px; font-weight: 900; letter-spacing: -1px; text-decoration: none; }
        
        .container { width: 95%; max-width: 600px; margin: 15px auto; padding-bottom: 50px; }
        .box { background: white; border-radius: 12px; padding: 20px; border: 1px solid var(--border-gray); margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.03); }
        .section-title { font-size: 18px; font-weight: 800; color: #333; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }
        .section-title::before { content: ''; width: 4px; height: 18px; background: var(--naver-green); display: inline-block; border-radius: 2px; }

        /* 학번/성함 입력 */
        .user-info { display: flex; gap: 10px; margin-bottom: 15px; }
        .user-info input { flex: 1; padding: 12px; border: 1px solid var(--border-gray); border-radius: 8px; font-size: 15px; outline: none; }
        .user-info input:focus { border-color: var(--naver-green); }

        /* 검색바 스타일 */
        .search-area { border: 2px solid var(--naver-green); border-radius: 30px; display: flex; align-items: center; padding: 5px 15px; background: white; margin-bottom: 20px; }
        .search-area span { color: var(--naver-green); font-weight: 900; font-size: 22px; margin-right: 10px; }
        .search-area input { border: none; outline: none; width: 100%; height: 40px; font-size: 16px; font-weight: 500; }

        /* 입력 폼 */
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 14px; font-weight: 700; color: #666; margin-bottom: 6px; }
        .input-group input, .input-group textarea { width: 100%; padding: 12px; border: 1px solid var(--border-gray); border-radius: 8px; font-family: inherit; font-size: 15px; box-sizing: border-box; outline: none; }
        .input-group input:focus { border-color: var(--naver-green); }

        .btn-submit { background: var(--naver-green); color: white; border: none; width: 100%; padding: 16px; border-radius: 8px; font-size: 18px; font-weight: 800; cursor: pointer; transition: 0.2s; }
        .btn-submit:active { transform: scale(0.98); background: #02a34a; }

        /* 결과 화면 디자인 */
        #result-view { display: none; }
        
        /* 1. 실시간 검색어 */
        .rank-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #f0f0f0; }
        .rank-left { display: flex; align-items: center; gap: 12px; }
        .rank-num { color: var(--naver-green); font-weight: 800; font-size: 16px; width: 20px; }
        .rank-word { font-weight: 600; font-size: 15px; color: #333; }
        .rank-count { font-size: 13px; color: #999; }

        /* 2. 뉴스 헤드라인 (탭 기능) */
        .tabs { display: flex; gap: 5px; overflow-x: auto; margin-bottom: 15px; padding-bottom: 5px; scrollbar-width: none; }
        .tabs::-webkit-scrollbar { display: none; }
        .tab-btn { padding: 8px 16px; border-radius: 20px; border: 1px solid var(--border-gray); background: white; white-space: nowrap; font-size: 14px; cursor: pointer; }
        .tab-btn.active { background: var(--naver-green); color: white; border-color: var(--naver-green); font-weight: 700; }

        .news-card { border-bottom: 1px solid #f0f0f0; padding: 15px 0; }
        .news-card:last-child { border: none; }
        .news-title { font-size: 16px; font-weight: 700; margin-bottom: 5px; color: #222; line-height: 1.4; }
        .news-meta { font-size: 13px; color: #888; }
        .news-reporter { color: var(--naver-green); font-weight: 600; }

        /* 3. 광고 배너 */
        .ad-scroll { display: flex; flex-direction: column; gap: 10px; }
        .ad-item { background: #f9fdfa; border: 1px dashed var(--naver-green); padding: 15px; border-radius: 10px; position: relative; }
        .ad-tag { position: absolute; top: 10px; right: 10px; font-size: 10px; border: 1px solid var(--naver-green); color: var(--naver-green); padding: 1px 4px; border-radius: 3px; }
        .ad-content { font-size: 15px; color: #444; font-weight: 500; line-height: 1.5; padding-right: 30px; }

        /* 로딩 애니메이션 */
        .loading { text-align: center; padding: 20px; color: var(--naver-green); font-weight: 700; }
    </style>
</head>
<body>

<header>
    <a href="#" class="logo" onclick="location.reload()">SILLAVER</a>
</header>

<div class="container">
    <div id="input-view">
        <div class="user-info">
            <input type="number" id="user-id" placeholder="학번 (5자리)">
            <input type="text" id="user-name" placeholder="이름">
        </div>

        <div class="search-area">
            <span>N</span>
            <input type="text" id="keywords" placeholder="검색어 3~5개 (쉼표로 구분)">
        </div>

        <div class="box">
            <div class="section-title">분야별 뉴스 헤드라인 작성</div>
            <div class="input-group"><label>🏛️ 정치</label><input type="text" class="news-input" data-cat="정치" placeholder="전제 왕권 강화에 대한 소식은?"></div>
            <div class="input-group"><label>📜 중앙제도</label><input type="text" class="news-input" data-cat="중앙제도" placeholder="집사부와 시중에 대해 써주세요."></div>
            <div class="input-group"><label>🗺️ 지방행정</label><input type="text" class="news-input" data-cat="지방행정" placeholder="9주 5소경 체제는 어떠한가요?"></div>
            <div class="input-group"><label>⚔️ 군사</label><input type="text" class="news-input" data-cat="군사" placeholder="9서당 10정의 특징은?"></div>
            <div class="input-group"><label>🌾 토지/경제</label><input type="text" class="news-input" data-cat="토지" placeholder="관료전과 녹읍에 대해 알려주세요."></div>
        </div>

        <div class="box">
            <div class="section-title">📢 광고 배너 제작</div>
            <textarea id="ad-banner" rows="3" placeholder="통일 신라를 홍보하는 문구를 작성해 보세요."></textarea>
        </div>

        <button class="btn-submit" onclick="submitSilla()">기사 발행 및 포털 접속</button>
    </div>

    <div id="result-view">
        <div class="box">
            <div class="section-title">실시간 급상승 검색어</div>
            <div id="trend-list">
                <div class="loading">데이터 집계 중...</div>
            </div>
        </div>

        <div class="box">
            <div class="section-title">분야별 실시간 뉴스</div>
            <div class="tabs" id="tab-container">
                <button class="tab-btn active" onclick="filterNews('전체')">전체</button>
                <button class="tab-btn" onclick="filterNews('정치')">정치</button>
                <button class="tab-btn" onclick="filterNews('중앙제도')">중앙제도</button>
                <button class="tab-btn" onclick="filterNews('지방행정')">지방행정</button>
                <button class="tab-btn" onclick="filterNews('군사')">군사</button>
                <button class="tab-btn" onclick="filterNews('토지')">토지</button>
            </div>
            <div id="news-feed">
                </div>
        </div>

        <div class="box">
            <div class="section-title">신라버 추천 광고</div>
            <div class="ad-scroll" id="ad-feed">
                </div>
        </div>
        
        <button class="btn-submit" style="background:#666;" onclick="location.reload()">처음으로 돌아가기</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDAc5S87JK-LtXzk5-iTR9rt7RnHWnUXTQ",
        authDomain: "ho0911seong-56638.firebaseapp.com",
        projectId: "ho0911seong-56638",
        storageBucket: "ho0911seong-56638.firebasestorage.app",
        messagingSenderId: "994509567071",
        appId: "1:994509567071:web:778c95931e95e9cbf557ea"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let allNewsData = []; // 필터링을 위한 전체 데이터 저장

    // 데이터 제출 함수
    window.submitSilla = async function() {
        const userId = document.getElementById('user-id').value;
        const userName = document.getElementById('user-name').value;
        const keywords = document.getElementById('keywords').value;
        const adContent = document.getElementById('ad-banner').value;

        if(!userId || !userName || !keywords) {
            alert("학번, 이름, 검색어는 필수입니다!");
            return;
        }

        // 검색어 가공 (3~5개, 띄어쓰기 제거 집계용 단어 생성)
        const rawArr = keywords.split(',').map(v => v.trim()).filter(v => v !== "");
        if(rawArr.length < 3) { alert("검색어는 최소 3개 이상 입력해주세요!"); return; }
        
        const finalKeywords = rawArr.slice(0, 5); // 최대 5개

        // 뉴스 기사 가공
        const newsArr = [];
        document.querySelectorAll('.news-input').forEach(input => {
            if(input.value.trim() !== "") {
                newsArr.push({ category: input.dataset.cat, title: input.value.trim() });
            }
        });

        const btn = document.querySelector('.btn-submit');
        btn.innerText = "발행 중...";
        btn.disabled = true;

        try {
            await addDoc(collection(db, "silla_ver2"), {
                studentId: userId,
                studentName: userName,
                keywords: finalKeywords,
                news: newsArr,
                ad: adContent,
                timestamp: serverTimestamp()
            });

            document.getElementById('input-view').style.display = 'none';
            document.getElementById('result-view').style.display = 'block';
            window.scrollTo(0, 0);
            startListening();
        } catch (e) {
            alert("오류가 발생했습니다: " + e.message);
            btn.innerText = "기사 발행 및 포털 접속";
            btn.disabled = false;
        }
    };

    // 실시간 리스너
    function startListening() {
        const q = query(collection(db, "silla_ver2"), orderBy("timestamp", "desc"));
        onSnapshot(q, (snapshot) => {
            let trendMap = {};
            let adHtml = "";
            allNewsData = [];

            snapshot.forEach(doc => {
                const data = doc.data();
                
                // 1. 검색어 집계 (띄어쓰기 무시)
                data.keywords.forEach(word => {
                    const cleanWord = word.replace(/\s+/g, ""); 
                    trendMap[cleanWord] = (trendMap[cleanWord] || 0) + 1;
                });

                // 2. 뉴스 데이터 누적
                if(data.news) {
                    data.news.forEach(n => {
                        allNewsData.push({ ...n, author: data.studentName, id: data.studentId });
                    });
                }

                // 3. 광고 데이터 누적
                if(data.ad) {
                    adHtml += `
                        <div class="ad-item">
                            <span class="ad-tag">AD</span>
                            <div class="ad-content">${data.ad}</div>
                            <div style="font-size:11px; color:#aaa; margin-top:5px;">Advertiser: ${data.studentName}</div>
                        </div>
                    `;
                }
            });

            renderTrends(trendMap);
            filterNews('전체'); // 초기 뉴스 렌더링
            document.getElementById('ad-feed').innerHTML = adHtml || "<p>등록된 광고가 없습니다.</p>";
        });
    }

    // 실시간 검색어 렌더링
    function renderTrends(map) {
        const sorted = Object.keys(map).map(word => ({ word, count: map[word] }))
                        .sort((a, b) => b.count - a.count).slice(0, 10);
        
        let html = "";
        sorted.forEach((item, i) => {
            html += `
                <div class="rank-item">
                    <div class="rank-left">
                        <span class="rank-num">${i+1}</span>
                        <span class="rank-word">${item.word}</span>
                    </div>
                    <span class="rank-count">${item.count}회 검색</span>
                </div>
            `;
        });
        document.getElementById('trend-list').innerHTML = html || "<p>검색어가 없습니다.</p>";
    }

    // 뉴스 필터링 및 렌더링
    window.filterNews = function(category) {
        // 탭 UI 변경
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.classList.toggle('active', btn.innerText === category);
        });

        const target = document.getElementById('news-feed');
        const filtered = category === '전체' ? allNewsData : allNewsData.filter(n => n.category === category);

        let html = "";
        filtered.forEach(n => {
            html += `
                <div class="news-card">
                    <div class="news-title">${n.title}</div>
                    <div class="news-meta">
                        <span class="news-reporter">신라버 ${n.author} 기자</span> | ${n.category} 분야
                    </div>
                </div>
            `;
        });
        target.innerHTML = html || `<p style="padding:20px; color:#999;">${category} 분야에 등록된 기사가 없습니다.</p>`;
    };
</script>

</body>
</html>
