<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>관리자 모드 — 인천동양중학교</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Noto+Serif+KR:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0d1117; --surface:rgba(255,255,255,0.04); --surface2:rgba(255,255,255,0.07);
  --border:rgba(255,255,255,0.09); --border2:rgba(255,255,255,0.15);
  --text:#e6edf3; --text2:#8b949e; --text3:#484f58;
  --accent:#58a6ff; --accent2:#79c0ff;
  --success:#3fb950; --danger:#f85149; --warn:#d29922; --gold:#e3b341;
  --sans:'Noto Sans KR',sans-serif; --serif:'Noto Serif KR',serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;}

/* Toast */
#toast{position:fixed;top:18px;left:50%;transform:translateX(-50%) translateY(-80px);
  background:rgba(22,27,34,0.96);backdrop-filter:blur(20px);
  border:1px solid var(--border2);border-radius:20px;
  padding:10px 20px;font-size:14px;color:var(--text);
  z-index:9999;transition:transform .3s cubic-bezier(.34,1.56,.64,1);
  white-space:nowrap;pointer-events:none;}
#toast.show{transform:translateX(-50%) translateY(0);}

/* ── 로그인 ── */
#screen-login{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 20px;}
.login-logo{font-size:44px;margin-bottom:18px;filter:drop-shadow(0 0 20px rgba(88,166,255,0.35));}
.login-title{font-family:var(--serif);font-size:22px;font-weight:600;margin-bottom:4px;text-align:center;}
.login-sub{font-size:13px;color:var(--text2);margin-bottom:32px;text-align:center;}
.login-card{width:100%;max-width:340px;background:var(--surface);backdrop-filter:blur(20px);
  border:1px solid var(--border);border-radius:16px;padding:26px 22px;}
.g-label{font-size:12px;color:var(--text2);margin-bottom:7px;display:block;}
.g-input{width:100%;padding:12px 15px;background:rgba(255,255,255,0.04);
  border:1px solid var(--border);border-radius:10px;
  font-size:16px;color:var(--text);font-family:var(--sans);margin-bottom:14px;
  outline:none;transition:border-color .2s,box-shadow .2s;}
.g-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(88,166,255,0.12);}
.g-input::placeholder{color:var(--text3);}
.g-btn{width:100%;padding:13px;background:var(--accent);color:#fff;border:none;
  border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;font-family:var(--sans);
  transition:opacity .15s,transform .12s;}
.g-btn:active{transform:translateY(1px);opacity:.9;}
.login-err{font-size:13px;color:var(--danger);margin-top:10px;text-align:center;display:none;}

/* ── 메인 ── */
#screen-main{display:none;min-height:100vh;}
.admin-header{background:rgba(13,17,23,0.92);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  padding:13px 18px;display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:200;}
.admin-header-title{font-size:15px;font-weight:700;}
.admin-header-badge{font-size:11px;background:rgba(88,166,255,0.12);
  border:1px solid rgba(88,166,255,0.28);color:var(--accent);
  padding:4px 10px;border-radius:20px;}

/* 활동 선택 */
#screen-select{padding:28px 18px;max-width:480px;margin:0 auto;}
.select-heading{font-size:13px;color:var(--text2);margin-bottom:14px;letter-spacing:.06em;}
.activity-card{background:var(--surface);border:1px solid var(--border);
  border-radius:16px;padding:20px;margin-bottom:11px;
  cursor:pointer;transition:background .2s,border-color .2s,transform .12s;
  display:flex;align-items:center;gap:16px;}
.activity-card:hover{background:var(--surface2);border-color:var(--border2);}
.activity-card:active{transform:scale(.98);}
.activity-icon{font-size:30px;flex-shrink:0;}
.activity-info{flex:1;}
.activity-name{font-size:15px;font-weight:700;margin-bottom:3px;}
.activity-desc{font-size:13px;color:var(--text2);}
.activity-arrow{font-size:18px;color:var(--text3);}

/* 활동 화면 */
#screen-activity{display:none;}
.back-row{padding:14px 18px 0;max-width:760px;margin:0 auto;}
.back-btn-sm{background:var(--surface);border:1px solid var(--border);
  border-radius:8px;padding:7px 14px;font-size:13px;color:var(--text2);
  cursor:pointer;font-family:var(--sans);transition:background .2s;}
.back-btn-sm:hover{background:var(--surface2);}

/* 탭 */
.act-tab-nav{display:flex;overflow-x:auto;gap:0;
  padding:12px 18px 0;max-width:760px;margin:10px auto 0;
  border-bottom:1px solid var(--border);}
.act-tab-nav::-webkit-scrollbar{display:none;}
.act-tab-btn{padding:9px 16px;font-size:13px;font-weight:500;color:var(--text2);
  cursor:pointer;border:none;background:transparent;font-family:var(--sans);
  border-bottom:2px solid transparent;white-space:nowrap;
  transition:color .2s,border-color .2s;}
.act-tab-btn.active{color:var(--accent);border-bottom-color:var(--accent);}
.act-tab-body{display:none;padding:20px 18px;max-width:760px;margin:0 auto 80px;}
.act-tab-body.show{display:block;}

/* 섹션 타이틀 */
.s-title{font-size:12px;font-weight:700;color:var(--text2);
  letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px;margin-top:22px;}
.s-title:first-child{margin-top:0;}

/* 카드 */
.g-card{background:var(--surface);border:1px solid var(--border);
  border-radius:13px;padding:16px;margin-bottom:11px;}

/* 통계 */
.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin-bottom:18px;}
.stat-card{background:var(--surface);border:1px solid var(--border);
  border-radius:12px;padding:13px 8px;text-align:center;}
.stat-num{font-family:var(--serif);font-size:26px;font-weight:600;color:var(--gold);}
.stat-label{font-size:11px;color:var(--text2);margin-top:3px;}

/* 반별 탭 필터 */
.class-filter{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;}
.class-btn{padding:6px 13px;background:var(--surface);border:1px solid var(--border);
  border-radius:20px;font-size:12px;color:var(--text2);cursor:pointer;font-family:var(--sans);
  transition:all .15s;}
.class-btn.active{background:rgba(88,166,255,0.14);border-color:rgba(88,166,255,0.4);color:var(--accent);}

/* 검색 */
.search-input{width:100%;padding:11px 14px;margin-bottom:13px;
  background:rgba(255,255,255,0.04);border:1px solid var(--border);
  border-radius:10px;font-size:14px;color:var(--text);font-family:var(--sans);
  outline:none;transition:border-color .2s;}
.search-input:focus{border-color:var(--accent);}
.search-input::placeholder{color:var(--text3);}

/* 학생 카드 */
.student-card{background:var(--surface);border:1px solid var(--border);
  border-radius:12px;margin-bottom:9px;overflow:hidden;}
.sc-header{padding:13px 15px;display:flex;align-items:center;
  justify-content:space-between;cursor:pointer;transition:background .15s;}
.sc-header:hover{background:var(--surface2);}
.sc-info{display:flex;align-items:center;gap:11px;}
.sc-avatar{width:34px;height:34px;border-radius:50%;
  background:rgba(88,166,255,0.12);border:1px solid rgba(88,166,255,0.22);
  display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:14px;color:var(--accent);flex-shrink:0;}
.sc-name{font-size:14px;font-weight:700;}
.sc-id{font-size:11px;color:var(--text2);margin-top:1px;}
.sc-progress{display:flex;align-items:center;gap:8px;}
.sc-pct{font-size:13px;font-weight:700;color:var(--gold);}
.sc-bar{width:60px;height:5px;background:rgba(255,255,255,0.08);border-radius:99px;overflow:hidden;}
.sc-bar-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--gold));border-radius:99px;transition:width .4s;}
.sc-detail{display:none;padding:13px 15px;border-top:1px solid var(--border);}
.student-card.open .sc-detail{display:block;}
.mission-row{display:flex;align-items:center;justify-content:space-between;
  padding:8px 0;border-bottom:1px solid var(--border);}
.mission-row:last-child{border-bottom:none;}
.mr-left{display:flex;align-items:center;gap:9px;}
.mr-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.mr-dot.done{background:var(--success);}
.mr-dot.todo{background:var(--text3);}
.mr-name{font-size:13px;font-weight:500;}
.mr-time{font-size:11px;color:var(--text2);margin-top:1px;}
.mr-reset-btn{font-size:11px;color:var(--danger);
  background:rgba(248,81,73,0.08);border:1px solid rgba(248,81,73,0.25);
  border-radius:6px;padding:3px 9px;cursor:pointer;font-family:var(--sans);
  transition:background .15s;}
.mr-reset-btn:hover{background:rgba(248,81,73,0.16);}

/* 미션 편집 */
.mission-edit-card{background:var(--surface);border:1px solid var(--border);
  border-radius:12px;margin-bottom:9px;overflow:hidden;}
.mec-header{padding:13px 15px;display:flex;align-items:center;
  justify-content:space-between;cursor:pointer;transition:background .15s;}
.mec-header:hover{background:var(--surface2);}
.mec-left{display:flex;align-items:center;gap:9px;}
.mec-num{font-size:11px;color:var(--text3);}
.mec-title-text{font-size:14px;font-weight:500;}
.mec-arrow{font-size:11px;color:var(--text3);transition:transform .2s;}
.mission-edit-card.open .mec-arrow{transform:rotate(180deg);}
.mec-body{display:none;padding:15px;border-top:1px solid var(--border);background:rgba(0,0,0,0.15);}
.mission-edit-card.open .mec-body{display:block;}
.f-label{font-size:12px;color:var(--text2);margin-bottom:5px;margin-top:14px;display:block;font-weight:500;}
.f-label:first-child{margin-top:0;}
.f-input{width:100%;padding:10px 12px;background:rgba(255,255,255,0.04);
  border:1px solid var(--border);border-radius:8px;
  font-size:14px;color:var(--text);font-family:var(--sans);
  outline:none;transition:border-color .2s;}
.f-input:focus{border-color:var(--accent);}
.f-textarea{width:100%;padding:10px 12px;background:rgba(255,255,255,0.04);
  border:1px solid var(--border);border-radius:8px;
  font-size:14px;color:var(--text);font-family:var(--sans);
  resize:vertical;min-height:80px;outline:none;line-height:1.6;
  transition:border-color .2s;}
.f-textarea:focus{border-color:var(--accent);}
.mec-save-btn{width:100%;margin-top:16px;padding:12px;
  background:rgba(88,166,255,0.12);border:1px solid rgba(88,166,255,0.28);
  border-radius:8px;color:var(--accent);font-size:14px;font-weight:700;
  cursor:pointer;font-family:var(--sans);transition:background .15s;}
.mec-save-btn:hover{background:rgba(88,166,255,0.2);}
.saved-badge{font-size:11px;color:var(--success);margin-top:6px;opacity:0;transition:opacity .3s;display:block;text-align:center;}
.saved-badge.show{opacity:1;}

/* 버튼 */
.action-btn{width:100%;padding:13px;border-radius:11px;border:none;
  font-size:14px;font-weight:700;cursor:pointer;font-family:var(--sans);
  margin-bottom:9px;transition:all .15s;}
.btn-drive{background:rgba(63,185,80,0.12);color:var(--success);
  border:1px solid rgba(63,185,80,0.28);}
.btn-drive:hover{background:rgba(63,185,80,0.2);}
/* ★ 추가: 시트 버튼 — 구글 시트 브랜드 컬러 톤 (주황빛 골드) */
.btn-sheet{background:rgba(227,179,65,0.12);color:var(--gold);
  border:1px solid rgba(227,179,65,0.32);}
.btn-sheet:hover{background:rgba(227,179,65,0.2);}
.btn-toggle-on{background:rgba(63,185,80,0.12);color:var(--success);
  border:1px solid rgba(63,185,80,0.28);}
.btn-toggle-off{background:rgba(248,81,73,0.09);color:var(--danger);
  border:1px solid rgba(248,81,73,0.24);}
.btn-danger{background:rgba(248,81,73,0.09);color:var(--danger);
  border:1px solid rgba(248,81,73,0.24);}
.btn-danger:hover{background:rgba(248,81,73,0.18);}
.btn-primary{background:rgba(88,166,255,0.12);color:var(--accent);
  border:1px solid rgba(88,166,255,0.28);}
.btn-primary:hover{background:rgba(88,166,255,0.2);}

/* 마커 */
.marker-map-wrap{position:relative;overflow:auto;
  border:1px solid var(--border);border-radius:12px;
  background:#1a1a2e;cursor:crosshair;margin-bottom:14px;
  max-height:600px;}
#map-aspect{position:relative;width:100%;min-width:800px;}
#marker-map-img{width:100%;height:auto;display:block;pointer-events:none;}
.edit-marker{position:absolute;transform:translate(-50%,-100%);cursor:grab;z-index:10;user-select:none;}
.edit-marker:active{cursor:grabbing;}
.edit-marker-pin{width:24px;height:24px;background:var(--accent);border-radius:50% 50% 50% 0;
  transform:rotate(-45deg);border:2px solid white;display:flex;align-items:center;justify-content:center;
  box-shadow:0 3px 10px rgba(0,0,0,0.5);}
.edit-marker-num{transform:rotate(45deg);font-size:10px;font-weight:700;color:white;}
.edit-marker-label{position:absolute;bottom:28px;left:50%;transform:translateX(-50%);
  background:rgba(13,17,23,0.92);color:var(--text);padding:2px 8px;border-radius:4px;
  font-size:9px;font-weight:700;white-space:nowrap;pointer-events:none;
  border:1px solid var(--border);}
.coord-list{background:var(--surface);border:1px solid var(--border);
  border-radius:12px;overflow:hidden;margin-bottom:13px;}
.coord-row{display:flex;align-items:center;padding:11px 13px;gap:11px;border-bottom:1px solid var(--border);}
.coord-row:last-child{border-bottom:none;}
.coord-name{font-size:13px;flex:1;font-weight:500;}
.coord-val{font-size:11px;color:var(--text2);font-family:monospace;}
.coord-reset{font-size:11px;color:var(--danger);background:none;
  border:1px solid rgba(248,81,73,0.28);padding:3px 8px;border-radius:6px;cursor:pointer;}

/* 빈 상태 */
.empty-state{text-align:center;padding:44px 20px;color:var(--text2);font-size:13px;}

/* 로딩 */
.loading-dot{display:inline-block;width:8px;height:8px;border-radius:50%;
  background:var(--accent);animation:ldot 1.2s ease-in-out infinite;}
.loading-dot:nth-child(2){animation-delay:.2s;}
.loading-dot:nth-child(3){animation-delay:.4s;}
@keyframes ldot{0%,80%,100%{opacity:.2}40%{opacity:1}}
</style>
</head>
<body>

</div>

const OCEAN_MISSIONS = [
  {id:0,title:'시간의 첫 파문',icon:'🎬',type:'text_with_mini_reflection',
    story:{label:'⚡ 시간 균열 발생 — 1층',text:'박물관 입구를 통과하는 순간, 발밑이 흔들렸다. 어두운 영상실 안에서 거대한 파도 소리가 울려 퍼지고 — 화면이 열리며 1624년의 바다가 눈앞에 펼쳐진다.\n\n수백 명의 조선 사신단이 폭풍 속 파도를 헤치며 명나라로 향하고 있다. 이 목숨을 건 항해의 기록이 뒤섞인 시간의 첫 번째 단서다.'},
    question:'🔍 영상을 끝까지 관람하고 화면 속 기록화의 이름을 찾아보자.\n\n1624년 이덕형 사신단이 명나라로 가는 험난한 뱃길을 그린 이 기록화의 이름은 무엇일까?',answers:['항해조천도'],explain:'항해조천도(航海朝天圖)! 파도와 폭풍 속에서도 사신단은 명나라에 도착했다. 이 항해 기록은 조선시대 외교의 치열함을 생생히 담고 있어요.',miniReflectionLabel:'🌊 영상을 보고 나서 — 드넓은 바다 위 조선 사신단의 항해. 어떤 감정이 들었나요? (50자 이상)'},
  {id:1,title:'8,000년 전 뱃사공',icon:'🪵',type:'image_text',
    story:{label:'⏪ 시간이 8,000년 거꾸로 흘렀다',text:'2층 전시실에 발을 딛는 순간, 공기가 달라졌다. 짠 갯바람 냄새, 갈매기 소리, 그리고 흙 냄새.\n\n신석기시대의 한 어부가 통나무를 파내어 배를 만들고 있다. 손으로 직접 파낸 이 배 한 척이, 우리 민족이 바다와 함께했다는 가장 오래된 증거다.\n\n경상남도 어느 마을의 땅속에서 잠들어 있던 이 배가 드디어 세상과 만났다.'},
    question:'🔍 이 통나무배가 발견된 곳의 지명이 배의 이름에 들어가 있어.\n\n"창녕 ○○○ 배" — 세 글자 지명은 무엇일까?',answers:['비봉리'],explain:'비봉리! 기원전 6000년경, 약 8000년 전에 만들어진 이 통나무배는 한반도에서 발견된 가장 오래된 배예요.'},
  {id:2,title:'바다를 건너온 낯선 그릇',icon:'🏺',type:'image_text',
    story:{label:'🌊 기원전의 바다에서 온 메시지',text:'수천 년 전, 한반도와 일본 열도 사이의 바다. 두 지역의 사람들은 이미 배를 타고 서로를 오가고 있었다.\n\n일본에서 건너온 이 토기 하나가 그 증거다.'},
    question:'🔍 일본 기원전 문화에서 만들어진 이 토기가 한반도에서 발견됐다는 건, 그때부터 이미 바다를 건너 교류했다는 뜻이야.\n\n이 토기의 이름은?',answers:['야요이 토기','야요이토기'],explain:'야요이 토기! 기원전 3세기~기원후 3세기 일본 야요이 문화의 토기예요.'},
  {id:3,title:'동아시아 바다의 패자',icon:'⚓',type:'text',
    story:{label:'⚔️ 삼국이 바다를 두고 다투다',text:'고구려, 백제, 신라. 세 나라가 한반도의 패권을 두고 치열하게 싸우던 시절.\n\n바다도 전략적 요충지였다. 세 나라 중 한 나라는 한강 하구를 손에 넣고 중국과 일본을 잇는 바닷길을 장악했다.'},
    question:'🔍 삼국 중 한강 유역을 거점 삼아 중국 남조, 일본과 가장 활발하게 교역하며 동아시아 해상 무역을 주도한 나라는?',answers:['백제'],explain:'백제! 서해를 장악한 백제는 중국 남조와 활발히 교역하고 일본에 불교와 선진 문화를 전파했어요.'},
  {id:4,title:'바다를 건너간 가야의 유산',icon:'🏛️',type:'photo',
    story:{label:'📸 삼국시대 — 인증 미션',text:'삼국시대 사람들은 교역품을 배에 싣고 바다를 건넜다. 다리처럼 솟아오른 받침대 위에 그릇이 얹힌 이 독특한 토기. 이 토기는 일본까지 건너가 큰 영향을 미쳤다.\n\n탐험단이여, 이 유물 앞에서 직접 사진을 찍어 증거로 남겨라!'},
    question:'📷 삼국시대 전시 공간에서 "굽다리접시(고배)"를 찾아보세요.\n\n굽다리접시와 함께 찍은 사진을 제출하면 스탬프를 드려요!',photoLabel:'굽다리접시(고배) 인증샷',explain:'임무 완수! 굽다리접시(고배)는 신라·가야에서 크게 유행하고 바다를 건너 일본에도 전해졌어요.'},
  {id:5,title:'천 년의 침묵을 깨고',icon:'⛵',type:'text',
    story:{label:'🌊 바다 속에서 1000년을 잠든 배',text:'2012년, 인천 앞바다.\n\n어부의 그물에 수상한 나무 조각이 걸려 올라왔다. 발굴팀이 달려갔다. 그리고 믿을 수 없는 광경이 펼쳐졌다.\n\n1000년 넘게 바다 속에 잠들어 있던 통일신라시대의 배가 모습을 드러낸 것이다.'},
    question:'🔍 인천 옹진군 앞바다에서 발견된 통일신라시대 화물선.\n\n발견된 섬의 이름이 그대로 배 이름이 됐어. 이 배의 이름은?',answers:['영흥도선','영흥도배'],explain:'영흥도선! 1000년 이상 인천 앞바다에 잠들어 있던 통일신라 화물선이에요.'},
  {id:6,title:'푸른 빛을 실어나르다',icon:'💙',type:'text',
    story:{label:'💙 고려 — 세상에서 가장 아름다운 빛',text:'중국 송나라의 대문호 서긍이 고려에 사신으로 왔다가 깜짝 놀랐다.\n\n"세상에서 가장 아름다운 비색(翡色)이다."\n\n고려의 도공들이 빚어낸 도자기는 단순한 그릇이 아니었다.'},
    question:'🔍 고려시대 독자적으로 발전시킨 도자기로, 신비로운 푸른빛이 특징이야.\n\n송나라 문인들까지 감탄한 "비색(翡色)"의 이 도자기 이름은?',answers:['청자','고려청자'],explain:'청자(고려청자)! 고려만의 독자적 기술로 만든 비색 청자는 당시 세계 최고 수준의 도자기였어요.'},
  {id:7,title:'코리아, 세계와 만나다',icon:'🌐',type:'dnd',
    story:{label:'🌍 고려 — 중동 상인들도 찾아온 나라',text:'고려의 개경 항구, 예성항(벽란도). 중국 송나라 상인은 물론이고, 아라비아에서 온 상인들도 이 항구를 드나들었다.\n\n아라비아 상인들이 "고려(Goryeo)"를 "Corea"로 발음하며 세계에 알렸고, 오늘날 우리가 "Korea"라 불리게 된 게 바로 여기서 시작됐다!'},
    question:'전시실 벽면의 고려 교류 기록 문구를 보고 키워드를 드래그해 빈칸에 넣으세요. 채운 칸을 탭하면 취소됩니다.',answers:[],explain:'정답! 고려는 송·일본·아라비아(대식국)·베트남(교지국)·태국(섬라곡국)과도 교류했어요.'},
  {id:8,title:'불멸의 철갑 전설',icon:'🐢',type:'two_step',
    story:{label:'⚔️ 1592년 — 왜군의 함선이 바다를 뒤덮다',text:'임진년 4월, 부산 앞바다.\n\n수백 척의 왜군 함선이 조선 해협을 가득 채웠다. 조선 육군은 연달아 무너졌다. 그러나 바다에서만은 달랐다.\n\n"아직 신에게는 열두 척의 배가 있습니다."'},
    step1:{question:'🔍 임진왜란 7년 내내 단 한 번도 패배하지 않은 조선 수군의 지휘관.\n\n그 장군의 이름은?',answers:['이순신']},
    step2:{question:'🐢 맞아! 이순신 장군의 핵심 비밀 병기.\n\n철갑으로 덮인 지붕 구조로 적의 화살과 포격을 막아낸 이 돌격선의 이름은?',answers:['거북선']},
    explain:'이순신 장군과 거북선! 명량해전에서 단 13척으로 133척의 왜군을 물리쳤어요!'},
  {id:9,title:'500명의 문화 대사',icon:'🏮',type:'text',
    story:{label:'🤝 전쟁 후 — 다시 잇는 바닷길',text:'임진왜란이 끝나고 10여 년 후.\n\n조선과 일본은 다시 국교를 맺었다. 많을 때는 500명이 넘는 이 사절단이 배를 타고 일본 에도(도쿄)까지 갔다.'},
    question:'🔍 조선이 일본 막부에 파견한 공식 외교·문화 사절단.\n\n"믿음을 나눈다(信)"는 뜻을 담은 이 사절단의 이름은?',answers:['통신사','조선통신사'],explain:'통신사(조선통신사)! 1607년부터 1811년까지 12회 파견되었고, 2017년 유네스코 세계기록유산에도 등재됩니다!'},
  {id:10,title:'근대의 파도가 밀려오다',icon:'📸',type:'photo',
    story:{label:'🚢 1883년 — 제물포 항구가 열리다',text:'1883년 제물포(인천) 개항.\n\n서양의 배들이 조선 땅에 처음으로 닿았다. 기선, 전신, 사진기, 서양 의학 — 본 적도 없는 것들이 한꺼번에 쏟아져 들어왔다.'},
    question:'📷 개항기 섹션에서 당시 인천항 사람들의 삶을 담은 인물 패널을 찾아보세요.\n\n패널 속 인물이 잘 보이도록 함께 사진을 찍어 제출하세요!',photoLabel:'개항기 인물 패널 인증샷',explain:'임무 완수! 1883년 제물포 개항은 수백 년간 닫혀 있던 조선이 세계와 만나는 역사적 첫 순간이었답니다.'},
  {id:11,title:'빼앗긴 바다의 기록',icon:'🗺️',type:'text',
    story:{label:'🇯🇵 1910~1945 — 수탈의 시대',text:'일제강점기, 바다도 빼앗겼다.\n\n일본은 조선의 어장을 체계적으로 조사하고 수산 자원을 싹쓸이했다. 그 수탈의 증거가 지도 한 장에 담겨 있다.'},
    question:'🔍 일제강점기, 일본이 조선 바다의 수산 자원을 빠짐없이 조사해 만든 지도가 전시되어 있어.\n\n이 지도의 이름은?',answers:['한국연해수산물분포도','한국연해 수산물분포도'],explain:'한국연해수산물분포도! 일제가 조선 연안 수산물을 체계적으로 파악하고 수탈하기 위해 만든 지도예요.'},
  {id:12,title:'바다 위의 거인들',icon:'🚢',type:'text',
    story:{label:'🌊 2층 해운항만실 — 현대의 바다',text:'2층 해운항만실에 올라서는 순간, 규모가 달라진다.\n\n엄청나게 큰 컨테이너선 모형이 눈앞에 나타난다.'},
    question:'🚢 2층에 전시된 대형 컨테이너선 모형 선체에 크게 적힌 영문 약자 3글자는?\n\n모형을 직접 찾아서 눈으로 확인해보자!',answers:['HMM'],explain:'HMM(Hyundai Merchant Marine, 현대상선)! 한국을 대표하는 컨테이너 해운사예요.'},
  {id:13,title:'세계를 바꾼 철제 상자',icon:'📦',type:'text',
    story:{label:'📦 혁명은 작은 상자에서 시작됐다',text:'1956년 이전, 배에 짐을 싣는 건 엄청난 일이었다.\n\n수천 명의 항만 노동자들이 상자, 자루, 통을 하나하나 손으로 옮겨 실었다.'},
    question:'📦 2층 전시 섹션 제목을 찾아봐.\n\n"○○○○, 해운물류의 역사를 바꾼 상자"\n\n이 발명품의 이름은?',answers:['컨테이너'],explain:'컨테이너! 1956년 처음 도입된 이후 전 세계 해운 물류를 바꿔놓았어요.'},
  {id:14,title:'선장 없는 배의 시대',icon:'🤖',type:'two_step',
    story:{label:'🤖 미래의 바다 — 아무도 탑승하지 않은 배',text:'가까운 미래, 부산항에서 출발한 화물선이 선장 없이 스스로 항로를 계산하고, 장애물을 피하고, 목적지에 도착한다.'},
    step1:{question:'🔍 항만의 모든 장비·선박·시스템을 인터넷으로 연결해 스마트하게 운영하는 기술.\n\n"사물인터넷"의 영문 약자 3글자는?',answers:['IOT','IoT','iot']},
    step2:{question:'🚢 이 기술을 활용해 사람이 직접 탑승·조종하지 않아도 AI가 스스로 목적지까지 항해하는 배.\n\n다섯 글자 용어는?',answers:['자율운항선박','자율 운항 선박']},
    explain:'IoT + 자율운항선박! 미래 해운의 핵심 기술이에요.'},
  {id:15,title:'생명이 숨 쉬는 진흙 바다',icon:'🌊',type:'text',
    story:{label:'🦀 갯벌 — 쓸모없어 보이는 땅의 비밀',text:'썰물이 빠져나간 인천 앞바다.\n\n드러나는 건 그냥 진흙탕처럼 보이지만, 그 속에서는 엄청난 생명이 꿈틀거린다.'},
    question:'🔍 조수간만의 차가 큰 서해안에 발달한, 썰물 때 드러나는 진흙 지형.\n\n다양한 생물의 서식지이자 천연 정수기 역할을 하는 이곳의 이름은?',answers:['갯벌'],explain:'갯벌! 2021년 유네스코 세계자연유산으로 등재된 한국의 자랑스러운 자연이랍니다!'},
  {id:16,title:'하얀 꽃이 피는 갯벌',icon:'🧂',type:'text',
    story:{label:'🧂 소금 — 인천이 키운 하얀 보물',text:'예부터 소금은 금만큼 귀했다. 인천 주안 일대의 너른 갯벌.'},
    question:'🧂 인천 주안(朱安) 지역에 조성된 우리나라 최대 규모의 근대식 천일염전.\n\n이 염전의 이름은?',answers:['주안염전'],explain:'주안염전! 일제강점기에 조성된 이후 우리나라 소금 공급의 핵심이었어요.'},
  {id:17,title:'인천 산업화의 세 기둥',icon:'⚙️',type:'match',
    story:{label:'👥 세 사람 — 인천 바다를 바꾼 이름들',text:'역사는 혼자 만들지 않는다.\n\n조선(造船), 항만 노동, 수산업 — 서로 다른 분야에서 인천의 바다를 일군 세 인물.'},
    question:'전시 패널에서 각 인물의 이야기를 읽고, 위의 이름 칩을 드래그해서 알맞은 설명 아래 빈칸에 연결하세요.',answers:[],explain:'세 인물 모두 연결 성공! 김대식(조선업), 강용정(항만노동), 김진수(수산업) — 인천 해양 산업화의 진짜 주역들이랍니다.'},
  {id:18,title:'바다를 품은 탐험가',icon:'🗼',type:'photo',
    story:{label:'🏆 최후의 관문 — 전망대에 올라라',text:'모든 층을 헤치고 여기까지 왔다.\n\n이제 마지막이다.\n\n전망대에 오르면, 방금 전까지 박물관에서 역사 속 장면들로만 봤던 그 바다가 — 실제로 눈앞에 펼쳐진다.'},

function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function formatTime(iso){
  if(!iso) return '';
  try { const d=new Date(iso); return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`; }

}
function classFromId(sid){
  const prefix = String(sid||'').substring(0,3);

}

function buildA1ClassFilter(containerId, actNum, isReset=false){
  const el = document.getElementById(containerId);
  if(!el) return;
  const classes = ['전체','1반','2반','3반','4반','5반','6반'];
  el.innerHTML = classes.map((c,i) => `<button class="class-btn ${i===0?'active':''}" onclick="setClassFilter(${actNum},'${i===0?'all':i}','${containerId}',${isReset})">${c}</button>`).join('');
}

window.setClassFilter = function(act, cls, containerId, isReset){
  document.querySelectorAll(`#${containerId} .class-btn`).forEach(b=>b.classList.remove('active'));
  event.target.classList.add('active');
  if(act===1){ filterClass1=cls; isReset ? renderA1ResetList('') : renderA1List(''); }
  else { filterClass2=cls; isReset ? renderA2ResetList('') : renderA2List(''); }
};

function loadA1Status(){
  const unsub = onValue(ref(db,'status1'), snap => {
    allData1 = snap.exists() ? snap.val() : {};
    renderA1Stats();
    renderA1List('');
    renderA1ResetList('');
  });
  unsubscribe1 = unsub;
}

function filterStudents1(query){
  return Object.entries(allData1).filter(([k]) => {
    const [sid] = k.split('_'); 
    const matchQ = !query || k.includes(query);
    const cls = classFromId(sid);
    const matchC = filterClass1==='all' || String(cls)===String(filterClass1);
    return matchQ && matchC;
  });
}

function renderA1Stats(){
  const entries = Object.entries(allData1);
  let totalComp=0, fullCount=0;
  entries.forEach(([,mObj])=>{
    const done = Object.values(mObj).filter(v=>v&&v.status==='완료').length;
    totalComp+=done; if(done>=19) fullCount++;
  });
  document.getElementById('a1-stat-total').textContent=entries.length;
  document.getElementById('a1-stat-comp').textContent=totalComp;
  document.getElementById('a1-stat-full').textContent=fullCount;
  document.getElementById('a1-stat-avg').textContent=entries.length>0?Math.round(totalComp/entries.length*10)/10:'–';
}

function renderA1List(query){
  const el = document.getElementById('a1-student-list'); if(!el) return;
  const filtered = filterStudents1(query);
  if(!filtered.length){ el.innerHTML=`<div class="empty-state">해당 학생이 없습니다</div>`; return; }
  filtered.sort(([,a],[,b])=>Object.values(b).filter(v=>v&&v.status==='완료').length - Object.values(a).filter(v=>v&&v.status==='완료').length);
  el.innerHTML = filtered.map(([key,mObj])=>{
    const [sid,...np]=key.split('_'); const name=np.join('_');
    const done=Object.values(mObj).filter(v=>v&&v.status==='완료').length;
    const pct=Math.round(done/19*100);
    const rows=OCEAN_MISSIONS.map(m=>{
      const e=mObj[m.id]; const isDone=!!(e&&e.status==='완료');
      return `<div class="mission-row">
        <div class="mr-left"><div class="mr-dot ${isDone?'done':'todo'}"></div>
          <div><div class="mr-name">${m.icon} ${m.title}</div>
          <div class="mr-time">${isDone?formatTime(e.time):'미완료'}</div></div></div>
        ${isDone?`<button class="mr-reset-btn" onclick="resetMission1('${key}',${m.id})">초기화</button>`:'<span style="font-size:11px;color:var(--text3)">–</span>'}
      </div>`;
    }).join('');
    return `<div class="student-card" id="a1sc-${esc(key)}">
      <div class="sc-header" onclick="document.getElementById('a1sc-${esc(key)}').classList.toggle('open')">
        <div class="sc-info">
          <div class="sc-avatar">${(name||'?').charAt(0)}</div>
          <div><div class="sc-name">${name}</div><div class="sc-id">${sid} · ${classFromId(sid)}반 · ${done}/19 완료</div></div>
        </div>
        <div class="sc-progress">
          <div class="sc-bar"><div class="sc-bar-fill" style="width:${pct}%"></div></div>
          <div class="sc-pct">${pct}%</div>
        </div>
      </div>
      <div class="sc-detail">${rows}</div>
    </div>`;
  }).join('');
}

      const e = edits[m.id] || {}; // 저장된 수정본
      const title = e.title !== undefined ? e.title : m.title;
      const sLabel = e.storyLabel !== undefined ? e.storyLabel : m.story?.label;
      const sText = e.storyText !== undefined ? e.storyText : m.story?.text;
      const explain = e.explain !== undefined ? e.explain : m.explain;

window.saveA1Mission = async function(id, type){
  const data = {
    title: document.getElementById(`a1-t-${id}`)?.value.trim(),
    storyLabel: document.getElementById(`a1-sl-${id}`)?.value.trim(),
    storyText: document.getElementById(`a1-st-${id}`)?.value.trim(),
    explain: document.getElementById(`a1-ex-${id}`)?.value.trim(),
  };

  if(type === 'two_step'){
    data.step1Q = document.getElementById(`a1-s1q-${id}`)?.value.trim();
    data.step1A = document.getElementById(`a1-s1a-${id}`)?.value.split(',').map(s=>s.trim()).filter(Boolean);
    data.step2Q = document.getElementById(`a1-s2q-${id}`)?.value.trim();
    data.step2A = document.getElementById(`a1-s2a-${id}`)?.value.split(',').map(s=>s.trim()).filter(Boolean);
  } else if (type === 'photo'){
    data.question = document.getElementById(`a1-q-${id}`)?.value.trim();
    data.photoLabel = document.getElementById(`a1-pl-${id}`)?.value.trim();
  } else if (type === 'text_with_mini_reflection') {
    data.question = document.getElementById(`a1-q-${id}`)?.value.trim();
    data.answers = document.getElementById(`a1-a-${id}`)?.value.split(',').map(s=>s.trim()).filter(Boolean);
    data.miniRefLabel = document.getElementById(`a1-mrl-${id}`)?.value.trim();
  } else if (['dnd', 'match'].includes(type)) {
    data.question = document.getElementById(`a1-q-${id}`)?.value.trim();
  } else {
    data.question = document.getElementById(`a1-q-${id}`)?.value.trim();
    data.answers = document.getElementById(`a1-a-${id}`)?.value.split(',').map(s=>s.trim()).filter(Boolean);
  }

  try{
    await update(ref(db,`missionEdit1/${id}`), data);
    const badge=document.getElementById(`a1sb-${id}`);
    badge.classList.add('show'); setTimeout(()=>badge.classList.remove('show'),2000);
    showToast(`M${id+1} 저장 완료`);
    
    // 제목이 바뀌었을 수 있으므로 헤더 즉시 업데이트
    const headerTitle = document.querySelector(`#a1mec-${id} .mec-title-text`);
    if(headerTitle) headerTitle.textContent = `${OCEAN_MISSIONS.find(x=>x.id===id).icon} ${data.title}`;

  } catch(e){ showToast('저장 실패: '+e.message); }
};

    allData2 = snap.exists() ? snap.val() : {};

    renderA2List('');
    renderA2ResetList('');
  });
  unsubscribe2 = unsub;

function filterStudents2(query){
  return Object.entries(allData2).filter(([k])=>{
    const [sid] = k.split('_');
    const matchQ = !query || k.includes(query);
    const cls = classFromId(sid);
    const matchC = filterClass2==='all' || String(cls)===String(filterClass2);
    return matchQ && matchC;
  });
}

function renderA2Stats(){
  const entries = Object.entries(allData2);
  let totalComp=0, fullCount=0;
  entries.forEach(([,mObj])=>{
    const done=Object.values(mObj).filter(v=>v&&v.status==='완료').length;
    totalComp+=done; if(done>=10) fullCount++;
  });
  document.getElementById('a2-stat-total').textContent=entries.length;
  document.getElementById('a2-stat-comp').textContent=totalComp;
  document.getElementById('a2-stat-full').textContent=fullCount;
  document.getElementById('a2-stat-avg').textContent=entries.length>0?Math.round(totalComp/entries.length*10)/10:'–';
}

  if(!filtered.length){ el.innerHTML=`<div class="empty-state">해당 학생이 없습니다</div>`; return; }
  filtered.sort(([,a],[,b])=>Object.values(b).filter(v=>v&&v.status==='완료').length-Object.values(a).filter(v=>v&&v.status==='완료').length);
  el.innerHTML=filtered.map(([key,mObj])=>{
    const [sid,...np]=key.split('_'); const name=np.join('_');

    const pct=Math.round(done/10*100);

window.saveA2Mission = async function(key){
  const k=key.replace(/\s/g,'');
  const name=document.getElementById(`a2n-${k}`)?.value.trim()||document.getElementById(`a2n-${esc(key)}`)?.value.trim();
  const label=document.getElementById(`a2l-${k}`)?.value.trim()||document.getElementById(`a2l-${esc(key)}`)?.value.trim();
  const title=document.getElementById(`a2t-${k}`)?.value.trim()||document.getElementById(`a2t-${esc(key)}`)?.value.trim();
  const desc=document.getElementById(`a2d-${k}`)?.value.trim()||document.getElementById(`a2d-${esc(key)}`)?.value.trim();
  const verify=document.getElementById(`a2v-${k}`)?.value.trim()||document.getElementById(`a2v-${esc(key)}`)?.value.trim();
  if(!name||!label||!title||!desc||!verify){ showToast('모든 항목을 입력해주세요'); return; }
  try{
    await update(ref(db,`missionData/${key}`),{name,label,title,desc,verify});
    currentMissions1883[key]={...currentMissions1883[key],name,label,title,desc,verify};
    const badge=document.getElementById(`a2sb-${k}`)||document.getElementById(`a2sb-${esc(key)}`);
    if(badge){ badge.classList.add('show'); setTimeout(()=>badge.classList.remove('show'),2000); }
    showToast(`✅ ${key} 저장 완료`);

    // 수정한 이름으로 헤더 타이틀 즉시 변경
    const headerTitle = document.querySelector(`#a2mec-${esc(key)} .mec-title-text`);
    if(headerTitle) headerTitle.textContent = name;
    
    // 학생 리스트나 마커 목록 등에도 실시간 반영되도록 렌더링 호출
    renderA2List(document.getElementById('a2-search')?.value.trim());
    if (document.getElementById('coord-list')) renderCoordList();
  } catch(e){ showToast('저장 실패: '+e.message); }
};

// ── 마커 편집 ──
async function loadMarkerPositions2(){
  try{
    const snap=await get(ref(db,'markerPositions'));
    if(snap.exists()) Object.keys(snap.val()).forEach(k=>{ if(editPositions[k]) editPositions[k]=snap.val()[k]; });
  }catch(e){}
}
window.buildMarkerEditor = function(){
  const aspect=document.getElementById('map-aspect'); if(!aspect) return;
  aspect.querySelectorAll('.edit-marker').forEach(el=>el.remove());
  PLACE_KEYS.forEach(key=>{
    const mData = currentMissions1883[key] || {};
    const displayName = mData.name || key;
    const pos=editPositions[key], num=NUMS_1883[key]||'';
    const el=document.createElement('div');
    el.className='edit-marker'; el.id=`edit-${key}`;
    el.style.left=pos.x+'%'; el.style.top=pos.y+'%';
    el.innerHTML=`<div class="edit-marker-label">${displayName}</div><div class="edit-marker-pin"><span class="edit-marker-num">${num}</span></div>`;
    makeDraggable(el,key,aspect);
    aspect.appendChild(el);
  });
  renderCoordList();
};
function makeDraggable(el,key,container){
  let dragging=false,startX,startY,startLeft,startTop;
  function onStart(e){ dragging=true; const pt=e.touches?e.touches[0]:e; startX=pt.clientX;startY=pt.clientY; startLeft=(parseFloat(el.style.left)/100)*container.scrollWidth; startTop=(parseFloat(el.style.top)/100)*container.scrollHeight; e.preventDefault(); }
  function onMove(e){ if(!dragging)return; const pt=e.touches?e.touches[0]:e; const dx=pt.clientX-startX,dy=pt.clientY-startY; const ww=container.scrollWidth,wh=container.scrollHeight; const nx=Math.max(0,Math.min(100,((startLeft+dx)/ww)*100)); const ny=Math.max(0,Math.min(100,((startTop+dy)/wh)*100)); el.style.left=nx+'%';el.style.top=ny+'%'; editPositions[key]={x:parseFloat(nx.toFixed(2)),y:parseFloat(ny.toFixed(2))}; updateCoordRow(key); e.preventDefault(); }
  function onEnd(){ dragging=false; }
  el.addEventListener('mousedown',onStart); el.addEventListener('touchstart',onStart,{passive:false});
  document.addEventListener('mousemove',onMove); document.addEventListener('touchmove',onMove,{passive:false});
  document.addEventListener('mouseup',onEnd); document.addEventListener('touchend',onEnd);
}
function renderCoordList(){
  const el=document.getElementById('coord-list'); if(!el) return;
  el.innerHTML=PLACE_KEYS.map(key=>{
    const mData = currentMissions1883[key] || {};
    const displayName = mData.name || key;
    return `<div class="coord-row">
    <div class="coord-name">${NUMS_1883[key]||''} ${displayName}</div>
    <div class="coord-val" id="coord-val-${key}">X: ${editPositions[key].x}% / Y: ${editPositions[key].y}%</div>
    <button class="coord-reset" onclick="resetMarker('${key}')">초기화</button>
  </div>`}).join('');
}
function updateCoordRow(key){ const el=document.getElementById(`coord-val-${key}`); if(el) el.textContent=`X: ${editPositions[key].x}% / Y: ${editPositions[key].y}%`; }
window.resetMarker=function(key){ editPositions[key]={...DEFAULT_POSITIONS[key]}; const el=document.getElementById(`edit-${key}`); if(el){el.style.left=editPositions[key].x+'%';el.style.top=editPositions[key].y+'%';} updateCoordRow(key); showToast(`${key} 초기화 완료`); };
window.saveMarkers=async function(){ try{ await set(ref(db,'markerPositions'),editPositions); showToast('✅ 마커 저장 완료'); } catch(e){} };
</script>
